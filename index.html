                    {window.HistoryActionModal && <window.HistoryActionModal 
                        isOpen={isHistoryActionModalOpen}
                        onClose={() => { setIsHistoryActionModalOpen(false); setPendingHistoryData(null); }}
                        date={pendingHistoryData?.date}
                        onAction={confirmHistoryAction}
                    />}
                    {window.AdminDashboardModal && <window.AdminDashboardModal 
                        isOpen={isAdminModalOpen}
                        onClose={() => setIsAdminModalOpen(false)}
                        supabase={supabase}
                    />}
                    </div>
            );
        };
        const ScenarioCompare = ({ scenarios, sectorInfo, calculateMonthlyProjection, formatNumber }) => {
            const { useState, useMemo } = React;
            const [selectedIds, setSelectedIds] = useState([]);
            const toggle = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : (prev.length<3 ? [...prev,id] : prev));

            const selected = scenarios.filter(s => selectedIds.includes(s.id)).slice(0,3);
            
            const computeScenarioProjections = (scenarioData) => {
                // Use the main calculation logic to get monthly projections
                const tempAppData = { ...scenarioData }; // Create a temporary appData for calculation
                const result = calculateMonthlyProjection(tempAppData, scenarioData.projectionMonths || 12);
                return result.projections;
            };

            const results = useMemo(() => {
                return selected.map(s => ({
                    id: s.id,
                    name: s.name,
                    data: s.data,
                    projections: computeScenarioProjections(s.data)
                }));
            }, [selected]);

            // Determine common months for comparison
            const allMonths = results.flatMap(r => r.projections.map(p => p.month));
            const uniqueMonths = [...new Set(allMonths)].sort((a, b) => a - b);

            // Limit to max 12 comparison points, adjust for long periods
            const maxComparisonMonths = 12;
            let comparisonInterval = 1;
            if (uniqueMonths.length > maxComparisonMonths) {
                comparisonInterval = Math.ceil(uniqueMonths.length / maxComparisonMonths);
            }
            const displayMonths = uniqueMonths.filter((_, index) => index % comparisonInterval === 0);
            if (!displayMonths.includes(uniqueMonths[uniqueMonths.length - 1])) {
                displayMonths.push(uniqueMonths[uniqueMonths.length - 1]); // Always include the last month
            }


            const getMonthLabel = (monthIndex, baseMonthStr) => {
                try {
                    const [y,m] = (baseMonthStr || new Date().toISOString().slice(0,7)).split('-').map(Number);
                    const d = new Date(y, m - 1 + monthIndex);
                    return `${String(d.getFullYear()).slice(2)}년 ${String(d.getMonth()+1).padStart(2,'0')}월`;
                } catch { return `월 ${monthIndex}`; }
            };

            return (
                <div>
                    <div className="flex flex-wrap gap-2 mb-3">
                        {scenarios.map(s => (
                            <button key={s.id} onClick={() => toggle(s.id)} className={`px-3 py-1 border dark:border-gray-600 rounded ${selectedIds.includes(s.id) ? 'bg-blue-50 dark:bg-blue-900/40 border-blue-400 dark:border-blue-500 dark:text-blue-300' : 'hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-300'}`}>{s.name}</button>
                        ))}
                    </div>
                    {results.length > 0 ? (
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm dark:text-gray-300">
                                <thead className="bg-gray-100 dark:bg-gray-700">
                                    <tr>
                                        <th className="p-3 text-left">섹터/항목</th>
                                        {results.map(r => (<th key={r.id} className="p-3 text-right">{r.name} (최종)</th>))}
                                        {results.length === 2 && (
                                            <th className="p-3 text-right">차이(금액/비중)</th>
                                        )}
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.keys(sectorInfo).map(sectorKey => (
                                        <React.Fragment key={sectorKey}>
                                            <tr className="border-t dark:border-gray-700">
                                                <td className="p-3 font-semibold">{sectorInfo[sectorKey].icon} {sectorInfo[sectorKey].name}</td>
                                                {results.map(r => {
                                                    const finalProjection = r.projections[r.projections.length - 1];
                                                    const sectorTotal = finalProjection?.sectorTotals[sectorKey] || { amount: 0, percentage: 0 };
                                                    return (
                                                        <td key={r.id} className="p-3 text-right">
                                                            {formatNumber(sectorTotal.amount)} ({(sectorTotal.percentage || 0).toFixed(1)}%)
                                                        </td>
                                                    );
                                                })}
                                                {results.length === 2 && (
                                                    <td className="p-3 text-right text-indigo-700 dark:text-indigo-400">
                                                        {(() => {
                                                            const finalA = results[0].projections[results[0].projections.length - 1];
                                                            const finalB = results[1].projections[results[1].projections.length - 1];
                                                            const amountA = finalA?.sectorTotals[sectorKey]?.amount || 0;
                                                            const amountB = finalB?.sectorTotals[sectorKey]?.amount || 0;
                                                            const percentA = finalA?.sectorTotals[sectorKey]?.percentage || 0;
                                                            const percentB = finalB?.sectorTotals[sectorKey]?.percentage || 0;
                                                            const diffAmount = amountB - amountA;
                                                            const diffPercent = percentB - percentA;
                                                            const signAmount = diffAmount >= 0 ? '+' : '';
                                                            const signPercent = diffPercent >= 0 ? '+' : '';
                                                            const isGood = sectorKey === 'loan' ? diffAmount <= 0 : diffAmount >= 0;
                                                            const color = isGood ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                            return (
                                                                <div className={color}>
                                                                    <span>{signAmount}{formatNumber(diffAmount)}</span>
                                                                    <span className="text-xs ml-1">({signPercent}{diffPercent.toFixed(1)}%)</span>
                                                                </div>
                                                            );
                                                        })()}
                                                    </td>
                                                )}
                                            </tr>
                                            {(() => {
                                                const allItems = new Map();
                                                results.forEach(r => {
                                                    const finalProjection = r.projections[r.projections.length - 1];
                                                    finalProjection?.itemTotals[sectorKey]?.forEach(item => {
                                                        const key = item.id || item.name;
                                                        if (!allItems.has(key)) {
                                                            allItems.set(key, { name: item.name });
                                                        }
                                                    });
                                                });
                                                return Array.from(allItems.entries());
                                            })().map(([key, { name }]) => (
                                                <tr key={`${sectorKey}-${key}`} className="border-t dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
                                                    <td className="p-3 pl-8 text-sm text-gray-600 dark:text-gray-400">└ {name}</td>
                                                    {results.map(r => {
                                                        const finalProjection = r.projections[r.projections.length - 1]; 
                                                        const items = finalProjection?.itemTotals[sectorKey] || [];
                                                        const itemData = items.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };
                                                        return (
                                                            <td key={r.id} className="p-3 text-right text-sm">
                                                                <div>{formatNumber(itemData.amount)}</div>
                                                            </td>
                                                        );
                                                    })}
                                                    {results.length === 2 && (
                                                        <td className="p-3 text-right text-sm text-indigo-700 dark:text-indigo-400">
                                                            {(() => {
                                                                const finalA = results[0].projections[results[0].projections.length - 1]; 
                                                                const finalB = results[1].projections[results[1].projections.length - 1]; 
                                                                const itemsA = finalA?.itemTotals[sectorKey] || [];
                                                                const itemsB = finalB?.itemTotals[sectorKey] || [];
                                                                const itemA = itemsA.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };
                                                                const itemB = itemsB.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };

                                                                const diffAmount = itemB.amount - itemA.amount;
                                                                const signAmount = diffAmount >= 0 ? '+' : '';
                                                                const isGood = sectorKey === 'loan' ? diffAmount <= 0 : diffAmount >= 0;
                                                                const color = isGood ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                                return (
                                                                    <div className={color}>
                                                                        <div>{signAmount}{formatNumber(diffAmount)}</div>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </td>
                                                    )}
                                                </tr>
                                            ))
                                            }
                                        </React.Fragment>
                                    ))}
                                    <tr className="border-t-2 border-gray-400 dark:border-gray-600 bg-gray-100 dark:bg-gray-700">
                                        <td className="p-3 font-bold">총계</td>
                                        {results.map(r => {
                                            const finalProjection = r.projections[r.projections.length - 1];
                                            return (
                                                <td key={r.id} className="p-3 text-right font-bold">{formatNumber(finalProjection?.total || 0)}</td>
                                            );
                                        })}
                                        {results.length === 2 && (
                                            <td className="p-3 text-right font-bold text-indigo-700 dark:text-indigo-400">
                                                {(() => { 
                                                    const finalA = results[0].projections[results[0].projections.length - 1];
                                                    const finalB = results[1].projections[results[1].projections.length - 1];
                                                    const diff = (finalB?.total || 0) - (finalA?.total || 0); 
                                                    const sign = diff >= 0 ? '+' : '';
                                                    const color = diff >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                    return (
                                                        <div className={color}>{sign}{formatNumber(diff)}</div>
                                                    );
                                                })()}
                                            </td>
                                        )}
                                    </tr>
                                </tbody>
                            </table>

                            {/* Monthly Comparison Table */}
                            <h4 className="text-lg font-semibold text-gray-700 dark:text-gray-300 mt-8 mb-4">월별 비교 (최대 12개월)</h4>
                            <table className="w-full text-sm dark:text-gray-300">
                                <thead className="bg-gray-100 dark:bg-gray-700">
                                    <tr>
                                        <th className="p-3 text-left">월차</th>
                                        {results.map(r => (<th key={r.id} className="p-3 text-right">{r.name} (총자산)</th>))}
                                        {results.length === 2 && (
                                            <th className="p-3 text-right">차이</th>
                                        )}
                                    </tr>
                                </thead>
                                <tbody>
                                    {displayMonths.map(monthIndex => {
                                        const monthLabel = getMonthLabel(monthIndex, results[0]?.data.baseMonth);
                                        return (
                                            <tr key={monthIndex} className="border-t dark:border-gray-700">
                                                <td className="p-3 font-semibold">{monthLabel}</td>
                                                {results.map(r => {
                                                    const projection = r.projections.find(p => p.month === monthIndex);
                                                    return (
                                                        <td key={r.id} className="p-3 text-right">
                                                            {projection ? formatNumber(projection.total) : '-'}
                                                        </td>
                                                    );
                                                })}
                                                {results.length === 2 && (
                                                    <td className="p-3 text-right text-indigo-700 dark:text-indigo-400">
                                                        {(() => {
                                                            const projA = results[0].projections.find(p => p.month === monthIndex);
                                                            const projB = results[1].projections.find(p => p.month === monthIndex);
                                                            if (projA && projB) {
                                                                const diff = projB.total - projA.total;
                                                                const sign = diff >= 0 ? '+' : '';
                                                                return `${sign}${formatNumber(diff)}`;
                                                            }
                                                            return '-';
                                                        })()}
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="text-sm text-gray-500">비교할 시나리오를 최대 3개 선택하세요.</div>
                    )}
                </div>
            );
        };
        
        // [최적화] 자산 입력 행 컴포넌트 분리 및 React.memo 적용
        // 개별 항목 수정 시 다른 항목들의 불필요한 리렌더링 방지
        const AssetRow = React.memo(({ 
            sectorKey, 
            index, 
            asset, 
            updateAsset, 
            removeAsset, 
            accountOptions, 
            sectorInfo,
            sectorTotal,
            rgb,
            itemRec
        }) => {
            const assetPercentage = (Number(asset.amount || 0) / sectorTotal) * 100;
            const amountBgStyle = { backgroundImage: `linear-gradient(to right, rgba(${rgb}, 0.15) ${assetPercentage}%, transparent ${assetPercentage}%)` };

            return (
                <div className="bg-white dark:bg-gray-900 rounded-lg p-4 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center gap-3" role="group" aria-label={`${asset.name} 입력 행`}>
                    <div className="flex-1">
                    {sectorKey !== 'loan' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-3 items-center">
                            <input type="text" placeholder="항목명" aria-label="항목명" className="border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.name} onChange={(e) => updateAsset(sectorKey, index, 'name', e.target.value)} />
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">현재금액</label>
                                <CalculatorInput aria-label="현재금액" style={amountBgStyle} className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.amount} onChange={(e) => updateAsset(sectorKey, index, 'amount', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">월납입</label>
                                <div className="relative">
                                    <CalculatorInput aria-label="월납입액" className="w-full border rounded px-2 py-1 pr-16 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.monthlyContrib} onChange={(e) => updateAsset(sectorKey, index, 'monthlyContrib', e.target.value)} />
                                    {itemRec > 0 && (
                                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-blue-500 dark:text-blue-400 pointer-events-none font-medium">
                                            권장 납입: {Math.round(itemRec).toLocaleString()}
                                        </span>
                                    )}
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">수익률(%)</label>
                                <input type="number" step="0.1" aria-label="수익률" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.rate} onChange={(e) => updateAsset(sectorKey, index, 'rate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">수수료/세금(%)</label>
                                <input type="number" step="0.001" aria-label="수수료 및 세금" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.feeRate ?? 0} onChange={(e) => updateAsset(sectorKey, index, 'feeRate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">월수입외 납입</label>
                                <div className="flex gap-1">
                                    <input type="number" min="0" aria-label="월수입외 추가 납입액" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.extraContrib} onChange={(e) => updateAsset(sectorKey, index, 'extraContrib', e.target.value)} />
                                    {asset.extraContrib > 0 && (
                                        <select aria-label="추가 납입 출처 계좌" className="w-24 border rounded px-1 py-1 text-[10px] bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.extraFrom} onChange={(e) => updateAsset(sectorKey, index, 'extraFrom', e.target.value)}>
                                            {accountOptions.filter(name => name !== asset.name).map((name, i) => (
                                                <option key={i} value={name}>{name}</option>
                                            ))}
                                        </select>
                                    )}
                                </div>
                            </div>
                            <button onClick={() => removeAsset(sectorKey, index)} aria-label={`${asset.name} 삭제`} className="text-red-500 hover:text-red-700 whitespace-nowrap">삭제</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-8 gap-3 items-center">
                            <input type="text" placeholder="항목명" aria-label="대출명" className="border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.name} onChange={(e) => updateAsset(sectorKey, index, 'name', e.target.value)} />
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">현재잔액</label>
                                <CalculatorInput aria-label="대출 잔액" style={amountBgStyle} className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.amount} onChange={(e) => updateAsset(sectorKey, index, 'amount', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">이자율(%)</label>
                                <input type="number" step="0.1" aria-label="대출 이자율" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.rate} onChange={(e) => updateAsset(sectorKey, index, 'rate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">월 상환액</label>
                                <CalculatorInput aria-label="월 상환액" placeholder="0이면 자동계산" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.monthlyContrib} onChange={(e) => updateAsset(sectorKey, index, 'monthlyContrib', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">만기(개월)</label>
                                <input type="number" aria-label="대출 만기 개월 수" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.maturityMonth ?? 12} onChange={(e) => updateAsset(sectorKey, index, 'maturityMonth', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">상환 방식</label>
                                <select aria-label="상환 방식" className="w-full border rounded px-2 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.repaymentMethod || '원리금균등'} onChange={(e) => updateAsset(sectorKey, index, 'repaymentMethod', e.target.value)}>
                                    <option value="원리금균등">원리금균등</option>
                                    <option value="원금균등">원금균등</option>
                                    <option value="만기일시">만기일시</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">상환 계좌</label>
                                <select aria-label="상환 출금 계좌" className="w-full border rounded px-2 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.repaymentAccount} onChange={(e) => updateAsset(sectorKey, index, 'repaymentAccount', e.target.value)}>
                                    {accountOptions.filter(name => name !== asset.name).map((name, i) => (
                                        <option key={i} value={name}>{name}</option>
                                    ))}
                                </select>
                            </div>
                            <button onClick={() => removeAsset(sectorKey, index)} aria-label={`${asset.name} 삭제`} className="text-red-500 hover:text-red-700 whitespace-nowrap">삭제</button>
                        </div>
                    )}
                    </div>
                </div>
            );
        });

        // [수정] modals.js로 이동된 ErrorBoundary 사용
        const ErrorBoundary = window.ErrorBoundary || React.Fragment;

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <AssetDashboard />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
