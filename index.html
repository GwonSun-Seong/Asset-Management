<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 플래너</title>
    <script>
        // [추가] HTTPS 강제 리다이렉트 (로컬 개발 환경 제외)
        // 최적화: 라이브러리 로딩 전에 실행되도록 최상단으로 이동
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol === 'http:') {
            window.location.replace(window.location.href.replace(/^http:/, 'https:'));
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script type="text/babel" src="modals.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { font-family: 'Pretendard', sans-serif !important; }
        input, select, button, textarea { font-family: 'Pretendard', sans-serif !important; }
        input[type="number"] { font-weight: 600 !important; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        html { scroll-behavior: smooth; }
        
        /* [수정] 가이드 모달 디자인 복구 및 속도 조절 */
        .driver-popover {
            /* 속도를 0.3s -> 0.6s로 늦추고, 움직임을 더 부드럽게(cubic-bezier) 설정 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease !important;
            background-color: #ffffff !important;
            color: #1f2937 !important;
            border-radius: 16px !important;
            padding: 24px !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
            border: 1px solid #e5e7eb !important;
            max-width: 320px !important;
        }
        
        /* 다크모드 대응 */
        .dark .driver-popover {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }

        .driver-popover-title {
            font-size: 18px !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
            color: #111827 !important;
        }
        .dark .driver-popover-title { color: #ffffff !important; }

        .driver-popover-description {
            font-size: 14px !important;
            line-height: 1.6 !important;
            color: #4b5563 !important;
            margin-bottom: 24px !important;
        }
        .dark .driver-popover-description { color: #d1d5db !important; }

        /* 버튼 스타일링 (파란색 복구) */
        .driver-popover-footer button {
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            text-shadow: none !important;
        }

        /* 다음/완료 버튼 (파란색 강조) */
        .driver-popover-footer .driver-popover-next-btn,
        .driver-popover-footer .driver-popover-done-btn {
            background-color: #2563eb !important; /* 파란색 */
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3) !important;
        }
        .driver-popover-footer .driver-popover-next-btn:hover { background-color: #1d4ed8 !important; }
        
        /* 이전 버튼 */
        .driver-popover-footer .driver-popover-prev-btn {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            border: 1px solid #e5e7eb !important;
        }
        .dark .driver-popover-footer .driver-popover-prev-btn {
            background-color: #374151 !important;
            color: #e5e7eb !important;
            border-color: #4b5563 !important;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-toast { animation: slideUpFade 0.3s ease-out forwards; }
        .animate-flip { animation: flipIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
        /* 커스텀 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.8); }
        
        /* [추가] 인쇄(PDF 저장) 최적화 스타일: Ctrl+P 사용 시 적용 */
        @media print {
            @page { margin: 10mm; size: auto; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            /* UI 숨김: 헤더, 사이드바, 고정 버튼, 모바일 메뉴, 기타 장식 */
            aside, .sticky.top-0, .fixed, details, #mobile-menu-trigger { display: none !important; }
            /* 레이아웃 강제 확장 및 스크롤 제거 */
            #root, body, html { width: 100% !important; height: auto !important; overflow: visible !important; }
            #dashboard-content { display: block !important; width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
            #main-dashboard-panel { width: 100% !important; max-width: none !important; }
            /* 패널 스타일 단순화 (그림자 제거, 테두리 추가) 및 페이지 넘김 방지 */
            .rounded-xl, .rounded-lg, .rounded-2xl, .shadow-lg, .shadow-sm, .shadow {
                box-shadow: none !important; border: 1px solid #e5e7eb !important; break-inside: avoid; page-break-inside: avoid;
            }
            /* 스크롤 영역 전체 표시 (테이블 등 잘림 방지) */
            .overflow-x-auto, .overflow-y-auto { overflow: visible !important; height: auto !important; max-height: none !important; }
        }

        /* [추가] 스켈레톤 쉬머(Shimmer) 애니메이션 효과 */
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%; 
            animation: placeholderShimmer 1.5s infinite linear forwards;
        }
        .dark .shimmer {
            background: #1f2937;
            background-image: linear-gradient(to right, #1f2937 0%, #374151 20%, #1f2937 40%, #1f2937 100%);
        }
        @keyframes placeholderShimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    </style>
    <script src="defaultData.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-gradient@0.6.1/dist/chartjs-plugin-gradient.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // [추가] 인앱 브라우저(카카오톡) 감지 및 외부 브라우저 전환 스크립트
        (function() {
            const userAgent = navigator.userAgent.toLowerCase();
            const targetUrl = window.location.href;

            if (userAgent.indexOf('kakaotalk') > -1) {
                if (userAgent.indexOf('android') > -1) {
                    location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;end';
                } else if (userAgent.indexOf('iphone') > -1 || userAgent.indexOf('ipad') > -1) {
                    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                }
            }
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 font-sans">
    <div id="root"></div>

    <script type="text/babel">
            const { useState, useMemo, useEffect, useRef } = React;

        // [통합] SummaryPanel.js 내용 (CORS 오류 해결을 위해 파일 병합)
        const AssetSummaryCard = ({ calculation, projectionMonths, baseMonth, baseDate, displayMode }) => {
            const formatNumber = window.formatNumber || ((n) => Number(n || 0).toLocaleString());
            const formatPercent = window.formatPercent || ((n) => (Number(n || 0)).toFixed(1));
            const TEXTS = window.TEXTS || {};
            const lastProj = calculation.monthlyProjections && calculation.monthlyProjections[projectionMonths - 1];
            // modals.js에서 로드된 TooltipGuide 사용
            const TooltipGuide = window.TooltipGuide || (() => null);
            let compLabel = "";
            let compVal = 0;
            let compPct = 0;
        
            if (!calculation.error && projectionMonths >= 1 && calculation.monthlyProjections?.length >= projectionMonths) {
                if (projectionMonths <= 12) {
                    const prevProj = projectionMonths > 1 ? calculation.monthlyProjections[projectionMonths - 2] : { gross: calculation.currentGross };
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "전월 대비";
                } else {
                    const prevProj = calculation.monthlyProjections[projectionMonths - 12];
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "1년 전 대비";
                }
            }
        
            return (
                <div className="md:col-span-1 bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-blue-900/40 dark:to-indigo-900/40 rounded-xl shadow-lg p-6">
                    <div>
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">{TEXTS.summary?.currentTotal || "현재 총자산"}</h2>
                        <div className="flex items-end gap-2">
                            <p className="text-3xl font-bold text-blue-600 dark:text-blue-400">{formatNumber(calculation.currentGross, displayMode)}만원</p>
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">(순자산 {formatNumber(calculation.currentNet, displayMode)}만원)</span>
                        </div>
                    </div>
                    <div className="mt-6"> 
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">{projectionMonths}{TEXTS.summary?.projectedTotal || "개월 후 예상"} <span className="text-gray-400 text-sm">({(() => { 
                            try { 
                                const [y,m]= (baseDate || baseMonth || '').split('-').map(Number); 
                                const d = new Date(y||new Date().getFullYear(), (m||1)-1, 1); d.setMonth(d.getMonth()+projectionMonths); return `${String(d.getFullYear()).slice(2)}년 ${String(d.getMonth()+1).padStart(2,'0')}월`; 
                            } catch { return ''; } })()})</span></h2>
                        <div className="flex items-end gap-2">
                            <p className="text-3xl font-bold text-green-600 dark:text-green-400">{formatNumber(calculation.projectedGross, displayMode)}만원</p>
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">(순자산 {formatNumber(calculation.projectedNet, displayMode)}만원)</span>
                        </div>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">{TEXTS.summary?.expectedIncrease || "예상 증가액"}: +{formatNumber(calculation.growth, displayMode)}만원 ({formatPercent((calculation.growth) / Math.max(1, calculation.currentGross) * 100)}%)</p>         
                        {compLabel && (
                            <p className="text-xs text-gray-400 mt-1">
                                ({compLabel}: {compVal >= 0 ? '+' : ''}{formatNumber(compVal, displayMode)}만원, {compVal >= 0 ? '+' : ''}{formatPercent(compPct)}%)
                            </p>
                        )}
                        <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            {TEXTS.summary?.inflationAdjusted || "인플레이션 고려 시"}: {formatNumber(calculation.realValue, displayMode)}만원
                            <TooltipGuide tip="물가 상승률을 반영하여 현재 가치로 환산한 금액입니다." />
                        </p>
                        {calculation.fireMetrics && (
                            <div className="mt-6 pt-6 border-t border-blue-200 dark:border-blue-800">
                                <h3 className="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider mb-3 flex items-center">
                                    {TEXTS.summary?.fireAnalysis || "자립 가능성 분석 (FIRE Analysis)"}
                                    <TooltipGuide tip="경제적 자립을 통해 조기 은퇴가 가능한지 분석합니다." />
                                </h3>
                                <div className="grid grid-cols-1 gap-3">
                                    <div className="flex justify-between items-center p-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                                        <span className="text-xs text-gray-500 flex items-center">
                                            {TEXTS.summary?.survivalPeriod || "생존 가능 기간"}
                                            <TooltipGuide tip="추가 소득 없이 현재 자산으로 생활 가능한 예상 기간입니다." />
                                        </span>
                                        <span className="text-xs font-bold text-gray-900 dark:text-white">
                                            {calculation.totalMonthlyExpense > 0 ? (
                                                calculation.fireMetrics.runwayMonths >= 1200 ? '100년 이상' : `${Math.floor(calculation.fireMetrics.runwayMonths / 12)}년 ${calculation.fireMetrics.runwayMonths % 12}개월`
                                            ) : (
                                                <span className="text-red-500">지출 설정 필요</span>
                                            )}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center p-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                                        <span className="text-xs text-gray-500 flex items-center">
                                            {TEXTS.summary?.fireNeeded || "FIRE (4% 법칙) 필요자산"}
                                            <TooltipGuide tip="연간 지출의 25배를 모으면 매년 4%씩 인출해도 원금이 유지된다는 법칙입니다." />
                                        </span>
                                        <span className="text-xs font-bold text-gray-900 dark:text-white">
                                            {calculation.totalMonthlyExpense > 0 ? formatNumber(calculation.fireMetrics.swr4PercentCapital, displayMode) + '만원' : '-'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const CoreSettingsCard = ({
            monthlySalary, setMonthlySalary, baseDate, setBaseDate, // [변경] baseMonth -> baseDate
            setIsExportModalOpen, setIsImportModalOpen,
            salaryDay, setSalaryDay,
            exportToCSV, importFromCSV, saveToPDF, saveCurrentAsset, saveScenario
        }) => {
            const TEXTS = window.TEXTS || {};

            return (
                <div className="md:col-span-1 bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6"> 
                    <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">{TEXTS.settings?.coreSettings || "핵심 설정"}</h2>
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">{TEXTS.settings?.monthlySalary || "월 고정 수입 (만원)"}</label>
                                <input type="number" className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={monthlySalary} onChange={(e) => setMonthlySalary(Number(e.target.value))} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">고정 수입일</label>
                                <select 
                                    className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    value={salaryDay || 25}
                                    onChange={(e) => setSalaryDay(Number(e.target.value))}
                                >
                                    {Array.from({length: 31}, (_, i) => i + 1).map(day => (
                                        <option key={day} value={day}>{day}일</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">계산 시작일 (기준일)</label>
                            <input type="date" className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={baseDate} onChange={(e) => setBaseDate(e.target.value)} />
                        </div>
                        <div className="pt-4 border-t dark:border-gray-700">
                            <h3 className="text-sm font-bold text-gray-700 dark:text-white mb-2">{TEXTS.settings?.dataManagement || "데이터 관리"}</h3>
                            <div className="grid grid-cols-2 gap-2">
                                <button onClick={() => setIsExportModalOpen(true)} className="flex items-center justify-center gap-2 px-2 py-2 bg-emerald-500 text-white text-sm font-semibold rounded-lg hover:bg-emerald-600 shadow-sm transition-all">
                                    <span>📤</span> {TEXTS.settings?.exportData || "데이터 내보내기"}
                                </button>
                                <button onClick={() => setIsImportModalOpen(true)} className="flex items-center justify-center gap-2 px-2 py-2 bg-purple-500 text-white text-sm font-semibold rounded-lg hover:bg-purple-600 shadow-sm transition-all">
                                    <span>📥</span> {TEXTS.settings?.importData || "데이터 불러오기"}
                                </button>
                                <div className="col-span-2 mt-2">
                                    <h4 className="text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 px-1 uppercase tracking-wider">내보내기</h4>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={exportToCSV} className="flex items-center justify-center gap-2 px-2 py-2 bg-emerald-500 text-white text-sm font-semibold rounded-lg hover:bg-emerald-600 shadow-sm transition-all">
                                            <span>📊</span> {TEXTS.settings?.exportCSV || "CSV 내보내기"}
                                        </button>
                                        <label className="flex items-center justify-center gap-2 px-2 py-2 bg-purple-500 text-white text-sm font-semibold rounded-lg hover:bg-purple-600 shadow-sm transition-all cursor-pointer">
                                            <span>📥</span> {TEXTS.settings?.importCSV || "CSV 불러오기"}
                                            <input type="file" accept=".csv" onChange={importFromCSV} className="hidden" />
                                        </label>
                                    </div>
                                </div>
                                <button onClick={saveCurrentAsset} className="flex items-center justify-center gap-2 px-3 py-2 bg-indigo-500 text-white text-sm font-semibold rounded-lg hover:bg-indigo-600 shadow-sm hover:shadow-md transition-all mt-2">
                                    <span>💾</span> {TEXTS.settings?.saveHistory || "히스토리 저장"}
                                </button>
                                <button onClick={saveScenario} className="flex items-center justify-center gap-2 px-3 py-2 bg-gray-600 text-white text-sm font-semibold rounded-lg hover:bg-gray-700 shadow-sm hover:shadow-md transition-all mt-2">
                                    <span>💾</span> 시나리오 저장
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GoalSettingsCard = ({
            goalMode, setGoalMode, setGoalSeekResult,
            projectionMonths, setProjectionMonths, targetAmount, setTargetAmount,
            calculateGoalSeek, goalSeekResult,
            inflationRate, setInflationRate
        }) => {
            const TEXTS = window.TEXTS || {};
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    setProjectionMonths(prev => prev >= 120 ? 0 : prev);
                    interval = setInterval(() => {
                        setProjectionMonths(prev => {
                            if (prev >= 120) { setIsPlaying(false); return 120; }
                            return prev + 1;
                        });
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isPlaying, setProjectionMonths]);

            return (
                <div className="md:col-span-1 bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6"> 
                    <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">{TEXTS.settings?.goalSettings || "목표 설정"}</h2>
                    <div className="mb-4">
                        <div className="flex border border-gray-200 dark:border-gray-700 rounded-lg p-1 bg-gray-100 dark:bg-gray-900">
                            <button onClick={() => { setGoalMode('period'); setGoalSeekResult(null); }} className={`flex-1 py-2 text-sm font-semibold rounded-md transition-colors ${goalMode === 'period' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 shadow' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800'}`}>
                                {TEXTS.settings?.periodBased || "기간 기준"}
                            </button>

        // [추가] 실행 취소/다시 실행 훅 (Undo/Redo) - 디바운싱 포함
        const useUndoRedo = (initialState) => {
            // [수정] 상태 관리를 하나의 객체로 통합하여 setState 내부 사이드 이펙트 제거
            const [history, setHistory] = useState({
                past: [],
                present: initialState,
                future: []
            });
            const { past, present, future } = history;
            
            // [추가] 상태 동기화를 위한 Ref (이벤트 핸들러 내 최신 상태 참조용)
            const historyRef = useRef(history);
            useEffect(() => { historyRef.current = history; }, [history]);
            
            const lastHistoryTime = useRef(0);

            const set = React.useCallback((newState) => {
                const curr = historyRef.current;
                const computedState = typeof newState === 'function' ? newState(curr.present) : newState;
                
                // 상태가 변경되지 않았으면 리턴
                if (JSON.stringify(curr.present) === JSON.stringify(computedState)) return;

                const now = Date.now();
                const shouldSave = now - lastHistoryTime.current > 500;

                if (shouldSave) {
                    lastHistoryTime.current = now;
                    setHistory(prev => ({
                        past: [...prev.past, prev.present].slice(-30),
                        present: computedState,
                        future: []
                    }));
                } else {
                    setHistory(prev => ({
                        ...prev,
                        present: computedState,
                        future: []
                    }));
                }
            }, []);

            const undo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.past.length === 0) return curr;
                    const previous = curr.past[curr.past.length - 1];
                    const newPast = curr.past.slice(0, curr.past.length - 1);
                    return {
                        past: newPast,
                        present: previous,
                        future: [curr.present, ...curr.future]
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const redo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.future.length === 0) return curr;
                    const next = curr.future[0];
                    const newFuture = curr.future.slice(1);
                    return {
                        past: [...curr.past, curr.present],
                        present: next,
                        future: newFuture
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const reset = React.useCallback((newState) => {
                setHistory({
                    past: [],
                    present: newState,
                    future: []
                });
            }, []);

            return { state: present, setState: set, undo, redo, canUndo: past.length > 0, canRedo: future.length > 0, reset };
        };

        // [수정] 패널 래퍼 컴포넌트 (접기/펴기 기능 추가)

            // 100% 기준으로 비율 재계산 (정규화)
            const normalizedTargets = validSectors.map(key => {

        // [추가] 시장 지표 위젯
        const MarketDataWidget = ({ darkMode }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            const [isLoading, setIsLoading] = useState(false);
            const [marketItems, setMarketItems] = useState(window.INITIAL_MARKET_ITEMS || []);
            const retryCountRef = useRef(0);

            // [추가] 상태 추적 및 재시도 로직을 위한 Ref
            const marketItemsRef = useRef(marketItems);
            useEffect(() => { marketItemsRef.current = marketItems; }, [marketItems]);
            const retryTimeoutRef = useRef(null);

            // [수정] 실제 API 데이터 페칭 함수 (수동 새로고침 및 자동 재시도 지원)
            const fetchMarketData = React.useCallback(async (forceRefresh = false) => {
                // forceRefresh가 이벤트 객체인 경우(버튼 클릭) true로 처리
                const isForce = typeof forceRefresh === 'boolean' ? forceRefresh : true;
                
                if (retryTimeoutRef.current) clearTimeout(retryTimeoutRef.current);
                if (isForce) retryCountRef.current = 0;
                setIsLoading(true);

                const targets = [
                    { name: 'USD/KRW', fn: () => window.fetchYahooData('KRW=X') },
                    { name: 'S&P 500', fn: () => window.fetchYahooData('^GSPC') },
                    { name: 'NASDAQ', fn: () => window.fetchYahooData('^IXIC') },
                    { name: 'Gold', fn: () => window.fetchYahooData('GC=F') },
                    { name: 'Bitcoin', fn: () => window.fetchBitcoinData() }
                ];

                // 강제 새로고침이거나 아직 실시간 데이터가 없는 항목만 필터링
                const itemsToFetch = isForce 
                    ? targets 
                    : targets.filter(t => {
                        const item = marketItemsRef.current.find(m => m.name === t.name);
                        return item && !item.isLive;
                    });

                if (itemsToFetch.length === 0) {
                    setIsLoading(false);
                    return;
                }

                try {
                    const results = await Promise.allSettled(
                        itemsToFetch.map(t => t.fn().then(data => ({ ...t, data })))
                    );

                    let failCount = 0;

                    setMarketItems(prev => {
                        const next = [...prev];
                        results.forEach(res => {
                            if (res.status === 'fulfilled' && res.value.data) {
                                const { name, data } = res.value;
                                const idx = next.findIndex(item => item.name === name);
                                if (idx === -1) return;

                                const item = next[idx];
                                const sign = data.change >= 0 ? '+' : '';
                                const color = data.change >= 0 ? 'red' : 'blue';
                                const formattedValue = (item.name === 'Gold' || item.name === 'Bitcoin') 
                                    ? `$${data.price.toLocaleString(undefined, {maximumFractionDigits: 2})}`
                                    : data.price.toLocaleString(undefined, {maximumFractionDigits: 2});

                                next[idx] = {
                                    ...item,
                                    value: formattedValue,
                                    change: `${sign}${data.change.toFixed(2)}%`,
                                    color: color,
                                    data: data.data,
                                    isLive: true
                                };
                            } else {
                                failCount++;
                            }
                        });
                        return next;
                    });

                    // 실패한 항목이 있고 3회 미만일 경우 3초 후 자동으로 다시 시도
                    if (failCount > 0 && retryCountRef.current < 3) {
                        retryCountRef.current += 1;
                        retryTimeoutRef.current = setTimeout(() => fetchMarketData(false), 3000);
                    }

                } catch (e) {
                    console.warn("Market data fetch failed", e);
                    if (retryCountRef.current < 3) retryTimeoutRef.current = setTimeout(() => fetchMarketData(false), 5000);
                } finally {
                    setIsLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchMarketData(true);
                return () => { if (retryTimeoutRef.current) clearTimeout(retryTimeoutRef.current); };
            }, [fetchMarketData]);

            const currentItem = marketItems[currentIndex];
            const nextItem = () => setCurrentIndex((prev) => (prev + 1) % marketItems.length);
            const prevItem = () => setCurrentIndex((prev) => (prev - 1 + marketItems.length) % marketItems.length);

            useEffect(() => {
                if (canvasRef.current && typeof Chart !== 'undefined') {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = canvasRef.current.getContext('2d');

                        type: 'line',
                        data: {

                                borderColor: lineColor,
                                backgroundColor: bgColor,
                                borderWidth: 2,
                                pointRadius: 0,
                                pointHoverRadius: 4,
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: 'index',
                                intersect: false,
                            },

                                tooltip: {

                                    titleColor: darkMode ? '#000' : '#fff',

                                    displayColors: false,
                                    callbacks: {
                                        label: (context) => {
                                            const val = context.parsed.y;
                                            if (currentItem.name === 'USD/KRW') return `₩${val.toLocaleString()}`;
                                            if (['Bitcoin', 'Gold'].includes(currentItem.name)) return `$${val.toLocaleString()}`;
                                            return val.toLocaleString();
                                        }
                                    }
                                } 
                            },
                            scales: { 
                                x: { display: true, ticks: { display: false }, grid: { display: false } }, // X축 선은 표시하되 눈금 숨김
                                y: { display: false } 
                            },
                            layout: { padding: 0 },
                            animation: { duration: 0 }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [currentIndex, darkMode, currentItem]);

            }

                            {isLoading ? (
                                <span className="text-[10px] text-blue-500 animate-pulse">업데이트 중...</span>
                            ) : (
                                <span className={`text-[10px] ${currentItem.isLive ? 'text-green-500' : 'text-gray-400'}`}>{currentItem.isLive ? '● 실시간' : '○ 데모'}</span>
                            )}

                            <button onClick={prevItem} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded"><svg className="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg></button>
                            <button onClick={nextItem} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded"><svg className="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg></button>
                        </div>

                    <div className="flex flex-col">
                        <div className="flex justify-between items-end mb-2">
                            <div>
                                <div className="text-sm font-bold text-gray-800 dark:text-white">{currentItem.name}</div>

        const CalculatorInput = ({ value, onChange, className, placeholder, style, ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                if (!isEditing) {
                    setLocalValue(value);
                }
            }, [value, isEditing]);

            const safeEvaluate = (str) => {
                try {
                    if (/[^0-9+\-*/.()\s]/.test(str)) return null;
                    // eslint-disable-next-line no-new-func
                    const result = new Function('return ' + str)();
                    return isFinite(result) ? result : null;
                } catch (e) {
                    return null;
                }
            };

            const handleBlur = () => {
                const strVal = String(localValue).trim();
                if (/[\+\-\*\/]/.test(strVal)) {
                    const result = safeEvaluate(strVal);
                    if (result !== null) {
                        const finalVal = Math.round(result * 100) / 100;
                        setLocalValue(finalVal);
                        onChange({ target: { value: finalVal } });
                    } else { setLocalValue(value); }
                } else { 
                    // [수정] 090 -> 90 등 숫자 형식 자동 보정
                    const numVal = parseFloat(strVal);
                    if (!isNaN(numVal)) {
                        setLocalValue(numVal);
                        onChange({ target: { value: numVal } });
                    } else {
                        onChange({ target: { value: strVal } });
                    }
                }
                setIsEditing(false);
            };

            return (
                <input type={isEditing ? "text" : "number"} value={localValue} onChange={(e) => setLocalValue(e.target.value)} onBlur={handleBlur} className={className} placeholder={placeholder} style={style} step="any" {...props}
                    onFocus={(e) => e.target.select()}
                    onKeyDown={(e) => {
                        if (e.key === 'Enter') e.target.blur();
                        if (!isEditing && ['+', '-', '*', '/'].includes(e.key)) {

            // [추가] 패널 이동 함수
            const scrollToPanel = (id) => {

            // ===== 초기 데이터 로드 =====
            useEffect(() => {

                const loadInitialData = async () => {

                        // [요구사항 5] loadServerConfig 안전 실행
                        try {

                        const initialHistory = savedHistory ? JSON.parse(savedHistory) : (baseData.history || []);
                        
                        if (savedScenarios) setScenarios(initialScenarios);
                        setAssetHistory(initialHistory);

                if (savedData) {

                                ...baseData,

                                rebalancingAlerts: { ...baseData.rebalancingAlerts, ...parsedData.rebalancingAlerts },
                            };
                            if (mergedData.memo === undefined) mergedData.memo = baseData.memo;

                            // 마이그레이션: ID, 대출 시작일, 다크모드 필드 보강

                            Object.keys(parsedData.assets||{}).forEach(sector=>{
                                (parsedData.assets[sector]||[]).forEach(a=>{ if (a.feeRate === undefined) a.feeRate = 0; });
                            });
                            setAppData(mergedData); // [수정] parsedData 대신 mergedData 사용
                            setOriginalUserData(parsedData); // [추가]
                            lastSavedDataRef.current = JSON.stringify({ appData: mergedData, scenarios: initialScenarios, assetHistory: initialHistory });
                        } else {

                            lastSavedDataRef.current = JSON.stringify({ appData: baseData, scenarios: initialScenarios, assetHistory: initialHistory });
                        }
                    } catch (error) {
                        console.error("로컬 데이터 로드 오류 (초기화 진행):", error);
                        // [수정] 데이터 손상 시 로컬스토리지 초기화하여 무한 로딩/에러 방지
                        localStorage.removeItem('assetDashboardDataV3');
                        setAppData(baseData);
                        lastSavedDataRef.current = JSON.stringify(baseData);
                    }

                    // [요구사항 3] Safe Session Handling
                    if (supabase) {
                        setDbStatus('connected');
                        const { data: { session } } = await withRetry(() => supabase.auth.getSession(), 3, 2000)

                        if (session) {

            // [추가] 온보딩 가이드 트리거 로직
            useEffect(() => {

        // [최적화] 상태 추적을 위한 Ref (단축키 및 이벤트 리스너 stale closure 방지)
            const appDataRef = useRef(appData);
        const scenariosRef = useRef(scenarios);
        const assetHistoryRef = useRef(assetHistory);

        // [최적화] 클라우드 저장 함수 (순서 조정: 리스너보다 먼저 선언되어야 함)
        const saveToCloud = React.useCallback(async (unifiedData, force = false, emailOverride = null, proOverride = null, keyOverride = null, modeOverride = null) => {
            if (!supabase) {
                if (force) console.warn("Cloud save skipped: Supabase not initialized.");
                return;
            }

            const targetEmail = emailOverride || verifiedEmail;
            const targetPro = proOverride !== null ? proOverride : isPro;
            const targetMode = modeOverride || encryptionMode;
            if (!targetEmail || isDemoMode || !unifiedData || !isInitialized || !isCloudLoaded) return;
            if (!force && (!isCloudLoaded || isFetchingRef.current)) return;

            const currentDataStr = JSON.stringify(unifiedData);
            if (!force && currentDataStr === lastSavedDataRef.current) return;

            let payloadData = unifiedData;
            if (targetPro && targetMode) {
                let key = keyOverride;
                
                if (!key) {
                    let secret = null;
                    if (targetMode === 'secure') {
                        secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                        if (!secret) {
                            pendingSave.current = true;
                            setIsPasswordPromptOpen(true);
                            return;
                        }
                    }
                    key = window.getEncryptionKey(targetMode, secret, targetEmail, SECURITY_KEY);
                }

                if (!key) {
                    if (targetMode === 'normal') {
                        addToast('Cloud sync disabled: System Security Key missing.', 'error');
                    } else {
                        addToast('보안 키 설정 오류로 저장이 중단되었습니다.', 'error');
                    }
                    setSyncStatus('error');
                    return;
                }
                try {
                    payloadData = encryptData(unifiedData, key);
                } catch (e) {
                    console.error("Encryption error:", e);
                    addToast('데이터 암호화 중 오류가 발생했습니다.', 'error');
                    setSyncStatus('error');
                    return; // Early return on encryption failure
                }
            }

            setSyncStatus('syncing');
            try {
                    // [수정] 클라우드 저장 시에도 로컬 날짜 기준 사용 (히스토리와 일관성 유지)
                    const now = new Date();
                    const recordDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                await withRetry(() => supabase.auth.refreshSession());
                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets').upsert({ 
                        email: targetEmail, data: payloadData,
                        encryption_type: targetPro ? targetMode : null,
                        updated_at: new Date().toISOString(),
                            record_date: recordDate
                    }, { onConflict: 'email,record_date' }).select('updated_at').single()
                );
                if (error) throw error;
                if (data) {
                    setSyncStatus('synced');
                    setLastSyncTime(new Date().toLocaleTimeString('ko-KR', { hour12: false }));
                    localStorage.setItem('assetDashboardLastUpdate', data.updated_at);
                    lastSavedDataRef.current = currentDataStr;
                }
            } catch (error) {
                console.error('Sync error:', error);
                setSyncStatus('error');
                setSyncStatusError(error.message || '저장 실패');
                setLastSyncTime(null);
            } // This finally block was removed as it was empty and unnecessary
        }, [verifiedEmail, isPro, encryptionMode, userSecretKey, userProfile, isDemoMode, supabase, isInitialized, isCloudLoaded, withRetry, getEncryptionKey]);

        // 클라우드 데이터 불러오기
        const fetchFromCloud = React.useCallback(async (email = verifiedEmail, pro = isPro, isInitialLoad = false, isManual = false, localDataOverride = null) => {
            if (!supabase || isProcessing.current || isFetchingRef.current) return;
            isFetchingRef.current = true; // Lock fetching
            setSyncStatus('syncing');
            setIsLoadingCloud(true);
            try {
                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets')
                        .select('data, updated_at, encryption_type')
                        .eq('email', email)
                        .order('record_date', { ascending: false })
                        .order('updated_at', { ascending: false })
                        .limit(1)
                        .maybeSingle()
                );
                if (error) throw error;

                if (data && data.data) {
                    const encType = data.encryption_type;
                    const isLegacy = !encType || encType === 'none';
                    if (pro && isLegacy) setIsEncryptionModalOpen(true);
                    else if (pro) setEncryptionMode(encType);

                    let decryptedData = data.data;
                    if (!isLegacy && pro) {
                        // [수정] 일반 보안 모드(normal)일 때는 비밀번호를 참조하지 않음
                        let secret = null;
                        if (encType === 'secure') {
                            secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                            if (!secret) {
                                pendingCiphertext.current = data.data;
                                setIsPasswordPromptOpen(true);
                                return; // finally block will handle state reset
                            }
                        }
                        
                        // [Fix] Consistent Encryption Identity: Always use email via global helper
                        const key = window.getEncryptionKey(encType, secret, email, SECURITY_KEY);

                        // [수정] 일반 모드에서 보안 키(SECURITY_KEY)가 없는 경우 예외 처리
                        if (!key && encType === 'normal') {
                            addToast('시스템 보안 키가 설정되지 않아 데이터를 불러올 수 없습니다. (환경변수 확인 필요)', 'error');
                            setSyncStatus('error');
                            return; // finally block will handle state reset
                        }

                        try {
                            decryptedData = decryptData(data.data, key);
                        } catch (err) {
                            let recovered = false;
                            // [추가] 이전 버전 데이터(이메일 솔트 없음) 복구 시도 (Fallback)
                            if (encType === 'normal' && SECURITY_KEY && key !== SECURITY_KEY) {
                                try {
                                    decryptedData = decryptData(data.data, SECURITY_KEY);
                                    recovered = true;
                                    addToast('이전 보안 형식의 데이터를 변환하여 불러왔습니다.', 'success');
                                } catch (e) { /* Fallback failed */ }
                            }

                            if (!recovered) {
                                if (encType === 'normal') {
                                    // [수정] 덮어쓰기 전 유효한 보안 키가 있는지 먼저 확인 (무한 루프 방지)
                                    const newKey = window.getEncryptionKey('normal', null, email, SECURITY_KEY);
                                    if (!newKey) {
                                        addToast("시스템 보안 키(SECURITY_KEY)가 설정되지 않아 데이터를 덮어쓸 수 없습니다. 환경변수를 확인하거나 설정에서 '보안 모드'로 전환하세요.", 'error');
                                        setSyncStatus('error');
                                        return;
                                    }

                                    // [Fix] Safe Recovery: Block overwrite if local data is default
                                    const isLocalDataDefault = JSON.stringify(appDataRef.current) === JSON.stringify(window.publicDefaultData);
                                    if (isLocalDataDefault) {
                                        addToast("복호화 실패: 보안 키가 일치하지 않습니다. 로컬 데이터가 초기 상태라 덮어쓰기가 차단되었습니다. 환경변수를 확인해주세요.", 'error');
                                    } else if (confirm("보안 키 불일치: 클라우드 데이터에 접근할 수 없습니다. 현재 로컬 데이터로 클라우드를 덮어쓰고 문제를 해결하시겠습니까?")) {
                                        const localData = localDataOverride || { appData: appDataRef.current, scenarios: scenariosRef.current, assetHistory: assetHistoryRef.current };
                                        await saveToCloud(localData, true, email, pro);
                                        // [추가] 덮어쓰기 성공 시 즉시 상태 업데이트하여 재진입 방지
                                        setIsCloudLoaded(true);
                                        setSyncStatus('synced');
                                        addToast('클라우드 데이터가 현재 로컬 데이터로 갱신되었습니다.', 'success');
                                    }
                                    return;
                                } else {
                                    addToast('데이터 복호화 실패: 비밀번호가 다르거나 데이터가 손상되었습니다.', 'error');
                                    console.error("Decryption failed:", err);
                                    setSyncStatus('error');
                                    return; // Stop further processing
                                }
                            }
                        }
                    }
                    const cloudTime = new Date(data.updated_at).getTime();
                    const localTime = new Date(localStorage.getItem('assetDashboardLastUpdate') || 0).getTime();

                    let shouldUpdateFromCloud = isManual || !localTime || cloudTime >= localTime;

                    if (!shouldUpdateFromCloud && isInitialLoad && localTime > cloudTime) {
                        if (confirm("기기의 데이터가 더 최신입니다. 클라우드 데이터를 불러오시겠습니까?\n(취소 시 로컬 데이터가 유지되며, 데이터 보호를 위해 자동 저장이 중단됩니다.)")) {
                            shouldUpdateFromCloud = true;
                        } else {
                            // [수정] 취소 시 클라우드 덮어쓰기 방지 및 자동 저장 비활성화 (Safe Mode)
                            // setIsCloudLoaded(true)를 호출하지 않음으로써 useEffect 자동 저장을 원천 차단함
                            addToast("로컬 데이터를 유지합니다. 클라우드 보호를 위해 자동 저장이 비활성화되었습니다.", "warning");
                            setSyncStatus('idle');
                            return;
                        }
                    }

                    if (shouldUpdateFromCloud) {
                        const actualAppData = decryptedData.appData || decryptedData;

                } else {

                if (!session?.user || (isCheckingSubscriptionRef.current && !isManualCheck)) return;

                setSyncStatus('syncing');

                                netWorth,

                            };

                                time: currentTime,

                                timestamp: now.getTime()
                            });

                    // [수정] utils.js의 decompressData 사용
                    const importData = window.decompressData(compressedData);
                    
                    if (!importData.version) {
                        throw new Error('잘못된 데이터 형식입니다.');
                    }

                    if (confirm('현재 데이터를 모두 덮어쓰고 불러오시겠습니까?')) {
                        if (selection.appData && importData.appData) setAppData(importData.appData);
                        if (selection.scenarios && importData.scenarios) setScenarios(importData.scenarios);
                        if (selection.assetHistory && importData.assetHistory) setAssetHistory(importData.assetHistory);
                        addToast('자산 데이터가 성공적으로 불러와졌습니다!', 'success');
