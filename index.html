        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol === 'http:') {
            window.location.replace(window.location.href.replace(/^http:/, 'https:'));

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || 
                (e.ctrlKey && e.key.toUpperCase() === 'U')) {
                e.preventDefault();
            }
        });

        const AssetSummaryCard = ({ calculation, projectionMonths, baseMonth, baseDate, displayMode, editingPhase }) => {
            const formatNumber = window.formatNumber || ((n) => Number(n || 0).toLocaleString());
            const formatPercent = window.formatPercent || ((n) => (Number(n || 0)).toFixed(1));
            const TEXTS = window.TEXTS || {};
            const lastProj = calculation.monthlyProjections && calculation.monthlyProjections[projectionMonths - 1];
            // modals.jsм—җм„ң лЎңл“ңлҗң TooltipGuide мӮ¬мҡ©
            const TooltipGuide = window.TooltipGuide || (() => null);
            const isEditing = editingPhase !== null; // [м¶”к°Җ] нҺём§‘ лӘЁл“ң м—¬л¶Җ нҷ•мқё
            let compLabel = "";
            let compVal = 0;
            let compPct = 0;
        
            if (!calculation.error && projectionMonths >= 1 && calculation.monthlyProjections?.length >= projectionMonths) {
                if (projectionMonths <= 12) {
                    const prevProj = projectionMonths > 1 ? calculation.monthlyProjections[projectionMonths - 2] : { gross: calculation.currentGross };
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "м „мӣ” лҢҖл№„";
                } else {
                    const prevProj = calculation.monthlyProjections[projectionMonths - 12];
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "1л…„ м „ лҢҖл№„";
                }
            }
        
            return (
                <div className="md:col-span-1 bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-blue-900/40 dark:to-indigo-900/40 rounded-xl shadow-lg p-6">
                    <div>
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">
                            {isEditing ? `рҹҡҖ ${editingPhase.displayLabel} мһҗмӮ° мғҒнғң (к°ҖмғҒ)` : (TEXTS.summary?.currentTotal || "нҳ„мһ¬ мҙқмһҗмӮ°")}
                        </h2>
                        <div className="flex items-end gap-2">
                            <p className="text-3xl font-bold text-blue-600 dark:text-blue-400">{formatNumber(calculation.currentGross, displayMode)}л§Ңмӣҗ</p>
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">(мҲңмһҗмӮ° {formatNumber(calculation.currentNet, displayMode)}л§Ңмӣҗ)</span>
                        </div>
                    </div>
                    {!isEditing && (
                        <div className="mt-6"> 
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">{projectionMonths}{TEXTS.summary?.projectedTotal || "к°ңмӣ” нӣ„ мҳҲмғҒ"} <span className="text-gray-400 text-sm">({(() => { 
                            try { 
                                const [y,m]= (baseDate || baseMonth || '').split('-').map(Number); 
                                const d = new Date(y||new Date().getFullYear(), (m||1)-1, 1); d.setMonth(d.getMonth()+projectionMonths); return `${String(d.getFullYear()).slice(2)}л…„ ${String(d.getMonth()+1).padStart(2,'0')}мӣ”`;

                        {compLabel && (
                            <p className="text-xs text-gray-400 mt-1">
                                ({compLabel}: {compVal >= 0 ? '+' : ''}{formatNumber(compVal, displayMode)}л§Ңмӣҗ, {compVal >= 0 ? '+' : ''}{formatPercent(compPct)}%)

        const useUndoRedo = (initialState) => {
            // [мҲҳм •] мғҒнғң кҙҖлҰ¬лҘј н•ҳлӮҳмқҳ к°қмІҙлЎң нҶөн•©н•ҳм—¬ setState лӮҙл¶Җ мӮ¬мқҙл“ң мқҙнҺҷнҠё м ңкұ°
            const [history, setHistory] = useState({
                past: [],
                present: initialState,
                future: []
            });
            const { past, present, future } = history;
            
            // [м¶”к°Җ] мғҒнғң лҸҷкё°нҷ”лҘј мң„н•ң Ref (мқҙлІӨнҠё н•ёл“Өлҹ¬ лӮҙ мөңмӢ  мғҒнғң м°ёмЎ°мҡ©)
            const historyRef = useRef(history);
            useEffect(() => { historyRef.current = history; }, [history]);
            
            const lastHistoryTime = useRef(0);

            const set = React.useCallback((newState) => {
                const curr = historyRef.current;
                const computedState = typeof newState === 'function' ? newState(curr.present) : newState;
                
                // мғҒнғңк°Җ ліҖкІҪлҗҳм§Җ м•Ҡм•ҳмңјл©ҙ лҰ¬н„ҙ
                if (JSON.stringify(curr.present) === JSON.stringify(computedState)) return;

                const now = Date.now();
                const shouldSave = now - lastHistoryTime.current > 500;

                if (shouldSave) {
                    lastHistoryTime.current = now;
                    setHistory(prev => ({
                        past: [...prev.past, prev.present].slice(-30),
                        present: computedState,
                        future: []
                    }));
                } else {
                    setHistory(prev => ({
                        ...prev,
                        present: computedState,
                        future: []
                    }));
                }
            }, []);

            const undo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.past.length === 0) return curr;
                    const previous = curr.past[curr.past.length - 1];
                    const newPast = curr.past.slice(0, curr.past.length - 1);
                    return {
                        past: newPast,
                        present: previous,
                        future: [curr.present, ...curr.future]
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const redo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.future.length === 0) return curr;
                    const next = curr.future[0];
                    const newFuture = curr.future.slice(1);
                    return {
                        past: [...curr.past, curr.present],
                        present: next,
                        future: newFuture
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const reset = React.useCallback((newState) => {
                setHistory({
                    past: [],
                    present: newState,
                    future: []
                });
            }, []);

            return { state: present, setState: set, undo, redo, canUndo: past.length > 0, canRedo: future.length > 0, reset };
        };

        // [Fix] нҺҳмқҙмҰҲ(лҜёлһҳ мӢңм җ) нҺём§‘ лҚ°мқҙн„° лі‘н•© н—¬нҚј н•ЁмҲҳ (мӨ‘ліө лЎңм§Ғ нҶөн•© л°Ҹ мҠӨл§ҲнҠё мҳӨлІ„лқјмқҙл“ң м¶”м¶ң)
        const getPhaseMergedAppData = (currentAppData, currentEditingPhase) => {
            if (!currentEditingPhase) return currentAppData;

            const original = currentEditingPhase.originalAppData;
            const pureProjectedAssets = currentEditingPhase.pureProjectedState;
            const currentAssets = currentAppData.assets;
            const modifiedAssetsToSave = {};

            Object.keys(currentAssets).forEach(sector => {
                const sectorAssets = currentAssets[sector] || [];
                const pureSectorAssets = pureProjectedAssets[sector] || [];
                const phaseSectorAssets = [];

                sectorAssets.forEach(asset => {
                    const pureAsset = pureSectorAssets.find(a => a.id === asset.id);
                    if (!pureAsset) {
                        // лҜёлһҳ мӢңм җм—җ мғҲлЎӯкІҢ м¶”к°Җлҗң мһҗмӮ°мқҖ нҶөм§ёлЎң м ҖмһҘ
                        phaseSectorAssets.push({ ...asset });
                    } else {
                        // кё°мЎҙм—җ мһҲлҚҳ мһҗмӮ°мқҖ мӮ¬мҡ©мһҗк°Җ "мқҳлҸ„м ҒмңјлЎң л°”кҫј мҶҚм„ұ"л§Ң кіЁлқјм„ң м ҖмһҘ (мҠӨл§ҲнҠё мҳӨлІ„лқјмқҙл“ң)
                        const diff = {};
                        let hasChanges = false;
                        
                        const checkAndAdd = (key) => { if (asset[key] !== pureAsset[key]) { diff[key] = asset[key]; hasChanges = true; } };

                        if (Math.abs((asset.amount || 0) - (pureAsset.amount || 0)) > 0.001) {
                            diff.amount = asset.amount;
                            diff.isAmountOverridden = true;
                            hasChanges = true;
                        } else {
                            diff.isAmountOverridden = false;
                        }

                        ['name', 'icon', 'memo', 'rate', 'feeRate', 'monthlyContrib', 'monthlyContributionFrom', 'maturityMonth', 'repaymentMethod', 'repaymentAccount', 'loanStartDate'].forEach(checkAndAdd);

                        if (hasChanges) {
                            phaseSectorAssets.push({ id: asset.id, ...diff });
                        } else {
                            // [Fix] л¶„кё° нҺём§‘ мӢң, мҲҳм •н•ҳм§Җ м•ҠмқҖ мһҗмӮ°л“Өмқҙ лҚ®м–ҙм“°кё° кіјм •м—җм„ң лҲ„лқҪлҗҳм–ҙ мӢңл®¬л Ҳмқҙм…ҳ нҶөкіј мӢң нҶөм§ёлЎң мҰқл°ңн•ҙ лІ„лҰ¬лҠ” м№ҳлӘ…м Ғ лІ„к·ё н•ҙкІ°
                            phaseSectorAssets.push({ id: asset.id });
                        }
                    }
                });
                // [Fix] л№Ҳ м„№н„°лқјлҸ„ мӮ¬мҡ©мһҗк°Җ лӘ…мӢңм ҒмңјлЎң лӘЁл“  н•ӯлӘ©мқ„ м§Җмӣ мқ„ кІҪмҡ°лҘј мң„н•ҙ лҚ®м–ҙм“°кё° к°қмІҙм—җ н•ӯмғҒ н• лӢ№
                modifiedAssetsToSave[sector] = phaseSectorAssets;
            });

            const updatedPhaseData = {};
            if (currentAppData.monthlySalary !== original.monthlySalary) updatedPhaseData.monthlySalary = currentAppData.monthlySalary;
            if (JSON.stringify(currentAppData.monthlyExpenses) !== JSON.stringify(original.monthlyExpenses)) updatedPhaseData.monthlyExpenses = currentAppData.monthlyExpenses;
            if (currentAppData.salaryDay !== original.salaryDay) updatedPhaseData.salaryDay = currentAppData.salaryDay;
            if (currentAppData.mainCashFlowAccount !== original.mainCashFlowAccount) updatedPhaseData.mainCashFlowAccount = currentAppData.mainCashFlowAccount;
            if (currentAppData.residualAccount !== original.residualAccount) updatedPhaseData.residualAccount = currentAppData.residualAccount;
            if (Object.keys(modifiedAssetsToSave).length > 0) updatedPhaseData.assets = modifiedAssetsToSave;

            const newPhases = [...(original.futurePhases || [])];
            newPhases[currentEditingPhase.index] = { 
                ...newPhases[currentEditingPhase.index], 
                data: updatedPhaseData 
            };

            return { ...original, futurePhases: newPhases };
        };

        const PanelWrapper = ({ id, title, moveUp, moveDown, isFirst, isLast, isCollapsed, onToggle, children, className = "bg-white dark:bg-gray-900 rounded-lg shadow" }) => {

        const MarketDataWidget = ({ darkMode }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            const [isLoading, setIsLoading] = useState(false);
            const [marketItems, setMarketItems] = useState(window.INITIAL_MARKET_ITEMS || []);
            const retryCountRef = useRef(0);

            // [м¶”к°Җ] мғҒнғң м¶”м Ғ л°Ҹ мһ¬мӢңлҸ„ лЎңм§Ғмқ„ мң„н•ң Ref
            const marketItemsRef = useRef(marketItems);
            useEffect(() => { marketItemsRef.current = marketItems; }, [marketItems]);
            const retryTimeoutRef = useRef(null);

            // [мҲҳм •] мӢӨм ң API лҚ°мқҙн„° нҺҳм№ӯ н•ЁмҲҳ (мҲҳлҸҷ мғҲлЎңкі м№Ё л°Ҹ мһҗлҸҷ мһ¬мӢңлҸ„ м§Җмӣҗ)
            const fetchMarketData = React.useCallback(async (forceRefresh = false) => {
                // forceRefreshк°Җ мқҙлІӨнҠё к°қмІҙмқё кІҪмҡ°(лІ„нҠј нҒҙлҰӯ) trueлЎң мІҳлҰ¬
                const isForce = typeof forceRefresh === 'boolean' ? forceRefresh : true;
                
                if (retryTimeoutRef.current) clearTimeout(retryTimeoutRef.current);
                if (isForce) retryCountRef.current = 0;
                setIsLoading(true);

                const targets = [
                    { name: 'USD/KRW', fn: () => window.fetchYahooData('KRW=X') },
                    { name: 'S&P 500', fn: () => window.fetchYahooData('^GSPC') },
                    { name: 'NASDAQ', fn: () => window.fetchYahooData('^IXIC') },
                    { name: 'Gold', fn: () => window.fetchYahooData('GC=F') },
                    { name: 'Bitcoin', fn: () => window.fetchBitcoinData() }
                ];

                // к°•м ң мғҲлЎңкі м№Ёмқҙкұ°лӮҳ м•„м§Ғ мӢӨмӢңк°„ лҚ°мқҙн„°к°Җ м—ҶлҠ” н•ӯлӘ©л§Ң н•„н„°л§Ғ
                const itemsToFetch = isForce 
                    ? targets 
                    : targets.filter(t => {
                        const item = marketItemsRef.current.find(m => m.name === t.name);
                        return item && !item.isLive;
                    });

                if (itemsToFetch.length === 0) {
                    setIsLoading(false);
                    return;
                }

                try {
                    const results = await Promise.allSettled(
                        itemsToFetch.map(t => t.fn().then(data => ({ ...t, data })))
                    );

                    let failCount = 0;

                    setMarketItems(prev => {
                        const next = [...prev];
                        results.forEach(res => {
                            if (res.status === 'fulfilled' && res.value.data) {
                                const { name, data } = res.value;
                                const idx = next.findIndex(item => item.name === name);
                                if (idx === -1) return;

                                const item = next[idx];
                                const sign = data.change >= 0 ? '+' : '';
                                const color = data.change >= 0 ? 'red' : 'blue';
                                const formattedValue = (item.name === 'Gold' || item.name === 'Bitcoin') 
                                    ? `$${data.price.toLocaleString(undefined, {maximumFractionDigits: 2})}`
                                    : data.price.toLocaleString(undefined, {maximumFractionDigits: 2});

                                next[idx] = {

                                    change: `${sign}${data.change.toFixed(2)}%`,
                                    color: color,
                                    data: data.data,
                                    isLive: true
                                };
                            } else {
                                failCount++;
                            }
                        });
                        return next;
                    });

                    // мӢӨнҢЁн•ң н•ӯлӘ©мқҙ мһҲкі  3нҡҢ лҜёл§Ңмқј кІҪмҡ° 3мҙҲ нӣ„ мһҗлҸҷмңјлЎң лӢӨмӢң мӢңлҸ„
                    if (failCount > 0 && retryCountRef.current < 3) {

            useEffect(() => {

            const currentItem = marketItems[currentIndex];
            const nextItem = () => setCurrentIndex((prev) => (prev + 1) % marketItems.length);

            useEffect(() => {

                        >

                        </button>

            </div>

        };

        const CalculatorInput = ({ value, onChange, className, placeholder, style, displayMode, ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                if (!isEditing) {
                    setLocalValue(value);
                }
            }, [value, isEditing]);

            const safeEvaluate = (str) => {
                try {
                    if (/[^0-9+\-*/.()\s]/.test(str)) return null;
                    // eslint-disable-next-line no-new-func
                    const result = new Function('return ' + str)();
                    return isFinite(result) ? result : null;
                } catch (e) {
                    return null;
                }
            };

            const handleBlur = () => {
                const strVal = String(localValue).trim();
                if (/[\+\-\*\/]/.test(strVal)) {
                    const result = safeEvaluate(strVal);
                    if (result !== null) {
                        const finalVal = Math.round(result * 100) / 100;
                        setLocalValue(finalVal);
                        onChange({ target: { value: finalVal } });
                    } else { setLocalValue(value); }
                } else { 
                    // [мҲҳм •] 090 -> 90 л“ұ мҲ«мһҗ нҳ•мӢқ мһҗлҸҷ ліҙм •
                    const numVal = parseFloat(strVal);
                    if (!isNaN(numVal)) {
                        setLocalValue(numVal);
                        onChange({ target: { value: numVal } });
                    } else {
                        onChange({ target: { value: strVal } });
                    }
                }
                setIsEditing(false);
            };

            // [м¶”к°Җ] н”„лқјмқҙл№— лӘЁл“ң л§ҲмҠӨнӮ№ мІҳлҰ¬
            const isMasked = displayMode === 'percent' && !isEditing;
            
            // [мҲҳм •] м—°мӮ°мһҗк°Җ нҸ¬н•Ёлҗң кІҪмҡ°м—җл§Ң text нғҖмһ…мңјлЎң м „нҷҳн•ҳм—¬ number нғҖмһ…мқҳ л„ӨмқҙнӢ°лёҢ кё°лҠҘ(мҠӨн”јл„Ҳ, нҷ”мӮҙн‘ң) мң м§Җ
            const hasOperators = /[\+\-\*\/]/.test(String(localValue));
            const inputType = isMasked || (isEditing && hasOperators) ? "text" : "number";

            return (
                <input type={inputType} value={isMasked ? '***' : localValue} onChange={(e) => { if(!isMasked) setLocalValue(e.target.value); }} onBlur={handleBlur} className={className} placeholder={placeholder} style={style} step="any" {...props}
                    onKeyDown={(e) => {
                        if (e.key === 'Enter') e.target.blur();
                        if (['+', '-', '*', '/'].includes(e.key)) {
                            if (!hasOperators) {
                                e.preventDefault();
                                setIsEditing(true);
                                setLocalValue(prev => String(prev) + e.key);
                            }
                        }
                        // [м¶”к°Җ] нҷ”мӮҙн‘ң нӮӨліҙл“ң лҸҷмһ‘ м»ӨмҠӨн…Җ (1лӢЁмң„ мҰқк°җ ліҙмһҘ л°Ҹ мҰүмӢң л°ҳмҳҒ)
                        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                            if (!hasOperators) {
                                e.preventDefault();
                                const currentVal = parseFloat(localValue) || 0;
                                const step = Number(props.step) || 1;
                                const direction = e.key === 'ArrowUp' ? 1 : -1;
                                const newVal = Math.round((currentVal + step * direction) * 10000) / 10000;
                                setLocalValue(newVal);
                                onChange({ target: { value: newVal } });
                            }
                        }
                    }}

            const [toasts, setToasts] = useState([]);

            const [assetSectorOrder, setAssetSectorOrder] = useState(() => {

            useEffect(() => {

            const scrollToPanel = (id) => {

            // ===== мҙҲкё° лҚ°мқҙн„° лЎңл“ң =====
            useEffect(() => {
                const loadInitialData = async () => {
                    try {

                    const baseData = window.publicDefaultData || {};

                            if (mergedData.memo === undefined) mergedData.memo = baseData.memo;

                            Object.keys(parsedData.assets||{}).forEach(sector=>{

                            Object.keys(parsedData.assets||{}).forEach(sector=>{

                            setAppData(mergedData); // [мҲҳм •] parsedData лҢҖмӢ  mergedData мӮ¬мҡ©

                            lastSavedDataRef.current = JSON.stringify({ appData: mergedData, scenarios: initialScenarios, assetHistory: initialHistory, referenceScenarios: initialReferences });
                        } else {

                            lastSavedDataRef.current = JSON.stringify({ appData: baseData, scenarios: initialScenarios, assetHistory: initialHistory, referenceScenarios: initialReferences });

                    } catch (error) {

                        // [мҲҳм •] лҚ°мқҙн„° мҶҗмғҒ мӢң лЎңм»¬мҠӨнҶ лҰ¬м§Җ мҙҲкё°нҷ”н•ҳм—¬ л¬ҙн•ң лЎңл”©/м—җлҹ¬ л°©м§Җ
                        localStorage.removeItem('assetDashboardDataV3');
                        setAppData(baseData);

                    if (supabase) {
                        setDbStatus('connected');

                            .catch(err => ({ data: { session: null }, error: err }));
                        
                        if (session) {

                        setIsInitialized(true);

                loadInitialData();
            }, [supabase]);

            useEffect(() => {
                const guideCompleted = localStorage.getItem('asset_planner_guide_completed');
                if (!isLoading && !guideCompleted) {
                    setIsGuideOpen(true);
                }
            }, [isLoading]);

            const appDataRef = useRef(appData);
        const scenariosRef = useRef(scenarios);
        const assetHistoryRef = useRef(assetHistory);

        const saveToCloud = React.useCallback(async (unifiedData, force = false, emailOverride = null, proOverride = null, keyOverride = null, modeOverride = null) => {
            if (!supabase) {
                if (force) console.warn("Cloud save skipped: Supabase not initialized.");
                return;
            }

            const targetEmail = emailOverride || verifiedEmail;
            const targetPro = proOverride !== null ? proOverride : isPro;
            // [мҲҳм •] FREE мң м ҖлҸ„ кё°ліём ҒмңјлЎң 'normal' м•”нҳёнҷ” м Ғмҡ© (лҚ°мқҙн„° ліҙнҳё л°Ҹ лЎңм§Ғ нҶөмқј)
            const targetMode = targetPro ? (modeOverride || encryptionMode) : 'normal';

            // [мҲҳм •] forceк°Җ trueмқј кІҪмҡ°(л№„л°ҖлІҲнҳё ліөкө¬ л“ұ) isCloudLoaded мғҒнғңмҷҖ л¬ҙкҙҖн•ҳкІҢ м ҖмһҘ н—Ҳмҡ©
            if (!targetEmail || isDemoMode || !unifiedData || !isInitialized) return;
            if (!force && !isCloudLoaded) return;
            if (!force && isFetchingRef.current) return;

            const currentDataStr = JSON.stringify(unifiedData);
            if (!force && currentDataStr === lastSavedDataRef.current) return;

            let payloadData = unifiedData;
            // [мҲҳм •] targetModeк°Җ мһҲмңјл©ҙ м•”нҳёнҷ” мӢңлҸ„ (PRO м—¬л¶Җ л¬ҙкҙҖ)
            if (targetMode) {
                let key = keyOverride;
                
                if (!key) {
                    let secret = null;
                    if (targetMode === 'secure') {
                        secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                        if (!secret) {
                            pendingSave.current = true;
                            setIsPasswordPromptOpen(true);
                            return;
                        }
                    }
                    key = getEncryptionKey(targetMode, secret, targetEmail, SECURITY_KEY);
                }

                if (!key) {
                    if (targetMode === 'normal') {
                        addToast('Cloud sync disabled: System Security Key missing.', 'error');
                    } else {
                        addToast('ліҙм•Ҳ нӮӨ м„Өм • мҳӨлҘҳлЎң м ҖмһҘмқҙ мӨ‘лӢЁлҗҳм—ҲмҠөлӢҲлӢӨ.', 'error');
                    }
                    setSyncStatus('error');
                    return;
                }
                try {
                    payloadData = await encryptData(unifiedData, key);
                } catch (e) {
                    console.error("Encryption error:", e);
                    addToast('лҚ°мқҙн„° м•”нҳёнҷ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.', 'error');
                    setSyncStatus('error');
                    return; // Early return on encryption failure
                }
            }

            setSyncStatus('syncing');
            try {
                    // [мҲҳм •] нҒҙлқјмҡ°л“ң м ҖмһҘ мӢңм—җлҸ„ лЎңм»¬ лӮ м§ң кё°мӨҖ мӮ¬мҡ© (нһҲмҠӨнҶ лҰ¬мҷҖ мқјкҙҖм„ұ мң м§Җ)
                    const now = new Date();
                    // [мҲҳм •] 1900л…„ кі м • н•ҙм ң: FREE/PRO лӘЁл‘җ мӢӨм ң м ҖмһҘ лӮ м§ң кё°лЎқ
                    const recordDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                await withRetry(() => supabase.auth.refreshSession());

                // [м¶”к°Җ] FREE мң м ҖлҠ” лӢЁмқј л ҲмҪ”л“ң мң м§ҖлҘј мң„н•ҙ мҳӨлҠҳ лӮ м§ңк°Җ м•„лӢҢ кіјкұ° лҚ°мқҙн„° мӮӯм ң
                if (!targetPro) {
                    await withRetry(() => supabase.from('user_assets').delete().eq('email', targetEmail).neq('record_date', recordDate));
                }

                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets').upsert({ 
                        email: targetEmail, data: payloadData,
                        encryption_type: targetMode,
                        updated_at: new Date().toISOString(),
                            record_date: recordDate
                    }, { onConflict: 'email,record_date' }).select('updated_at').single()
                );
                if (error) {
                    console.error('Supabase Upsert Error:', error.code, error.message);
                    throw error;
                }
                if (data) {
                    setSyncStatus('synced');
                    setLastSyncTime(new Date().toLocaleTimeString('ko-KR', { hour12: false }));
                    localStorage.setItem('assetDashboardLastUpdate', data.updated_at);
                    lastSavedDataRef.current = currentDataStr;
                }
            } catch (error) {
                console.error('Sync error:', error);
                setSyncStatus('error');
                setSyncStatusError(error.message || 'м ҖмһҘ мӢӨнҢЁ');
                setLastSyncTime(null);
            } // This finally block was removed as it was empty and unnecessary
        }, [verifiedEmail, isPro, encryptionMode, userSecretKey, userProfile, isDemoMode, supabase, isInitialized, isCloudLoaded, withRetry, getEncryptionKey]);

        // нҒҙлқјмҡ°л“ң лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨкё°
        const fetchFromCloud = React.useCallback(async (email = verifiedEmail, pro = isPro, isInitialLoad = false, isManual = false, localDataOverride = null) => {
            if (!supabase || isProcessing.current || isFetchingRef.current) return;
            isFetchingRef.current = true; // Lock fetching
            setSyncStatus('syncing');
            setIsLoadingCloud(true);
            try {
                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets')
                        .select('data, updated_at, encryption_type')
                        .eq('email', email)
                        .order('updated_at', { ascending: false })
                        .limit(1)
                        .maybeSingle()
                );
                if (error) throw error;

                if (data && data.data) {
                    const encType = data.encryption_type;
                    const isLegacy = !encType || encType === 'none';
                    if (pro && isLegacy) setIsEncryptionModalOpen(true);
                    else if (pro) setEncryptionMode(encType);

                    let decryptedData = data.data;
                    // [мҲҳм •] PRO м—¬л¶ҖмҷҖ кҙҖкі„м—Ҷмқҙ м•”нҳёнҷ”лҗң лҚ°мқҙн„°л©ҙ ліөнҳёнҷ” мӢңлҸ„
                    if (!isLegacy) {
                        let secret = null;
                        if (encType === 'secure') {
                            secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                            if (!secret) {
                                pendingCiphertext.current = data.data;
                                setIsPasswordPromptOpen(true);
                                return; // finally block will handle state reset
                            }
                        }
                        
                        // [Fix] Consistent Encryption Identity: Always use email via global helper
                        const key = getEncryptionKey(encType, secret, email, SECURITY_KEY);

                        // [мҲҳм •] мқјл°ҳ лӘЁл“ңм—җм„ң ліҙм•Ҳ нӮӨ(SECURITY_KEY)к°Җ м—ҶлҠ” кІҪмҡ° мҳҲмҷё мІҳлҰ¬
                        if (!key && encType === 'normal') {
                            addToast('мӢңмҠӨн…ң ліҙм•Ҳ нӮӨк°Җ м„Өм •лҗҳм§Җ м•Ҡм•„ лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ. (нҷҳкІҪліҖмҲҳ нҷ•мқё н•„мҡ”)', 'error');
                            setSyncStatus('error');
                            return; // finally block will handle state reset
                        }

                        try {
                            decryptedData = await decryptData(data.data, key);
                        } catch (err) {
                            let recovered = false;
                            // [м¶”к°Җ] мқҙм „ лІ„м „ лҚ°мқҙн„°(мқҙл©”мқј мҶ”нҠё м—ҶмқҢ) ліөкө¬ мӢңлҸ„ (Fallback)
                            if (encType === 'normal' && SECURITY_KEY && key !== SECURITY_KEY) {
                                try {
                                    decryptedData = await decryptData(data.data, SECURITY_KEY);
                                    recovered = true;
                                    addToast('мқҙм „ ліҙм•Ҳ нҳ•мӢқмқҳ лҚ°мқҙн„°лҘј ліҖнҷҳн•ҳм—¬ л¶Ҳлҹ¬мҷ”мҠөлӢҲлӢӨ.', 'success');
                                } catch (e) { /* Fallback failed */ }
                            }

                            if (!recovered) {
                                if (encType === 'normal') {
                                    // [мҲҳм •] лҚ®м–ҙм“°кё° м „ мң нҡЁн•ң ліҙм•Ҳ нӮӨк°Җ мһҲлҠ”м§Җ лЁјм Җ нҷ•мқё (л¬ҙн•ң лЈЁн”„ л°©м§Җ)
                                    const newKey = getEncryptionKey('normal', null, email, SECURITY_KEY);
                                    if (!newKey) {
                                        addToast("мӢңмҠӨн…ң ліҙм•Ҳ нӮӨ(SECURITY_KEY)к°Җ м„Өм •лҗҳм§Җ м•Ҡм•„ лҚ°мқҙн„°лҘј лҚ®м–ҙм“ё мҲҳ м—ҶмҠөлӢҲлӢӨ. нҷҳкІҪліҖмҲҳлҘј нҷ•мқён•ҳкұ°лӮҳ м„Өм •м—җм„ң 'ліҙм•Ҳ лӘЁл“ң'лЎң м „нҷҳн•ҳм„ёмҡ”.", 'error');
                                        setSyncStatus('error');
                                        return;
                                    }

                                    // [Fix] Safe Recovery: Block overwrite if local data is default
                                    const isLocalDataDefault = JSON.stringify(appDataRef.current) === JSON.stringify(window.publicDefaultData);
                                    if (isLocalDataDefault) {
                                        addToast("ліөнҳёнҷ” мӢӨнҢЁ: ліҙм•Ҳ нӮӨк°Җ мқјм№ҳн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ. лЎңм»¬ лҚ°мқҙн„°к°Җ мҙҲкё° мғҒнғңлқј лҚ®м–ҙм“°кё°к°Җ м°ЁлӢЁлҗҳм—ҲмҠөлӢҲлӢӨ. нҷҳкІҪліҖмҲҳлҘј нҷ•мқён•ҙмЈјм„ёмҡ”.", 'error');
                                    } else if (confirm("ліҙм•Ҳ нӮӨ л¶Ҳмқјм№ҳ: нҒҙлқјмҡ°л“ң лҚ°мқҙн„°м—җ м ‘к·јн•  мҲҳ м—ҶмҠөлӢҲлӢӨ. нҳ„мһ¬ лЎңм»¬ лҚ°мқҙн„°лЎң нҒҙлқјмҡ°л“ңлҘј лҚ®м–ҙм“°кі  л¬ём ңлҘј н•ҙкІ°н•ҳмӢңкІ мҠөлӢҲк№Ң?")) {
                                        const localData = localDataOverride || { appData: appDataRef.current, scenarios: scenariosRef.current, assetHistory: assetHistoryRef.current };
                                        await saveToCloud(localData, true, email, pro);
                                        // [м¶”к°Җ] лҚ®м–ҙм“°кё° м„ұкіө мӢң мҰүмӢң мғҒнғң м—…лҚ°мқҙнҠён•ҳм—¬ мһ¬м§„мһ… л°©м§Җ
                                        setIsCloudLoaded(true);
                                        setSyncStatus('synced');
                                        addToast('нҒҙлқјмҡ°л“ң лҚ°мқҙн„°к°Җ нҳ„мһ¬ лЎңм»¬ лҚ°мқҙн„°лЎң к°ұмӢ лҗҳм—ҲмҠөлӢҲлӢӨ.', 'success');
                                    }
                                    return;
                                } else {

                    const cloudTime = new Date(data.updated_at).getTime();

                            // setIsCloudLoaded(true)лҘј нҳём¶ңн•ҳм§Җ м•ҠмқҢмңјлЎңмҚЁ useEffect мһҗлҸҷ м ҖмһҘмқ„ мӣҗмІң м°ЁлӢЁн•Ё
                            addToast("лЎңм»¬ лҚ°мқҙн„°лҘј мң м§Җн•©лӢҲлӢӨ. нҒҙлқјмҡ°л“ң ліҙнҳёлҘј мң„н•ҙ мһҗлҸҷ м ҖмһҘмқҙ л№„нҷңм„ұнҷ”лҗҳм—ҲмҠөлӢҲлӢӨ.", "warning");
                            setSyncStatus('idle');
                            return;
                        }
                    }

                    if (shouldUpdateFromCloud) {
                        const actualAppData = decryptedData.appData || decryptedData;
                        const fullCloudData = decryptedData.appData ? decryptedData : { appData: actualAppData, scenarios: [], assetHistory: [] };
                        
                        lastSavedDataRef.current = JSON.stringify(fullCloudData);

                        if (fullCloudData.scenarios) setScenarios(fullCloudData.scenarios);
                        if (fullCloudData.assetHistory) setAssetHistory(fullCloudData.assetHistory);

                        if (fullCloudData.scenarios) localStorage.setItem('assetDashboardScenarios', JSON.stringify(fullCloudData.scenarios));
                        if (fullCloudData.assetHistory) localStorage.setItem('assetDashboardHistory', JSON.stringify(fullCloudData.assetHistory));

        const handleLogout = React.useCallback(async (skipSignOut = false) => {

                localStorage.removeItem('asset_gemini_api_key');

        const loadHistorySnapshot = React.useCallback(async (targetDate) => {

            setIsLoadingCloud(true);
            try {
                let query = supabase.from('user_assets')
                    .select('data, updated_at, encryption_type')
                    .eq('email', verifiedEmail);

                // лӮ м§ң кІҖмғү мЎ°кұҙ (мӣ”лі„ or мқјлі„)
                if (targetDate.length === 7) { // YYYY-MM нҳ•мӢқмқё кІҪмҡ° (мӣ”лі„ к·ёлЈ№нҷ”лҗң м җ нҒҙлҰӯ мӢң)
                    const start = `${targetDate}-01`;

                    query = query.gte('record_date', start).lte('record_date', end).order('record_date', { ascending: false });

                let decryptedData = data.data;

            }

        };

        const deleteHistoryPoint = React.useCallback((targetDate) => {

            setAssetHistory(prev => {

                // ліҖкІҪ мӮ¬н•ӯ мҰүмӢң м ҖмһҘ (мһҗлҸҷ м ҖмһҘ нҠёлҰ¬кұ°)

        const handleHistoryContextMenu = React.useCallback((e) => {

                    if (confirm('нҳ„мһ¬ лҚ°мқҙн„°лҘј кё°ліёк°’мңјлЎң л°ұм—…н•ҳмӢңкІ мҠөлӢҲк№Ң?\n(л°ұм—…н•ҳм§Җ м•Ҡмңјл©ҙ нҳ„мһ¬ мһ‘м—… лӮҙмҡ©мқҙ лҚ®м–ҙм“°м—¬м§‘лӢҲлӢӨ)')) {

                        addToast('нҳ„мһ¬ лҚ°мқҙн„°к°Җ кё°ліёк°’мңјлЎң л°ұм—…лҗҳм—ҲмҠөлӢҲлӢӨ.', 'success');
                    }

                    // [мҲҳм •] мӢңлӮҳлҰ¬мҳӨ лҚ°мқҙн„° лі‘н•© лЎңм§Ғ к°ңм„  (лҲ„лқҪлҗң н•„л“ң ліҙмҷ„)
                    const base = JSON.parse(JSON.stringify(window.publicDefaultData || {}));
                    const loaded = scenario.data || {};

            const deleteScenario = (id) => {
                if (confirm('мӢңлӮҳлҰ¬мҳӨлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')) {

            };

            const toggleReference = (scenario) => {
                setReferenceScenarios(prev => {
                    const exists = prev.find(r => r.id === scenario.id);
                    if (exists) {
                        return prev.filter(r => r.id !== scenario.id);
                    } else {
                        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899', '#6366f1'];
                        const usedColors = prev.map(r => r.color);
                        const nextColor = colors.find(c => !usedColors.includes(c)) || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                        return [...prev, { id: scenario.id, color: nextColor }];
                    }
                });
            };

            const updateReferenceColor = (id, color) => {
                setReferenceScenarios(prev => prev.map(r => r.id === id ? { ...r, color } : r));
            };

            // ===== мҳҲмӮ° кі„мӮ° =====
            const totalMonthlyExpense = useMemo(() => {
                if (!monthlyExpenses || !Array.isArray(monthlyExpenses)) return 0;
                return monthlyExpenses.reduce((sum, e) => sum + Number(e.amount || 0), 0);
            }, [monthlyExpenses]);
            
            const totalSectorMonthlyContrib = useMemo(() => {
                if (!assets || typeof assets !== 'object') return 0;
                let sum = 0;
                // [к°ңм„ ] мӢӨм ң нҳ„мһ¬ лӮ м§ңк°Җ м•„лӢҢ 'мӢңл®¬л Ҳмқҙм…ҳ кё°мӨҖмқј(baseDate) + лҜёлһҳ нҺҳмқҙмҰҲ к°ңмӣ” мҲҳ'лҘј кё°мӨҖмңјлЎң нҢҗлӢЁ
                const [bY, bM] = (baseDate || new Date().toISOString().slice(0, 10)).split('-').map(Number);
                let effectiveYear = bY;
                let effectiveMonth = bM;
                if (editingPhase !== null) {
                    const d = new Date(bY, bM - 1 + editingPhase.startMonth, 1);
                    effectiveYear = d.getFullYear();
                    effectiveMonth = d.getMonth() + 1;
                }
                const effectiveTotalMonths = effectiveYear * 12 + effectiveMonth;

                Object.entries(assets).forEach(([sector, arr]) => {
                    if (Array.isArray(arr)) {
                        arr.forEach(asset => { 
                            // [мҲҳм •] лҢҖм¶ңмқҳ кІҪмҡ° мЎ°кұҙл¶Җ н•©мӮ°
                            if (sector === 'loan') {
                                // 1. мғҒнҷҳ кі„мўҢк°Җ 'мӣ”кёү(salary)'мқҙ м•„лӢҲл©ҙ мӣ”лӮ©мһ… мҳҲмӮ°м—җм„ң м ңмҷё (мһҗмӮ°м—җм„ң м°Ёк°җлҗҳлҜҖлЎң)
                                if (asset.repaymentAccount !== 'salary') return;
                                
                                // 2. лҢҖм¶ң мӢңмһ‘мқјмқҙ лҜёлһҳмқё кІҪмҡ° нҳ„мһ¬ мҳҲмӮ°м—җм„ң м ңмҷё (мӢңмһ‘мӣ” лӢӨмқҢ лӢ¬л¶Җн„° мғҒнҷҳ)
                                if (asset.loanStartDate) {
                                    const [y, m] = asset.loanStartDate.split('-').map(Number);
                                    const loanStartTotalMonths = y * 12 + m;
                                    // [Fix] мҳҲмӮ°мқҳ н•ң лӢ¬ мҳӨм°Ё мҲҳм •: лҢҖм¶ң мӢңмһ‘мӣ”(loanStartTotalMonths) мқҙм „ лӢ¬к№Ңм§Җл§Ң мҳҲмӮ°м—җм„ң м ңмҷён•ҳкі , н•ҙлӢ№ мӣ”л¶Җн„°лҠ” мҰүмӢң мғҒнҷҳ мҳҲмӮ°мңјлЎң мһЎнһҲлҸ„лЎқ мҲҳм • (< м Ғмҡ©)
                                    if (effectiveTotalMonths < loanStartTotalMonths) return;
                                }
                            } else {
                                // [мҲҳм •] мқјл°ҳ мһҗмӮ°: лӮ©мһ… м¶ңмІҳк°Җ 'мӣ” кі м •мҲҳмһ…'мқҙ м•„лӢҲл©ҙ мҳҲмӮ° н•©мӮ° м ңмҷё
                                const source = asset.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE;
                                if (source !== window.MONTHLY_INCOME_SOURCE) return;
                            }
                            sum += Number(asset.monthlyContrib || 0); 
                        });
                    }
                });
                return sum;
            }, [assets, baseDate, editingPhase]);
            
            const maxSectorMonthlyContrib = useMemo(() => Math.max(0, monthlySalary - totalMonthlyExpense), [monthlySalary, totalMonthlyExpense]);
            const autoDepositAmount = Math.max(0, maxSectorMonthlyContrib - totalSectorMonthlyContrib);

            const calculateGoalSeek = () => {
                if (!targetAmount || targetAmount <= 0) {
                    addToast('мң нҡЁн•ң лӘ©н‘ң кёҲм•Ўмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.', 'error');
                    return;
                }

                // [мҲҳм •] utils.jsмқҳ calculateGoalReachMonth мӮ¬мҡ©
                const result = calculateGoalReachMonth(appData, targetAmount);

                if (result.success) {
                    setGoalSeekResult(`лӘ©н‘ң лӢ¬м„ұк№Ңм§Җ м•Ҫ ${result.month}к°ңмӣ” мҶҢмҡ”лҗ©лӢҲлӢӨ.`);
                    setProjectionMonths(result.month);
                } else if (result.error) {
                    setGoalSeekResult(result.message);
                } else {
                    setGoalSeekResult('кі„мӮ° кІ°кіјлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
                }
            };

            const movePanel = (id, direction) => {
                setLayoutOrder(prev => {
                    const index = prev.indexOf(id);
                    if (index === -1) return prev;
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= prev.length) return prev;
                    const newOrder = [...prev];
                    [newOrder[index], newOrder[newIndex]] = [newOrder[newIndex], newOrder[index]];
                    return newOrder;
                });
            };

            const togglePanelCollapse = (panelId) => {
                setPanelCollapseState(prev => ({
                    ...prev,
                    [panelId]: !prev[panelId]
                }));
            };

            const moveAssetSector = (sectorKey, direction) => {
                setAssetSectorOrder(prev => {
                    const index = prev.indexOf(sectorKey);
                    if (index === -1) return prev;
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= prev.length) return prev;
                    const newOrder = [...prev];
                    [newOrder[index], newOrder[newIndex]] = [newOrder[newIndex], newOrder[index]];
                    return newOrder;
                });
            };

            const [draggedPanelId, setDraggedPanelId] = useState(null);

            const handlePanelDragStart = React.useCallback((e, id) => {
                setDraggedPanelId(id);
                e.dataTransfer.effectAllowed = "move";
            }, []);

            const handlePanelDragOver = React.useCallback((e) => e.preventDefault(), []);

            const handlePanelDrop = React.useCallback((e, targetId) => {
                e.preventDefault();
                if (!draggedPanelId || draggedPanelId === targetId) return;

                setLayoutOrder(prev => {
                    const oldIndex = prev.indexOf(draggedPanelId);
                    const newIndex = prev.indexOf(targetId);
                    if (oldIndex === -1 || newIndex === -1) return prev;
                    const newOrder = [...prev];
                    newOrder.splice(oldIndex, 1);
                    newOrder.splice(newIndex, 0, draggedPanelId);
                    return newOrder;
                });
                setDraggedPanelId(null);
            }, [draggedPanelId]);

            const calculation = useMemo(() => {
                if (!appData || !appData.assets || typeof appData.assets !== 'object') {
                    return {
                        initial: {},
                        projected: {},
                        currentTotal: 0,
                        projectedTotal: 0,
                        growth: 0,
                        grand: 0,
                        realValue: 0,
                        monthlyProjections: [],
                        warnings: [],
                        fireMetrics: null,
                        rebalanceInfo: null
                    };
                }
                
                const months = projectionMonths;
                // [мҲҳм •] мқён”Ңл Ҳмқҙм…ҳ ліҙм • л°Ҹ мқҙлІӨнҠё л°°м—ҙ м•Ҳм „м„ұ нҷ•ліҙ (undefined л°©м§Җ)
                const safeAppData = {
                    ...appData,
                    incomeEvents: Array.isArray(appData.incomeEvents) ? appData.incomeEvents : [],
                    expenseEvents: Array.isArray(appData.expenseEvents) ? appData.expenseEvents : [],
                };

                const localTotalMonthlyExpense = (appData.monthlyExpenses || []).reduce((sum, e) => sum + Number(e.amount || 0), 0);
                
                // [м¶”к°Җ] мҳҲмӮ° мҙҲкіј кІҖмҰқ ліҖмҲҳ кі„мӮ°
                const localMonthlySalary = Number(appData.monthlySalary || 0);
                const localMaxContrib = Math.max(0, localMonthlySalary - localTotalMonthlyExpense);
                let localTotalContrib = 0;
                
                // [мҲҳм •] мҳҲмӮ° мҙҲкіј кІҖмҰқ мӢңм—җлҸ„ лӮ©мһ… м¶ңмІҳ нҷ•мқё (мқҙмІҙлҠ” м ңмҷё)
                Object.entries(appData.assets).forEach(([sector, arr]) => {
                    if (Array.isArray(arr)) {
                        arr.forEach(a => {
                            let include = true;
                            if (sector === 'loan') {
                                if (a.repaymentAccount !== 'salary') include = false;
                                
                                // [мҲҳм •] лӮҙл¶Җ calculationмқҳ мҳҲмӮ° кІҪкі  нҢҗлӢЁ мӢңм—җлҸ„ лҜёлһҳ лҢҖм¶ңмқҖ мҠӨнӮө
                                if (a.loanStartDate) {
                                    const [bY, bM] = (baseDate || new Date().toISOString().slice(0, 10)).split('-').map(Number);
                                    let effectiveYear = bY;
                                    let effectiveMonth = bM;
                                    if (editingPhase !== null) {
                                        const d = new Date(bY, bM - 1 + editingPhase.startMonth, 1);
                                        effectiveYear = d.getFullYear();
                                        effectiveMonth = d.getMonth() + 1;
                                    }
                                    const effectiveTotalMonths = effectiveYear * 12 + effectiveMonth;
                                    
                                    const [y, m] = a.loanStartDate.split('-').map(Number);
                                    const loanStartTotalMonths = y * 12 + m;
                                    // [Fix] мҳҲмӮ° мҳӨм°Ё мҲҳм • (< м Ғмҡ©)
                                    if (effectiveTotalMonths < loanStartTotalMonths) include = false;
                                }
                            } else {
                                const source = a.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE;
                                if (source !== window.MONTHLY_INCOME_SOURCE) include = false;
                            }
                            if (include) localTotalContrib += Number(a.monthlyContrib || 0);
                        });
                    }
                });
                
                // 1. High-Precision Initial Metrics
                let currentTotal = 0;
                let totalNetProfitMonthlyInitial = 0;
                let totalInvestedPrincipal = 0;
                const sectorSums = {};
                
                Object.keys(appData.assets).forEach(sector => {
                    if (!sectorSums[sector]) sectorSums[sector] = 0;
                    (appData.assets[sector] || []).forEach(asset => {
                        const amt = Number(asset.amount || 0);
                        if (sector === 'loan') {
                            currentTotal -= amt;
                        } else {
                            currentTotal += amt;
                            sectorSums[sector] += amt;
                            totalInvestedPrincipal += amt;
                            // Monthly_Net_Profit = (Amount * rate / 1200) * (1 - feeRate / 100)
                            const monthlyProfit = (amt * (Number(asset.rate || 0) / 1200)) * (1 - (Number(asset.feeRate || 0) / 100));
                            totalNetProfitMonthlyInitial += monthlyProfit;
                        }
                    });
                });

                // 2. Individual Asset Simulation (Runway - 1200 Months)
                let runwayMonths = 0;
                let debtFreeMonth = -1;
                const maxSimMonths = 1200;
                const simAssets = JSON.parse(JSON.stringify(appData.assets));
                
                // [мҲҳм •] мҙҲкё° мһҗмӮ°мқҙ 0 мқҙн•ҳмқё кІҪмҡ° мғқмЎҙ кё°к°„ 0мңјлЎң мІҳлҰ¬
                if (currentTotal <= 0) {
                    runwayMonths = 0;
                } else {
                    // [Refactor] Find Main Account in Simulation Data
                    let simMainAccount = null;
                    for (const s in simAssets) {
                        const found = simAssets[s].find(a => a.name === appData.mainCashFlowAccount);
                        if (found) { simMainAccount = found; break; }
                    }
                    if (!simMainAccount) {
                        const firstSector = Object.keys(simAssets).find(s => s !== 'loan' && simAssets[s].length > 0);
                        if (firstSector) simMainAccount = simAssets[firstSector][0];
                    }

                    for (let m = 1; m <= maxSimMonths; m++) {
                        // 1. Inflation Adjusted Expense
                        const inflationFactor = Math.pow(1 + inflationRate / 1200, m);
                        const currentMonthlyExpense = localTotalMonthlyExpense * inflationFactor;

                        // 2. Loan Repayment & Interest
                        let totalLoanRepayment = 0;
                        let currentLoanBalance = 0;

                        if (simAssets.loan) {
                            simAssets.loan.forEach(loan => {
                                if (loan.amount > 0) {
                                    const interest = loan.amount * (Number(loan.rate || 0) / 1200);
                                    const monthlyPayment = Number(loan.monthlyContrib || 0);
                                    
                                    let cashOutflow = monthlyPayment;
                                    let principalPayment = monthlyPayment - interest;

                                    if (loan.amount + interest <= monthlyPayment) {
                                        cashOutflow = loan.amount + interest;
                                        principalPayment = loan.amount;
                                        loan.amount = 0;
                                    } else {
                                        loan.amount -= principalPayment;
                                    }
                                    
                                    totalLoanRepayment += cashOutflow;
                                    currentLoanBalance += loan.amount;
                                }
                            });
                        }

                        if (currentLoanBalance <= 0 && debtFreeMonth === -1) {
                            debtFreeMonth = m;
                        }
                        
                        // 3. Net Flow (Salary = 0 for Survival Mode)
                        let eventFlow = 0;
                        const checkEvent = (e) => {
                            if (!e.startMonth || typeof e.startMonth !== 'string' || !e.endMonth || typeof e.endMonth !== 'string') return false;
                            const [bY, bM] = baseDate.split('-').map(Number); // [мҲҳм •] baseDate мӮ¬мҡ©
                            const [sY, sM] = e.startMonth.split('-').map(Number);
                            const [eY, eM] = e.endMonth.split('-').map(Number);
                            const cur = bY * 12 + bM + m - 1;
                            return cur >= (sY * 12 + sM) && cur <= (eY * 12 + eM);
                        };
                        safeAppData.incomeEvents.forEach(e => { if (checkEvent(e)) eventFlow += Number(e.amount || 0); });
                        safeAppData.expenseEvents.forEach(e => { if (checkEvent(e)) eventFlow -= Number(e.amount || 0); });

                        const netFlow = eventFlow - currentMonthlyExpense - totalLoanRepayment;

                        // 4. Apply to Main Account & Liquidate
                        if (simMainAccount) {
                            simMainAccount.amount += netFlow;
                        }

                        // Liquidation Logic (Prevent Negative Cash)
                        if (simMainAccount && simMainAccount.amount < 0) {
                            let deficit = -simMainAccount.amount;
                            simMainAccount.amount = 0;

                            const liquidationOrder = ['deposit', 'savings', 'investment'];
                            for (const sector of liquidationOrder) {
                                if (deficit <= 0) break;
                                if (!simAssets[sector]) continue;

                                for (const asset of simAssets[sector]) {
                                    if (deficit <= 0) break;
                                    if (asset.name === simMainAccount.name) continue;
                                    if (asset.amount <= 0) continue;

                                    const taken = Math.min(asset.amount, deficit);
                                    asset.amount -= taken;
                                    deficit -= taken;
                                }
                            }

                            if (deficit > 0) {
                                runwayMonths = m - 1;
                                break;
                            }
                        } else if (!simMainAccount && netFlow < 0) {
                             runwayMonths = m - 1;
                             break;
                        }

                        // 5. Apply Profits (Growth)
                        Object.keys(simAssets).forEach(sector => {
                            if (sector === 'loan') return;
                            simAssets[sector].forEach(asset => {
                                if (asset.amount > 0) {
                                    const profit = asset.amount * (Number(asset.rate || 0) / 1200) * (1 - (Number(asset.feeRate || 0) / 100));
                                    asset.amount += profit;
                                }
                            });
                        });

                        if (m === maxSimMonths) runwayMonths = maxSimMonths;
                    }
                }

                // 3. FIRE Indicators (Reverse Engineered)
                const loanInterestInitial = (appData.assets.loan || []).reduce((sum, l) => sum + (Number(l.amount || 0) * Number(l.rate || 0) / 1200), 0);
                const annualFixedExp = (localTotalMonthlyExpense + loanInterestInitial) * 12;
                const annualFixedExpPostDebt = localTotalMonthlyExpense * 12;

                const swr4PercentCapital = annualFixedExpPostDebt * 25; // 4% Rule Reference

                // 4. Soft Rebalancing Engine (Pro-rata)
                const disposableIncome = Math.max(0, (appData.monthlySalary || 0) - localTotalMonthlyExpense);
                const targetMonths = appData.rebalanceMonths || 12;
                const futureValue = currentTotal + (disposableIncome * targetMonths);
                const sectorGaps = {};
                let totalGap = 0;
                const validSectors = Object.keys(sectorInfo).filter(k => k !== 'loan');
                const itemRecs = {};
                const rebalancingGlobal = appData.rebalancingGlobal || { sector: { warning: 5, danger: 10 }, item: { warning: 5, danger: 10 } };
                
                validSectors.forEach(sector => {
                    const targetPct = (appData.rebalancingTargets && appData.rebalancingTargets[sector] !== undefined) 
                        ? appData.rebalancingTargets[sector] 
                        : Math.round(100 / validSectors.length);
                    const targetBalance = futureValue * (targetPct / 100);
                    const currentBalance = sectorSums[sector] || 0;
                    const gap = Math.max(0, targetBalance - currentBalance);
                    sectorGaps[sector] = gap;
                    totalGap += gap;
                });

                const budgetLimited = (totalGap / targetMonths) > disposableIncome;
                const sectorRecs = {};
                validSectors.forEach(sector => {
                    if (totalGap === 0) sectorRecs[sector] = 0;
                    else {
                        sectorRecs[sector] = budgetLimited 
                            ? (sectorGaps[sector] / totalGap) * disposableIncome 
                            : (sectorGaps[sector] / targetMonths);
                    }
                });

                // [м¶”к°Җ] н•ӯлӘ©лі„ лҰ¬л°ёлҹ°мӢұ м¶”мІң кі„мӮ°
                validSectors.forEach(sector => {
                    const sectorAssets = appData.assets[sector] || [];
                    if (sectorAssets.length === 0) return;
                    
                    const sectorMonthlyContrib = sectorRecs[sector] || 0;
                    const sectorTargetPct = (appData.rebalancingTargets && appData.rebalancingTargets[sector] !== undefined) ? appData.rebalancingTargets[sector] : Math.round(100 / validSectors.length);
                    const sectorFutureValue = futureValue * (sectorTargetPct / 100);
                    
                    let totalItemWeight = 0;
                    const currentItemTargets = appData.itemTargets || {};
                    sectorAssets.forEach(a => { totalItemWeight += (currentItemTargets[a.id] ?? Math.round(100/sectorAssets.length)); });
                    
                    let totalItemGap = 0;
                    const currentItemGaps = {};
                    
                    sectorAssets.forEach(a => {
                        const weight = (currentItemTargets[a.id] ?? Math.round(100/sectorAssets.length));
                        const normWeight = totalItemWeight === 0 ? 0 : (weight / totalItemWeight);
                        const targetVal = sectorFutureValue * normWeight;
                        const gap = Math.max(0, targetVal - (a.amount || 0));
                        currentItemGaps[a.id] = gap;
                        totalItemGap += gap;
                    });
                    
                    sectorAssets.forEach(a => {
                        itemRecs[a.id] = totalItemGap > 0 ? (currentItemGaps[a.id] / totalItemGap) * sectorMonthlyContrib : 0;
                    });
                });

                const { projections: monthlyProjections, warnings } = calculateMonthlyProjection({ ...safeAppData, inflationRate, baseDate }, months);

                // [м¶”к°Җ] мӣ”лӮ©мһ… н•ңлҸ„ мҙҲкіј мӢң кІҪкі  лӘ©лЎқм—җ м¶”к°Җ (н”ҢлЎңнҢ… лІ„нҠј нҠёлҰ¬кұ°мҡ©)
                if (localTotalContrib > localMaxContrib) {
                    warnings.unshift({
                        month: 'м„Өм •',
                        type: 'budget',
                        message: `мӣ”лӮ©мһ… н•ңлҸ„ мҙҲкіј! ${window.formatNumber(localTotalContrib - localMaxContrib)}л§Ңмӣҗмқҙ л¶ҖмЎұн•©лӢҲлӢӨ. (к°Җмҡ©: ${window.formatNumber(localMaxContrib)}л§Ңмӣҗ)`
                    });
                }

                if (!monthlyProjections || monthlyProjections.length === 0) {
                    return { error: true, warnings: warnings };
                }

                const initialProjection = monthlyProjections[0] || {};
                const newCurrentTotal = initialProjection.total || 0;
                const newCurrentNet = initialProjection.net || 0;
                const newCurrentGross = initialProjection.gross || 0;

                const finalProjection = monthlyProjections[monthlyProjections.length - 1];
                const newProjectedTotal = finalProjection ? finalProjection.total : newCurrentTotal;
                const newProjectedNet = finalProjection ? finalProjection.net : newCurrentNet;
                const newProjectedGross = finalProjection ? finalProjection.gross : newCurrentGross;

            const getRebalanceStatus = (key, percentage, isItem = false, itemId = null, sectorKey = null) => {
                const globalSettings = appData.rebalancingGlobal || { sector: { warning: 5, danger: 10 }, item: { warning: 5, danger: 10 } };
                const thresholds = isItem ? globalSettings.item : globalSettings.sector;
                
                let target;
                if (isItem && sectorKey) {
                    const assetsInSector = assets[sectorKey] || [];
                    const totalWeight = assetsInSector.reduce((sum, a) => sum + (appData.itemTargets?.[a.id] ?? Math.round(100/assetsInSector.length)), 0);
                    const rawTarget = appData.itemTargets?.[itemId] ?? Math.round(100/assetsInSector.length);
                    target = totalWeight === 0 ? 0 : (rawTarget / totalWeight) * 100;
                } else {
                    target = rebalancingTargets[key] ?? (100 / Object.keys(sectorInfo).length);
                }

                const deviation = Math.abs(percentage - target);
                if (isItem) {
                    if (deviation >= thresholds.danger) return 'text-red-600 dark:text-red-400 font-bold';
                    if (deviation >= thresholds.warning) return 'text-yellow-600 dark:text-yellow-400 font-bold';
                } else {
                    if (deviation >= thresholds.danger) return 'bg-red-100 text-red-800 dark:bg-red-900/60 dark:text-red-100';

                    const useMonthlyAverage = false;

                    let finalLabels = [];
                    let finalHistoryData = [];
                    let optimisticData = []; // [м¶”к°Җ] лӮҷкҙҖм Ғ мӢңлӮҳлҰ¬мҳӨ лҚ°мқҙн„°
                    let pessimisticData = []; // [м¶”к°Җ] л№„кҙҖм Ғ мӢңлӮҳлҰ¬мҳӨ лҚ°мқҙн„°

                    let refDatasetsData = []; // [м¶”к°Җ] нҸүк·  кі„мӮ°мқ„ мң„н•ң м°ёмЎ° лҚ°мқҙн„° мҲҳм§‘

                    finalLabels = assetHistory.map(item => {

                    if (finalHistoryData.length > 0) {

                        projectionData[finalHistoryData.length - 1] = lastVal;
                        optimisticData[finalHistoryData.length - 1] = lastVal;
                        pessimisticData[finalHistoryData.length - 1] = lastVal;
                    }
                    
                    historyProjectionData.projections.forEach((p, idx) => {
                        if (idx === 0) return;
                        
                        // лҜёлһҳ лӮ м§ң лқјлІЁ мғқм„ұ
                        const [y, m] = (historyProjectionData.baseDate || new Date().toISOString().slice(0, 10)).split('-').map(Number);
                        const d = new Date(y, m - 1 + idx);
                        const label = `${String(d.getFullYear()).slice(2)}л…„ ${String(d.getMonth() + 1).padStart(2, '0')}мӣ”`; // лҜёлһҳлҠ” н•ӯмғҒ мӣ” лӢЁмң„
                        
                        // лқјлІЁ мӨ‘ліө мІҙнҒ¬ (нһҲмҠӨнҶ лҰ¬мҷҖ кІ№м№ҳм§Җ м•ҠкІҢ)
