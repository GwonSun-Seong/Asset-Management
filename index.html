<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 플래너</title>
    <!-- PWA 설정 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503939.png">
    <script>
        // HTTPS 강제 리다이렉트 (로컬 개발 환경 제외)
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol === 'http:') {
            window.location.replace(window.location.href.replace(/^http:/, 'https:'));
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || 
                (e.ctrlKey && e.key.toUpperCase() === 'U')) {
                e.preventDefault();
            }
        });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { font-family: 'Pretendard', sans-serif !important; }
        input, select, button, textarea { font-family: 'Pretendard', sans-serif !important; }
        input[type="number"] { font-weight: 600 !important; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        html { scroll-behavior: smooth; }
        
        /* 가이드 모달 디자인 */
        .driver-popover {
            /* 속도를 0.3s -> 0.6s로 늦추고, 움직임을 더 부드럽게(cubic-bezier) 설정 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease !important;
            background-color: #ffffff !important;
            color: #1f2937 !important;
            border-radius: 16px !important;
            padding: 24px !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
            border: 1px solid #e5e7eb !important;
            max-width: 320px !important;
        }
        
        /* 다크모드 대응 */
        .dark .driver-popover {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }

        .driver-popover-title {
            font-size: 18px !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
            color: #111827 !important;
        }
        .dark .driver-popover-title { color: #ffffff !important; }

        .driver-popover-description {
            font-size: 14px !important;
            line-height: 1.6 !important;
            color: #4b5563 !important;
            margin-bottom: 24px !important;
        }
        .dark .driver-popover-description { color: #d1d5db !important; }

        /* 버튼 스타일링 (파란색 복구) */
        .driver-popover-footer button {
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            text-shadow: none !important;
        }

        /* 다음/완료 버튼 (파란색 강조) */
        .driver-popover-footer .driver-popover-next-btn,
        .driver-popover-footer .driver-popover-done-btn {
            background-color: #2563eb !important; /* 파란색 */
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3) !important;
        }
        .driver-popover-footer .driver-popover-next-btn:hover { background-color: #1d4ed8 !important; }
        
        /* 이전 버튼 */
        .driver-popover-footer .driver-popover-prev-btn {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            border: 1px solid #e5e7eb !important;
        }
        .dark .driver-popover-footer .driver-popover-prev-btn {
            background-color: #374151 !important;
            color: #e5e7eb !important;
            border-color: #4b5563 !important;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-toast { animation: slideUpFade 0.3s ease-out forwards; }
        .animate-flip { animation: flipIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
        /* 커스텀 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.8); }
        
        /* 인쇄(PDF 저장) 최적화 스타일 */
        @media print {
            @page { margin: 10mm; size: auto; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            /* UI 숨김: 헤더, 사이드바, 고정 버튼, 메뉴, 기타 장식 */
            aside, .sticky.top-0, .fixed, details, #mobile-menu-trigger { display: none !important; }
            /* 레이아웃 강제 확장 및 스크롤 제거 */
            #root, body, html { width: 100% !important; height: auto !important; overflow: visible !important; }
            #dashboard-content { display: block !important; width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
            #main-dashboard-panel { width: 100% !important; max-width: none !important; }
            /* 패널 스타일 단순화 (그림자 제거, 테두리 추가) 및 페이지 넘김 방지 */
            .rounded-xl, .rounded-lg, .rounded-2xl, .shadow-lg, .shadow-sm, .shadow {
                box-shadow: none !important; border: 1px solid #e5e7eb !important; break-inside: avoid; page-break-inside: avoid;
            }
            /* 스크롤 영역 전체 표시 (테이블 등 잘림 방지) */
            .overflow-x-auto, .overflow-y-auto { overflow: visible !important; height: auto !important; max-height: none !important; }
        }

        /* 스켈레톤 쉬머(Shimmer) 애니메이션 효과 */
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%; 
            animation: placeholderShimmer 1.5s infinite linear forwards;
        }
        .dark .shimmer {
            background: #1f2937;
            background-image: linear-gradient(to right, #1f2937 0%, #374151 20%, #1f2937 40%, #1f2937 100%);
        }
        @keyframes placeholderShimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    </style>
    <script>
        // 인앱 브라우저(카카오톡) 감지 및 외부 브라우저 전환 스크립트
        (function() {
            const userAgent = navigator.userAgent.toLowerCase();
            const targetUrl = window.location.href;

            if (userAgent.indexOf('kakaotalk') > -1) {
                if (userAgent.indexOf('android') > -1) {
                    location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;end';
                } else if (userAgent.indexOf('iphone') > -1 || userAgent.indexOf('ipad') > -1) {
                    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                }
            }
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
