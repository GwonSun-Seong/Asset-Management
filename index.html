<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 플래너</title>
    <!-- PWA 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503939.png">
    <script>
        // HTTPS 강제 리다이렉트 (로컬 개발 환경 제외)
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol === 'http:') {
            window.location.replace(window.location.href.replace(/^http:/, 'https:'));
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || 
                (e.ctrlKey && e.key.toUpperCase() === 'U')) {
                e.preventDefault();
            }
        });
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script type="text/babel" src="modals.js"></script>
    <script type="text/babel" src="game.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { font-family: 'Pretendard', sans-serif !important; }
        input, select, button, textarea { font-family: 'Pretendard', sans-serif !important; }
        input[type="number"] { font-weight: 600 !important; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        html { scroll-behavior: smooth; }
        
        /* 가이드 모달 디자인 */
        .driver-popover {
            /* 속도를 0.3s -> 0.6s로 늦추고, 움직임을 더 부드럽게(cubic-bezier) 설정 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease !important;
            background-color: #ffffff !important;
            color: #1f2937 !important;
            border-radius: 16px !important;
            padding: 24px !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
            border: 1px solid #e5e7eb !important;
            max-width: 320px !important;
        }
        
        /* 다크모드 대응 */
        .dark .driver-popover {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }

        .driver-popover-title {
            font-size: 18px !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
            color: #111827 !important;
        }
        .dark .driver-popover-title { color: #ffffff !important; }

        .driver-popover-description {
            font-size: 14px !important;
            line-height: 1.6 !important;
            color: #4b5563 !important;
            margin-bottom: 24px !important;
        }
        .dark .driver-popover-description { color: #d1d5db !important; }

        /* 버튼 스타일링 (파란색 복구) */
        .driver-popover-footer button {
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            text-shadow: none !important;
        }

        /* 다음/완료 버튼 (파란색 강조) */
        .driver-popover-footer .driver-popover-next-btn,
        .driver-popover-footer .driver-popover-done-btn {
            background-color: #2563eb !important; /* 파란색 */
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3) !important;
        }
        .driver-popover-footer .driver-popover-next-btn:hover { background-color: #1d4ed8 !important; }
        
        /* 이전 버튼 */
        .driver-popover-footer .driver-popover-prev-btn {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            border: 1px solid #e5e7eb !important;
        }
        .dark .driver-popover-footer .driver-popover-prev-btn {
            background-color: #374151 !important;
            color: #e5e7eb !important;
            border-color: #4b5563 !important;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-toast { animation: slideUpFade 0.3s ease-out forwards; }
        .animate-flip { animation: flipIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
        /* 커스텀 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.8); }
        
        /* 인쇄(PDF 저장) 최적화 스타일 */
        @media print {
            @page { margin: 10mm; size: auto; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            /* UI 숨김: 헤더, 사이드바, 고정 버튼, 모바일 메뉴, 기타 장식 */
            aside, .sticky.top-0, .fixed, details, #mobile-menu-trigger { display: none !important; }
            /* 레이아웃 강제 확장 및 스크롤 제거 */
            #root, body, html { width: 100% !important; height: auto !important; overflow: visible !important; }
            #dashboard-content { display: block !important; width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
            #main-dashboard-panel { width: 100% !important; max-width: none !important; }
            /* 패널 스타일 단순화 (그림자 제거, 테두리 추가) 및 페이지 넘김 방지 */
            .rounded-xl, .rounded-lg, .rounded-2xl, .shadow-lg, .shadow-sm, .shadow {
                box-shadow: none !important; border: 1px solid #e5e7eb !important; break-inside: avoid; page-break-inside: avoid;
            }
            /* 스크롤 영역 전체 표시 (테이블 등 잘림 방지) */
            .overflow-x-auto, .overflow-y-auto { overflow: visible !important; height: auto !important; max-height: none !important; }
        }

        /* 스켈레톤 쉬머(Shimmer) 애니메이션 효과 */
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%; 
            animation: placeholderShimmer 1.5s infinite linear forwards;
        }
        .dark .shimmer {
            background: #1f2937;
            background-image: linear-gradient(to right, #1f2937 0%, #374151 20%, #1f2937 40%, #1f2937 100%);
        }
        @keyframes placeholderShimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    </style>
    <script src="defaultData.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-gradient@0.6.1/dist/chartjs-plugin-gradient.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // 인앱 브라우저(카카오톡) 감지 및 외부 브라우저 전환 스크립트
        (function() {
            const userAgent = navigator.userAgent.toLowerCase();
            const targetUrl = window.location.href;

            if (userAgent.indexOf('kakaotalk') > -1) {
                if (userAgent.indexOf('android') > -1) {
                    location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;end';
                } else if (userAgent.indexOf('iphone') > -1 || userAgent.indexOf('ipad') > -1) {
                    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                }
            }
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 font-sans">
    <div id="root"></div>

    <script type="text/babel">
            const { useState, useMemo, useEffect, useRef } = React;

        const AssetSummaryCard = ({ calculation, projectionMonths, baseMonth, baseDate, displayMode }) => {
            const formatNumber = window.formatNumber || ((n) => Number(n || 0).toLocaleString());
            const formatPercent = window.formatPercent || ((n) => (Number(n || 0)).toFixed(1));
            const TEXTS = window.TEXTS || {};
            const lastProj = calculation.monthlyProjections && calculation.monthlyProjections[projectionMonths - 1];
            // modals.js에서 로드된 TooltipGuide 사용
            const TooltipGuide = window.TooltipGuide || (() => null);
            let compLabel = "";
            let compVal = 0;
            let compPct = 0;
        
            if (!calculation.error && projectionMonths >= 1 && calculation.monthlyProjections?.length >= projectionMonths) {
                if (projectionMonths <= 12) {
                    const prevProj = projectionMonths > 1 ? calculation.monthlyProjections[projectionMonths - 2] : { gross: calculation.currentGross };
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "전월 대비";
                } else {
                    const prevProj = calculation.monthlyProjections[projectionMonths - 12];
                    compVal = lastProj.gross - prevProj.gross;
                    compPct = prevProj.gross !== 0 ? (compVal / Math.abs(prevProj.gross)) * 100 : 0;
                    compLabel = "1년 전 대비";
                }
            }
        
            return (
                <div className="md:col-span-1 bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-blue-900/40 dark:to-indigo-900/40 rounded-xl shadow-lg p-6">
                    <div>
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">{TEXTS.summary?.currentTotal || "현재 총자산"}</h2>
                        <div className="flex items-end gap-2">
                            <p className="text-3xl font-bold text-blue-600 dark:text-blue-400">{formatNumber(calculation.currentGross, displayMode)}만원</p>
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">(순자산 {formatNumber(calculation.currentNet, displayMode)}만원)</span>
                        </div>
                    </div>
                    <div className="mt-6"> 
                        <h2 className="text-lg font-semibold mb-2 text-gray-600 dark:text-white">{projectionMonths}{TEXTS.summary?.projectedTotal || "개월 후 예상"} <span className="text-gray-400 text-sm">({(() => { 
                            try { 
                                const [y,m]= (baseDate || baseMonth || '').split('-').map(Number); 
                                const d = new Date(y||new Date().getFullYear(), (m||1)-1, 1); d.setMonth(d.getMonth()+projectionMonths); return `${String(d.getFullYear()).slice(2)}년 ${String(d.getMonth()+1).padStart(2,'0')}월`; 
                            } catch { return ''; } })()})</span></h2>
                        <div className="flex items-end gap-2">
                            <p className="text-3xl font-bold text-green-600 dark:text-green-400">{formatNumber(calculation.projectedGross, displayMode)}만원</p>
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">(순자산 {formatNumber(calculation.projectedNet, displayMode)}만원)</span>
                        </div>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">{TEXTS.summary?.expectedIncrease || "예상 증가액"}: +{formatNumber(calculation.growth, displayMode)}만원 ({formatPercent((calculation.growth) / Math.max(1, calculation.currentGross) * 100)}%)</p>         
                        {compLabel && (
                            <p className="text-xs text-gray-400 mt-1">
                                ({compLabel}: {compVal >= 0 ? '+' : ''}{formatNumber(compVal, displayMode)}만원, {compVal >= 0 ? '+' : ''}{formatPercent(compPct)}%)
                            </p>
                        )}
                        <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            {TEXTS.summary?.inflationAdjusted || "인플레이션 고려 시"}: {formatNumber(calculation.realValue, displayMode)}만원
                            <TooltipGuide tip="물가 상승률을 반영하여 현재 가치로 환산한 금액입니다." />
                        </p>
                        {calculation.fireMetrics && (
                            <div className="mt-6 pt-6 border-t border-blue-200 dark:border-blue-800">
                                <h3 className="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider mb-3 flex items-center">
                                    {TEXTS.summary?.fireAnalysis || "자립 가능성 분석 (FIRE Analysis)"}
                                    <TooltipGuide tip="경제적 자립을 통해 조기 은퇴가 가능한지 분석합니다." />
                                </h3>
                                <div className="grid grid-cols-1 gap-3">
                                    <div className="flex justify-between items-center p-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                                        <span className="text-xs text-gray-500 flex items-center">
                                            {TEXTS.summary?.survivalPeriod || "생존 가능 기간"}
                                            <TooltipGuide tip="추가 소득 없이 현재 자산으로 생활 가능한 예상 기간입니다." />
                                        </span>
                                        <span className="text-xs font-bold text-gray-900 dark:text-white">
                                            {calculation.totalMonthlyExpense > 0 ? (
                                                calculation.fireMetrics.runwayMonths >= 1200 ? '100년 이상' : `${Math.floor(calculation.fireMetrics.runwayMonths / 12)}년 ${calculation.fireMetrics.runwayMonths % 12}개월`
                                            ) : (
                                                <span className="text-red-500">지출 설정 필요</span>
                                            )}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center p-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                                        <span className="text-xs text-gray-500 flex items-center">
                                            {TEXTS.summary?.fireNeeded || "FIRE (4% 법칙) 필요자산"}
                                            <TooltipGuide tip="연간 지출의 25배를 모으면 매년 4%씩 인출해도 원금이 유지된다는 법칙입니다." />
                                        </span>
                                        <span className="text-xs font-bold text-gray-900 dark:text-white">
                                            {calculation.totalMonthlyExpense > 0 ? formatNumber(calculation.fireMetrics.swr4PercentCapital, displayMode) + '만원' : '-'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const CoreSettingsCard = ({
            monthlySalary, setMonthlySalary, baseDate, setBaseDate, // [변경] baseMonth -> baseDate
            onOpenDataManage,
            salaryDay, setSalaryDay,
            saveToPDF, saveCurrentAsset, saveScenario, displayMode
        }) => {
            const TEXTS = window.TEXTS || {};

            return (
                <div className="md:col-span-1 bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6"> 
                    <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">{TEXTS.settings?.coreSettings || "핵심 설정"}</h2>
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">{TEXTS.settings?.monthlySalary || "월 고정 수입 (만원)"}</label>
                                <CalculatorInput 
                                    className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                                    value={monthlySalary} 
                                    onChange={(e) => setMonthlySalary(Number(e.target.value))} 
                                    displayMode={displayMode}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">고정 수입일</label>
                                <select 
                                    className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    value={salaryDay || 25}
                                    onChange={(e) => setSalaryDay(Number(e.target.value))}
                                >
                                    {Array.from({length: 31}, (_, i) => i + 1).map(day => (
                                        <option key={day} value={day}>{day}일</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-white mb-1">계산 시작일 (기준일)</label>
                            <input type="date" className="w-full border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value={baseDate} onChange={(e) => setBaseDate(e.target.value)} />
                        </div>
                        <div className="pt-4 border-t dark:border-gray-700">
                            <h3 className="text-sm font-bold text-gray-700 dark:text-white mb-2">{TEXTS.settings?.dataManagement || "데이터 관리"}</h3>
                            <div className="flex flex-col gap-2">
                                <button onClick={onOpenDataManage} className="flex items-center justify-center gap-2 px-3 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-700 shadow-sm transition-all">
                                    <span>💾</span> 데이터 내보내기 / 불러오기
                                </button>
                                <button onClick={saveCurrentAsset} className="flex items-center justify-center gap-2 px-3 py-2 bg-indigo-500 text-white text-sm font-semibold rounded-lg hover:bg-indigo-600 shadow-sm hover:shadow-md transition-all mt-2">
                                    <span>💾</span> {TEXTS.settings?.saveHistory || "히스토리 저장"}
                                </button>
                                <button onClick={saveScenario} className="flex items-center justify-center gap-2 px-3 py-2 bg-gray-600 text-white text-sm font-semibold rounded-lg hover:bg-gray-700 shadow-sm hover:shadow-md transition-all mt-2">
                                    <span>💾</span> 시나리오 저장
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GoalSettingsCard = ({
            goalMode, setGoalMode, setGoalSeekResult,
            projectionMonths, setProjectionMonths, targetAmount, setTargetAmount,
            calculateGoalSeek, goalSeekResult,
            inflationRate, setInflationRate
        }) => {
            const TEXTS = window.TEXTS || {};
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    setProjectionMonths(prev => prev >= 120 ? 0 : prev);
                    interval = setInterval(() => {
                        setProjectionMonths(prev => {
                            if (prev >= 120) { setIsPlaying(false); return 120; }
                            return prev + 1;
                        });
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isPlaying, setProjectionMonths]);

            return (
                <div className="md:col-span-1 bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6"> 
                    <h2 className="text-xl font-bold text-gray-800 dark:text-white mb-4">{TEXTS.settings?.goalSettings || "목표 설정"}</h2>
                    <div className="mb-4">
                        <div className="flex border border-gray-200 dark:border-gray-700 rounded-lg p-1 bg-gray-100 dark:bg-gray-900">
                            <button onClick={() => { setGoalMode('period'); setGoalSeekResult(null); }} className={`flex-1 py-2 text-sm font-semibold rounded-md transition-colors ${goalMode === 'period' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 shadow' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800'}`}>
                                {TEXTS.settings?.periodBased || "기간 기준"}
                            </button>
                            <button onClick={() => setGoalMode('target')} className={`flex-1 py-2 text-sm font-semibold rounded-md transition-colors ${goalMode === 'target' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 shadow' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800'}`}>
                                {TEXTS.settings?.assetBased || "자산 기준"}
                            </button>
                        </div>
                    </div>
                    <div className="space-y-4"> 
                        {goalMode === 'period' ? (
                            <div>
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-sm font-medium text-gray-700 dark:text-white">{TEXTS.settings?.expectedPeriod || "예상 기간"}</label>
                                    <span className="text-sm font-bold text-blue-600 dark:text-blue-400">{projectionMonths}개월 후</span>
                                </div>
                                <div className="flex items-center gap-3">

        const useUndoRedo = (initialState) => {
            // [수정] 상태 관리를 하나의 객체로 통합하여 setState 내부 사이드 이펙트 제거
            const [history, setHistory] = useState({
                past: [],
                present: initialState,
                future: []
            });
            const { past, present, future } = history;
            
            // [추가] 상태 동기화를 위한 Ref (이벤트 핸들러 내 최신 상태 참조용)
            const historyRef = useRef(history);
            useEffect(() => { historyRef.current = history; }, [history]);
            
            const lastHistoryTime = useRef(0);

            const set = React.useCallback((newState) => {
                const curr = historyRef.current;
                const computedState = typeof newState === 'function' ? newState(curr.present) : newState;
                
                // 상태가 변경되지 않았으면 리턴
                if (JSON.stringify(curr.present) === JSON.stringify(computedState)) return;

                const now = Date.now();
                const shouldSave = now - lastHistoryTime.current > 500;

                if (shouldSave) {
                    lastHistoryTime.current = now;
                    setHistory(prev => ({
                        past: [...prev.past, prev.present].slice(-30),
                        present: computedState,
                        future: []
                    }));
                } else {
                    setHistory(prev => ({
                        ...prev,
                        present: computedState,
                        future: []
                    }));
                }
            }, []);

            const undo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.past.length === 0) return curr;
                    const previous = curr.past[curr.past.length - 1];
                    const newPast = curr.past.slice(0, curr.past.length - 1);
                    return {
                        past: newPast,
                        present: previous,
                        future: [curr.present, ...curr.future]
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const redo = React.useCallback(() => {
                setHistory(curr => {
                    if (curr.future.length === 0) return curr;
                    const next = curr.future[0];
                    const newFuture = curr.future.slice(1);
                    return {
                        past: [...curr.past, curr.present],
                        present: next,
                        future: newFuture
                    };
                });
                lastHistoryTime.current = Date.now();
            }, []);

            const reset = React.useCallback((newState) => {
                setHistory({
                    past: [],
                    present: newState,
                    future: []
                });
            }, []);

            return { state: present, setState: set, undo, redo, canUndo: past.length > 0, canRedo: future.length > 0, reset };
        };

            const [currentIndex, setCurrentIndex] = useState(0);

            const [isLoading, setIsLoading] = useState(false);
            const [marketItems, setMarketItems] = useState(window.INITIAL_MARKET_ITEMS || []);
            const retryCountRef = useRef(0);

            // [추가] 상태 추적 및 재시도 로직을 위한 Ref
            const marketItemsRef = useRef(marketItems);
            useEffect(() => { marketItemsRef.current = marketItems; }, [marketItems]);
            const retryTimeoutRef = useRef(null);

            // [수정] 실제 API 데이터 페칭 함수 (수동 새로고침 및 자동 재시도 지원)
            const fetchMarketData = React.useCallback(async (forceRefresh = false) => {
                // forceRefresh가 이벤트 객체인 경우(버튼 클릭) true로 처리
                const isForce = typeof forceRefresh === 'boolean' ? forceRefresh : true;
                
                if (retryTimeoutRef.current) clearTimeout(retryTimeoutRef.current);
                if (isForce) retryCountRef.current = 0;
                setIsLoading(true);

                const targets = [
                    { name: 'USD/KRW', fn: () => window.fetchYahooData('KRW=X') },
                    { name: 'S&P 500', fn: () => window.fetchYahooData('^GSPC') },
                    { name: 'NASDAQ', fn: () => window.fetchYahooData('^IXIC') },
                    { name: 'Gold', fn: () => window.fetchYahooData('GC=F') },
                    { name: 'Bitcoin', fn: () => window.fetchBitcoinData() }

                // 강제 새로고침이거나 아직 실시간 데이터가 없는 항목만 필터링

                        const item = marketItemsRef.current.find(m => m.name === t.name);
                        return item && !item.isLive;
                    });

                if (itemsToFetch.length === 0) {
                    setIsLoading(false);
                    return;
                }

                try {
                    const results = await Promise.allSettled(
                        itemsToFetch.map(t => t.fn().then(data => ({ ...t, data })))
                    );

                    let failCount = 0;

                    setMarketItems(prev => {
                        const next = [...prev];
                        results.forEach(res => {
                            if (res.status === 'fulfilled' && res.value.data) {
                                const { name, data } = res.value;
                                const idx = next.findIndex(item => item.name === name);
                                if (idx === -1) return;

                                const item = next[idx];
                                const sign = data.change >= 0 ? '+' : '';
                                const color = data.change >= 0 ? 'red' : 'blue';
                                const formattedValue = (item.name === 'Gold' || item.name === 'Bitcoin') 
                                    ? `$${data.price.toLocaleString(undefined, {maximumFractionDigits: 2})}`
                                    : data.price.toLocaleString(undefined, {maximumFractionDigits: 2});

                                next[idx] = {
                                    ...item,
                                    value: formattedValue,
                                    change: `${sign}${data.change.toFixed(2)}%`,
                                    color: color,
                                    data: data.data,
                                    isLive: true
                                };
                            } else {
                                failCount++;
                            }
                        });
                        return next;
                    });

                    // 실패한 항목이 있고 3회 미만일 경우 3초 후 자동으로 다시 시도
                    if (failCount > 0 && retryCountRef.current < 3) {
                        retryCountRef.current += 1;
                        retryTimeoutRef.current = setTimeout(() => fetchMarketData(false), 3000);
                    }

                } catch (e) {
                    console.warn("Market data fetch failed", e);
                    if (retryCountRef.current < 3) retryTimeoutRef.current = setTimeout(() => fetchMarketData(false), 5000);
                } finally {
                    setIsLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchMarketData(true);
                return () => { if (retryTimeoutRef.current) clearTimeout(retryTimeoutRef.current); };
            }, [fetchMarketData]);

            const currentItem = marketItems[currentIndex];
            const nextItem = () => setCurrentIndex((prev) => (prev + 1) % marketItems.length);

            useEffect(() => {

                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = canvasRef.current.getContext('2d');
                    const isPositive = currentItem.change.startsWith('+');

                                y: { display: false } 
                            },
                            layout: { padding: 0 },
                            animation: { duration: 0 }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };

                            <button onClick={prevItem} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded"><svg className="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg></button>

                        </div>

                        <div className="flex justify-between items-end mb-2">
                            <div>
                                <div className="text-sm font-bold text-gray-800 dark:text-white">{currentItem.name}</div>

        const CalculatorInput = ({ value, onChange, className, placeholder, style, displayMode, ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                if (!isEditing) {
                    setLocalValue(value);
                }
            }, [value, isEditing]);

            const safeEvaluate = (str) => {
                try {
                    if (/[^0-9+\-*/.()\s]/.test(str)) return null;
                    // eslint-disable-next-line no-new-func
                    const result = new Function('return ' + str)();
                    return isFinite(result) ? result : null;
                } catch (e) {
                    return null;
                }
            };

            const handleBlur = () => {
                const strVal = String(localValue).trim();
                if (/[\+\-\*\/]/.test(strVal)) {
                    const result = safeEvaluate(strVal);
                    if (result !== null) {
                        const finalVal = Math.round(result * 100) / 100;
                        setLocalValue(finalVal);
                        onChange({ target: { value: finalVal } });
                    } else { setLocalValue(value); }
                } else { 
                    // [수정] 090 -> 90 등 숫자 형식 자동 보정
                    const numVal = parseFloat(strVal);
                    if (!isNaN(numVal)) {
                        setLocalValue(numVal);
                        onChange({ target: { value: numVal } });
                    } else {
                        onChange({ target: { value: strVal } });
                    }
                }
                setIsEditing(false);
            };

            // [추가] 프라이빗 모드 마스킹 처리
            const isMasked = displayMode === 'percent' && !isEditing;
            
            // [수정] 연산자가 포함된 경우에만 text 타입으로 전환하여 number 타입의 네이티브 기능(스피너, 화살표) 유지
            const hasOperators = /[\+\-\*\/]/.test(String(localValue));
            const inputType = isMasked || (isEditing && hasOperators) ? "text" : "number";

            return (
                <input type={inputType} value={isMasked ? '***' : localValue} onChange={(e) => { if(!isMasked) setLocalValue(e.target.value); }} onBlur={handleBlur} className={className} placeholder={placeholder} style={style} step="any" {...props}
                    onKeyDown={(e) => {
                        if (e.key === 'Enter') e.target.blur();
                        if (!isEditing && ['+', '-', '*', '/'].includes(e.key)) {
                            e.preventDefault(); setIsEditing(true); setLocalValue(prev => String(prev) + e.key);
                        }
                        // [추가] 화살표 키보드 동작 커스텀 (1단위 증감 보장 및 즉시 반영)
                        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                            if (!hasOperators) {
                                e.preventDefault();
                                const currentVal = parseFloat(localValue) || 0;
                                const step = Number(props.step) || 1;
                                const direction = e.key === 'ArrowUp' ? 1 : -1;
                                const newVal = Math.round((currentVal + step * direction) * 10000) / 10000;
                                setLocalValue(newVal);
                                onChange({ target: { value: newVal } });
                            }
                        }
                    }}
                    onFocus={(e) => { setIsEditing(true); e.target.select(); }}
                />
            );
        };

            useEffect(() => {

            const appDataRef = useRef(appData);
        const scenariosRef = useRef(scenarios);
        const assetHistoryRef = useRef(assetHistory);

        const saveToCloud = React.useCallback(async (unifiedData, force = false, emailOverride = null, proOverride = null, keyOverride = null, modeOverride = null) => {
            if (!supabase) {
                if (force) console.warn("Cloud save skipped: Supabase not initialized.");
                return;
            }

            const targetEmail = emailOverride || verifiedEmail;
            const targetPro = proOverride !== null ? proOverride : isPro;
            // [수정] FREE 유저도 기본적으로 'normal' 암호화 적용 (데이터 보호 및 로직 통일)
            const targetMode = targetPro ? (modeOverride || encryptionMode) : 'normal';

            // [수정] force가 true일 경우(비밀번호 복구 등) isCloudLoaded 상태와 무관하게 저장 허용
            if (!targetEmail || isDemoMode || !unifiedData || !isInitialized) return;
            if (!force && !isCloudLoaded) return;
            if (!force && isFetchingRef.current) return;

            const currentDataStr = JSON.stringify(unifiedData);
            if (!force && currentDataStr === lastSavedDataRef.current) return;

            let payloadData = unifiedData;
            // [수정] targetMode가 있으면 암호화 시도 (PRO 여부 무관)
            if (targetMode) {
                let key = keyOverride;
                
                if (!key) {
                    let secret = null;
                    if (targetMode === 'secure') {
                        secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                        if (!secret) {
                            pendingSave.current = true;
                            setIsPasswordPromptOpen(true);

                    }
                    key = window.getEncryptionKey(targetMode, secret, targetEmail, SECURITY_KEY);

                if (!key) {
                    if (targetMode === 'normal') {
                        addToast('Cloud sync disabled: System Security Key missing.', 'error');
                    } else {
                        addToast('보안 키 설정 오류로 저장이 중단되었습니다.', 'error');
                    }
                    setSyncStatus('error');
                    return;
                }
                try {
                    payloadData = await encryptData(unifiedData, key);
                } catch (e) {
                    console.error("Encryption error:", e);
                    addToast('데이터 암호화 중 오류가 발생했습니다.', 'error');
                    setSyncStatus('error');
                    return; // Early return on encryption failure
                }
            }

            setSyncStatus('syncing');
            try {
                    // [수정] 클라우드 저장 시에도 로컬 날짜 기준 사용 (히스토리와 일관성 유지)
                    const now = new Date();
                    // [수정] 1900년 고정 해제: FREE/PRO 모두 실제 저장 날짜 기록
                    const recordDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                await withRetry(() => supabase.auth.refreshSession());

                // [추가] FREE 유저는 단일 레코드 유지를 위해 오늘 날짜가 아닌 과거 데이터 삭제
                if (!targetPro) {
                    await withRetry(() => supabase.from('user_assets').delete().eq('email', targetEmail).neq('record_date', recordDate));
                }

                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets').upsert({ 
                        email: targetEmail, data: payloadData,
                        encryption_type: targetMode,
                        updated_at: new Date().toISOString(),
                            record_date: recordDate
                    }, { onConflict: 'email,record_date' }).select('updated_at').single()
                );
                if (error) {
                    console.error('Supabase Upsert Error:', error.code, error.message);
                    throw error;
                }
                if (data) {
                    setSyncStatus('synced');
                    setLastSyncTime(new Date().toLocaleTimeString('ko-KR', { hour12: false }));
                    localStorage.setItem('assetDashboardLastUpdate', data.updated_at);
                    lastSavedDataRef.current = currentDataStr;
                }
            } catch (error) {
                console.error('Sync error:', error);
                setSyncStatus('error');
                setSyncStatusError(error.message || '저장 실패');
                setLastSyncTime(null);
            } // This finally block was removed as it was empty and unnecessary
        }, [verifiedEmail, isPro, encryptionMode, userSecretKey, userProfile, isDemoMode, supabase, isInitialized, isCloudLoaded, withRetry, getEncryptionKey]);

        // 클라우드 데이터 불러오기
        const fetchFromCloud = React.useCallback(async (email = verifiedEmail, pro = isPro, isInitialLoad = false, isManual = false, localDataOverride = null) => {
            if (!supabase || isProcessing.current || isFetchingRef.current) return;
            isFetchingRef.current = true; // Lock fetching
            setSyncStatus('syncing');
            setIsLoadingCloud(true);
            try {
                const { data, error } = await withRetry(() => 
                    supabase.from('user_assets')
                        .select('data, updated_at, encryption_type')
                        .eq('email', email)
                        .order('updated_at', { ascending: false })
                        .limit(1)
                        .maybeSingle()
                );
                if (error) throw error;

                if (data && data.data) {
                    const encType = data.encryption_type;
                    const isLegacy = !encType || encType === 'none';
                    if (pro && isLegacy) setIsEncryptionModalOpen(true);
                    else if (pro) setEncryptionMode(encType);

                    let decryptedData = data.data;
                    // [수정] PRO 여부와 관계없이 암호화된 데이터면 복호화 시도
                    if (!isLegacy) {
                        let secret = null;
                        if (encType === 'secure') {
                            secret = userSecretKey || sessionStorage.getItem('assetDashboardSecretKey');
                            if (!secret) {
                                pendingCiphertext.current = data.data;
                                setIsPasswordPromptOpen(true);
                                return; // finally block will handle state reset
                            }
                        }
                        
                        // [Fix] Consistent Encryption Identity: Always use email via global helper
                        const key = window.getEncryptionKey(encType, secret, email, SECURITY_KEY);

                        // [수정] 일반 모드에서 보안 키(SECURITY_KEY)가 없는 경우 예외 처리
                        if (!key && encType === 'normal') {
                            addToast('시스템 보안 키가 설정되지 않아 데이터를 불러올 수 없습니다. (환경변수 확인 필요)', 'error');
                            setSyncStatus('error');
                            return; // finally block will handle state reset
                        }

                        try {
                            decryptedData = await decryptData(data.data, key);
                        } catch (err) {
                            let recovered = false;
                            // [추가] 이전 버전 데이터(이메일 솔트 없음) 복구 시도 (Fallback)
                            if (encType === 'normal' && SECURITY_KEY && key !== SECURITY_KEY) {
                                try {
                                    decryptedData = await decryptData(data.data, SECURITY_KEY);
                                    recovered = true;
                                    addToast('이전 보안 형식의 데이터를 변환하여 불러왔습니다.', 'success');
                                } catch (e) { /* Fallback failed */ }
                            }

                            if (!recovered) {
                                if (encType === 'normal') {
                                    // [수정] 덮어쓰기 전 유효한 보안 키가 있는지 먼저 확인 (무한 루프 방지)
                                    const newKey = window.getEncryptionKey('normal', null, email, SECURITY_KEY);
                                    if (!newKey) {
                                        addToast("시스템 보안 키(SECURITY_KEY)가 설정되지 않아 데이터를 덮어쓸 수 없습니다. 환경변수를 확인하거나 설정에서 '보안 모드'로 전환하세요.", 'error');
                                        setSyncStatus('error');
                                        return;
                                    }

                                    // [Fix] Safe Recovery: Block overwrite if local data is default
                                    const isLocalDataDefault = JSON.stringify(appDataRef.current) === JSON.stringify(window.publicDefaultData);
                                    if (isLocalDataDefault) {
                                        addToast("복호화 실패: 보안 키가 일치하지 않습니다. 로컬 데이터가 초기 상태라 덮어쓰기가 차단되었습니다. 환경변수를 확인해주세요.", 'error');
                                    } else if (confirm("보안 키 불일치: 클라우드 데이터에 접근할 수 없습니다. 현재 로컬 데이터로 클라우드를 덮어쓰고 문제를 해결하시겠습니까?")) {
                                        const localData = localDataOverride || { appData: appDataRef.current, scenarios: scenariosRef.current, assetHistory: assetHistoryRef.current };
                                        await saveToCloud(localData, true, email, pro);
                                        // [추가] 덮어쓰기 성공 시 즉시 상태 업데이트하여 재진입 방지

                    query = query.gte('record_date', start).lte('record_date', end).order('record_date', { ascending: false });
                } else {
                    // YYYY-MM-DD 형식인 경우 (정확한 날짜 클릭 시)

                setReferenceScenarios(prev => {
                    const exists = prev.find(r => r.id === scenario.id);
                    if (exists) {
                        return prev.filter(r => r.id !== scenario.id);
                    } else {
                        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899', '#6366f1'];
                        const usedColors = prev.map(r => r.color);
                        const nextColor = colors.find(c => !usedColors.includes(c)) || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                        return [...prev, { id: scenario.id, color: nextColor }];
                    }
                });
            };

            const updateReferenceColor = (id, color) => {
                setReferenceScenarios(prev => prev.map(r => r.id === id ? { ...r, color } : r));
            };

            // ===== 예산 계산 =====
            const totalMonthlyExpense = useMemo(() => {
                if (!monthlyExpenses || !Array.isArray(monthlyExpenses)) return 0;
                return monthlyExpenses.reduce((sum, e) => sum + Number(e.amount || 0), 0);
            }, [monthlyExpenses]);
            
            const totalSectorMonthlyContrib = useMemo(() => {
                if (!assets || typeof assets !== 'object') return 0;
                let sum = 0;
                // [추가] 현재 날짜 기준 (미래 대출 제외용)
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth() + 1;

                Object.entries(assets).forEach(([sector, arr]) => {
                    if (Array.isArray(arr)) {
                        arr.forEach(asset => { 
                            // [수정] 대출의 경우 조건부 합산
                            if (sector === 'loan') {
                                // 1. 상환 계좌가 '월급(salary)'이 아니면 월납입 예산에서 제외 (자산에서 차감되므로)
                                if (asset.repaymentAccount !== 'salary') return;
                                
                                // 2. 대출 시작일이 미래인 경우 현재 예산에서 제외
                                if (asset.loanStartDate) {
                                    const [y, m] = asset.loanStartDate.split('-').map(Number);
                                    if (y > currentYear || (y === currentYear && m > currentMonth)) return;
                                }
                            } else {
                                // [수정] 일반 자산: 납입 출처가 '월 고정수입'이 아니면 예산 합산 제외
                                const source = asset.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE;
                                if (source !== window.MONTHLY_INCOME_SOURCE) return;
                            }
                            sum += Number(asset.monthlyContrib || 0); 
                        });
                    }
                });
                return sum;
            }, [assets]);
            
            const maxSectorMonthlyContrib = useMemo(() => Math.max(0, monthlySalary - totalMonthlyExpense), [monthlySalary, totalMonthlyExpense]);
            const autoDepositAmount = Math.max(0, maxSectorMonthlyContrib - totalSectorMonthlyContrib);

            const calculateGoalSeek = () => {
                if (!targetAmount || targetAmount <= 0) {
                    addToast('유효한 목표 금액을 입력해주세요.', 'error');
                    return;
                }

                // [수정] utils.js의 calculateGoalReachMonth 사용
                const result = calculateGoalReachMonth(appData, targetAmount);

                if (result.success) {
                    setGoalSeekResult(`목표 달성까지 약 ${result.month}개월 소요됩니다.`);
                    setProjectionMonths(result.month);
                } else if (result.error) {
                    setGoalSeekResult(result.message);
                } else {
                    setGoalSeekResult('계산 결과를 찾을 수 없습니다.');
                }
            };

            const movePanel = (id, direction) => {
                setLayoutOrder(prev => {
                    const index = prev.indexOf(id);
                    if (index === -1) return prev;
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= prev.length) return prev;
                    const newOrder = [...prev];
                    [newOrder[index], newOrder[newIndex]] = [newOrder[newIndex], newOrder[index]];
                    return newOrder;
                });
            };

            const togglePanelCollapse = (panelId) => {
                setPanelCollapseState(prev => ({
                    ...prev,
                    [panelId]: !prev[panelId]
                }));
            };

            const moveAssetSector = (sectorKey, direction) => {
                setAssetSectorOrder(prev => {
                    const index = prev.indexOf(sectorKey);
                    if (index === -1) return prev;
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= prev.length) return prev;
                    const newOrder = [...prev];
                    [newOrder[index], newOrder[newIndex]] = [newOrder[newIndex], newOrder[index]];
                    return newOrder;
                });
            };

            const [draggedPanelId, setDraggedPanelId] = useState(null);

            const handlePanelDragStart = React.useCallback((e, id) => {
                setDraggedPanelId(id);
                e.dataTransfer.effectAllowed = "move";
            }, []);

            const handlePanelDragOver = React.useCallback((e) => e.preventDefault(), []);

            const handlePanelDrop = React.useCallback((e, targetId) => {
                e.preventDefault();
                if (!draggedPanelId || draggedPanelId === targetId) return;

                setLayoutOrder(prev => {
                    const oldIndex = prev.indexOf(draggedPanelId);
                    const newIndex = prev.indexOf(targetId);
                    if (oldIndex === -1 || newIndex === -1) return prev;
                    const newOrder = [...prev];
                    newOrder.splice(oldIndex, 1);
                    newOrder.splice(newIndex, 0, draggedPanelId);
                    return newOrder;
                });
                setDraggedPanelId(null);
            }, [draggedPanelId]);

            const calculation = useMemo(() => {
                if (!appData || !appData.assets || typeof appData.assets !== 'object') {
                    return {
                        initial: {},
                        projected: {},
                        currentTotal: 0,
                        projectedTotal: 0,
                        growth: 0,
                        grand: 0,
                        realValue: 0,
                        monthlyProjections: [],
                        warnings: [],
                        fireMetrics: null,
                        rebalanceInfo: null
                    };
                }
                
                const months = projectionMonths;
                // [수정] 인플레이션 보정 및 이벤트 배열 안전성 확보 (undefined 방지)
                const safeAppData = {
                    ...appData,
                    incomeEvents: Array.isArray(appData.incomeEvents) ? appData.incomeEvents : [],
                    expenseEvents: Array.isArray(appData.expenseEvents) ? appData.expenseEvents : [],
                };

                const localTotalMonthlyExpense = (appData.monthlyExpenses || []).reduce((sum, e) => sum + Number(e.amount || 0), 0);
                
                // [추가] 예산 초과 검증 변수 계산
                const localMonthlySalary = Number(appData.monthlySalary || 0);
                const localMaxContrib = Math.max(0, localMonthlySalary - localTotalMonthlyExpense);
                let localTotalContrib = 0;
                
                // [수정] 예산 초과 검증 시에도 납입 출처 확인 (이체는 제외)
                Object.entries(appData.assets).forEach(([sector, arr]) => {
                    if (Array.isArray(arr)) {
                        arr.forEach(a => {
                            let include = true;
                            if (sector === 'loan') {
                                if (a.repaymentAccount !== 'salary') include = false;
                            } else {
                                const source = a.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE;
                                if (source !== window.MONTHLY_INCOME_SOURCE) include = false;
                            }
                            if (include) localTotalContrib += Number(a.monthlyContrib || 0);
                        });
                    }
                });
                
                // 1. High-Precision Initial Metrics
                let currentTotal = 0;
                let totalNetProfitMonthlyInitial = 0;
                let totalInvestedPrincipal = 0;
                const sectorSums = {};
                
                Object.keys(appData.assets).forEach(sector => {
                    if (!sectorSums[sector]) sectorSums[sector] = 0;
                    (appData.assets[sector] || []).forEach(asset => {
                        const amt = Number(asset.amount || 0);
                        if (sector === 'loan') {
                            currentTotal -= amt;
                        } else {
                            currentTotal += amt;
                            sectorSums[sector] += amt;
                            totalInvestedPrincipal += amt;
                            // Monthly_Net_Profit = (Amount * rate / 1200) * (1 - feeRate / 100)
                            const monthlyProfit = (amt * (Number(asset.rate || 0) / 1200)) * (1 - (Number(asset.feeRate || 0) / 100));
                            totalNetProfitMonthlyInitial += monthlyProfit;
                        }
                    });
                });

                // 2. Individual Asset Simulation (Runway - 1200 Months)
                let runwayMonths = 0;
                let debtFreeMonth = -1;
                const maxSimMonths = 1200;
                const simAssets = JSON.parse(JSON.stringify(appData.assets));
                
                // [수정] 초기 자산이 0 이하인 경우 생존 기간 0으로 처리
                if (currentTotal <= 0) {
                    runwayMonths = 0;
                } else {
                    // [Refactor] Find Main Account in Simulation Data
                    let simMainAccount = null;
                    for (const s in simAssets) {
                        const found = simAssets[s].find(a => a.name === appData.mainCashFlowAccount);
                        if (found) { simMainAccount = found; break; }
                    }
                    if (!simMainAccount) {
                        const firstSector = Object.keys(simAssets).find(s => s !== 'loan' && simAssets[s].length > 0);
                        if (firstSector) simMainAccount = simAssets[firstSector][0];
                    }

                    for (let m = 1; m <= maxSimMonths; m++) {
                        // 1. Inflation Adjusted Expense
                        const inflationFactor = Math.pow(1 + inflationRate / 1200, m);
                        const currentMonthlyExpense = localTotalMonthlyExpense * inflationFactor;

                        // 2. Loan Repayment & Interest
                        let totalLoanRepayment = 0;
                        let currentLoanBalance = 0;

                        if (simAssets.loan) {
                            simAssets.loan.forEach(loan => {
                                if (loan.amount > 0) {
                                    const interest = loan.amount * (Number(loan.rate || 0) / 1200);
                                    const monthlyPayment = Number(loan.monthlyContrib || 0);
                                    
                                    let cashOutflow = monthlyPayment;
                                    let principalPayment = monthlyPayment - interest;

                                    if (loan.amount + interest <= monthlyPayment) {
                                        cashOutflow = loan.amount + interest;
                                        principalPayment = loan.amount;
                                        loan.amount = 0;
                                    } else {
                                        loan.amount -= principalPayment;
                                    }
                                    
                                    totalLoanRepayment += cashOutflow;
                                    currentLoanBalance += loan.amount;
                                }
                            });
                        }

                        if (currentLoanBalance <= 0 && debtFreeMonth === -1) {
                            debtFreeMonth = m;
                        }
                        
                        // 3. Net Flow (Salary = 0 for Survival Mode)
                        let eventFlow = 0;
                        const checkEvent = (e) => {
                            if (!e.startMonth || typeof e.startMonth !== 'string' || !e.endMonth || typeof e.endMonth !== 'string') return false;
                            const [bY, bM] = baseDate.split('-').map(Number); // [수정] baseDate 사용
                            const [sY, sM] = e.startMonth.split('-').map(Number);
                            const [eY, eM] = e.endMonth.split('-').map(Number);
                            const cur = bY * 12 + bM + m - 1;
                            return cur >= (sY * 12 + sM) && cur <= (eY * 12 + eM);
                        };
                        safeAppData.incomeEvents.forEach(e => { if (checkEvent(e)) eventFlow += Number(e.amount || 0); });
                        safeAppData.expenseEvents.forEach(e => { if (checkEvent(e)) eventFlow -= Number(e.amount || 0); });

                        const netFlow = eventFlow - currentMonthlyExpense - totalLoanRepayment;

                        // 4. Apply to Main Account & Liquidate
                        if (simMainAccount) {
                            simMainAccount.amount += netFlow;
                        }

                        // Liquidation Logic (Prevent Negative Cash)
                        if (simMainAccount && simMainAccount.amount < 0) {
                            let deficit = -simMainAccount.amount;
                            simMainAccount.amount = 0;

                            const liquidationOrder = ['deposit', 'savings', 'investment'];
                            for (const sector of liquidationOrder) {
                                if (deficit <= 0) break;
                                if (!simAssets[sector]) continue;

                                for (const asset of simAssets[sector]) {
                                    if (deficit <= 0) break;
                                    if (asset.name === simMainAccount.name) continue;
                                    if (asset.amount <= 0) continue;

                                    const taken = Math.min(asset.amount, deficit);
                                    asset.amount -= taken;
                                    deficit -= taken;
                                }
                            }

                            if (deficit > 0) {
                                runwayMonths = m - 1;
                                break;
                            }
                        } else if (!simMainAccount && netFlow < 0) {
                             runwayMonths = m - 1;
                             break;
                        }

                        // 5. Apply Profits (Growth)
                        Object.keys(simAssets).forEach(sector => {
                            if (sector === 'loan') return;
                            simAssets[sector].forEach(asset => {
                                if (asset.amount > 0) {
                                    const profit = asset.amount * (Number(asset.rate || 0) / 1200) * (1 - (Number(asset.feeRate || 0) / 100));
                                    asset.amount += profit;
                                }
                            });
                        });

                        if (m === maxSimMonths) runwayMonths = maxSimMonths;
                    }
                }

                // 3. FIRE Indicators (Reverse Engineered)
                const loanInterestInitial = (appData.assets.loan || []).reduce((sum, l) => sum + (Number(l.amount || 0) * Number(l.rate || 0) / 1200), 0);
                const annualFixedExp = (localTotalMonthlyExpense + loanInterestInitial) * 12;
                const annualFixedExpPostDebt = localTotalMonthlyExpense * 12;

                const swr4PercentCapital = annualFixedExpPostDebt * 25; // 4% Rule Reference

                // 4. Soft Rebalancing Engine (Pro-rata)
                const disposableIncome = Math.max(0, (appData.monthlySalary || 0) - localTotalMonthlyExpense);
                const targetMonths = appData.rebalanceMonths || 12;
                const futureValue = currentTotal + (disposableIncome * targetMonths);
                const sectorGaps = {};
                let totalGap = 0;
                const validSectors = Object.keys(sectorInfo).filter(k => k !== 'loan');
                const itemRecs = {};
                const rebalancingGlobal = appData.rebalancingGlobal || { sector: { warning: 5, danger: 10 }, item: { warning: 5, danger: 10 } };
                
                validSectors.forEach(sector => {
                    const targetPct = (appData.rebalancingTargets && appData.rebalancingTargets[sector] !== undefined) 
                        ? appData.rebalancingTargets[sector] 
                        : Math.round(100 / validSectors.length);
                    const targetBalance = futureValue * (targetPct / 100);
                    const currentBalance = sectorSums[sector] || 0;
                    const gap = Math.max(0, targetBalance - currentBalance);
                    sectorGaps[sector] = gap;
                    totalGap += gap;
                });

                const budgetLimited = (totalGap / targetMonths) > disposableIncome;
                const sectorRecs = {};
                validSectors.forEach(sector => {
                    if (totalGap === 0) sectorRecs[sector] = 0;
                    else {
                        sectorRecs[sector] = budgetLimited 
                            ? (sectorGaps[sector] / totalGap) * disposableIncome 
                            : (sectorGaps[sector] / targetMonths);
                    }
                });

                // [추가] 항목별 리밸런싱 추천 계산
                validSectors.forEach(sector => {
                    const sectorAssets = appData.assets[sector] || [];
                    if (sectorAssets.length === 0) return;
                    
                    const sectorMonthlyContrib = sectorRecs[sector] || 0;
                    const sectorTargetPct = (appData.rebalancingTargets && appData.rebalancingTargets[sector] !== undefined) ? appData.rebalancingTargets[sector] : Math.round(100 / validSectors.length);
                    const sectorFutureValue = futureValue * (sectorTargetPct / 100);
                    
                    let totalItemWeight = 0;
                    const currentItemTargets = appData.itemTargets || {};
                    sectorAssets.forEach(a => { totalItemWeight += (currentItemTargets[a.id] ?? Math.round(100/sectorAssets.length)); });
                    
                    let totalItemGap = 0;
                    const currentItemGaps = {};
                    
                    sectorAssets.forEach(a => {
                        const weight = (currentItemTargets[a.id] ?? Math.round(100/sectorAssets.length));
                        const normWeight = totalItemWeight === 0 ? 0 : (weight / totalItemWeight);
                        const targetVal = sectorFutureValue * normWeight;
                        const gap = Math.max(0, targetVal - (a.amount || 0));
                        currentItemGaps[a.id] = gap;
                        totalItemGap += gap;
                    });
                    
                    sectorAssets.forEach(a => {
                        itemRecs[a.id] = totalItemGap > 0 ? (currentItemGaps[a.id] / totalItemGap) * sectorMonthlyContrib : 0;
                    });
                });

                const { projections: monthlyProjections, warnings } = calculateMonthlyProjection({ ...safeAppData, inflationRate, baseDate }, months);

                // [추가] 월납입 한도 초과 시 경고 목록에 추가 (플로팅 버튼 트리거용)
                if (localTotalContrib > localMaxContrib) {
                    warnings.unshift({
                        month: '설정',
                        type: 'budget',
                        message: `월납입 한도 초과! ${window.formatNumber(localTotalContrib - localMaxContrib)}만원이 부족합니다. (가용: ${window.formatNumber(localMaxContrib)}만원)`
                    });
                }

                if (!monthlyProjections || monthlyProjections.length === 0) {
                    return { error: true, warnings: warnings };
                }

                const initialProjection = monthlyProjections[0] || {};
                const newCurrentTotal = initialProjection.total || 0;
                const newCurrentNet = initialProjection.net || 0;
                const newCurrentGross = initialProjection.gross || 0;

                const finalProjection = monthlyProjections[monthlyProjections.length - 1];
                const newProjectedTotal = finalProjection ? finalProjection.total : newCurrentTotal;
                const newProjectedNet = finalProjection ? finalProjection.net : newCurrentNet;
                const newProjectedGross = finalProjection ? finalProjection.gross : newCurrentGross;

                const realValue = newProjectedGross / Math.pow(1 + inflationRate / 100, months / 12);

                return {
                    initial: appData.assets,
                    projected: finalProjection ? finalProjection.assets : appData.assets,
                    currentTotal: newCurrentTotal,
                    currentNet: newCurrentNet,
                    currentGross: newCurrentGross,
                    projectedTotal: newProjectedTotal,
                    projectedNet: newProjectedNet,
                    projectedGross: newProjectedGross,
                    realValue,
                    growth: newProjectedGross - newCurrentGross,
                    grand: newCurrentNet, // grand for history is net assets
                    monthlyProjections: monthlyProjections,
                    warnings: warnings,
                    fireMetrics: {
                        runwayMonths,
                        debtFreeMonth,
                        swr4PercentCapital
                    },
                    totalMonthlyExpense: localTotalMonthlyExpense,
                    rebalanceInfo: {
                        recs: sectorRecs,
                        budgetLimited,
                        targetMonths: targetMonths,
                        itemRecs
                    }
                };
            }, [appData, inflationRate, projectionMonths, baseMonth]);


            const { currentGrossTotal, projectedGrossTotal, currentSectorTotals, projectedSectorTotals } = useMemo(() => {
                const cGross = calculateGrossTotal(calculation.initial);
                const pGross = calculateGrossTotal(calculation.projected);
                return {
                    currentGrossTotal: cGross,
                    projectedGrossTotal: pGross,
                    currentSectorTotals: getSectorTotals(calculation.initial, cGross),
                    projectedSectorTotals: getSectorTotals(calculation.projected, pGross)
                };
            }, [calculation]);

            const filteredKeys = useMemo(() => Object.keys(currentSectorTotals).filter(k => k !== 'loan'), [currentSectorTotals]);
            const projectedKeys = useMemo(() => Object.keys(projectedSectorTotals).filter(k => k !== 'loan'), [projectedSectorTotals]);

            // ===== 리밸런싱 경고 함수 (목표 비중 기준 편차) =====
            const getRebalanceStatus = (key, percentage, isItem = false, itemId = null, sectorKey = null) => {
                const globalSettings = appData.rebalancingGlobal || { sector: { warning: 5, danger: 10 }, item: { warning: 5, danger: 10 } };
                const thresholds = isItem ? globalSettings.item : globalSettings.sector;
                
                let target;
                if (isItem && sectorKey) {
                    const assetsInSector = assets[sectorKey] || [];
                    const totalWeight = assetsInSector.reduce((sum, a) => sum + (appData.itemTargets?.[a.id] ?? Math.round(100/assetsInSector.length)), 0);
                    const rawTarget = appData.itemTargets?.[itemId] ?? Math.round(100/assetsInSector.length);
                    target = totalWeight === 0 ? 0 : (rawTarget / totalWeight) * 100;
                } else {
                    target = rebalancingTargets[key] ?? (100 / Object.keys(sectorInfo).length);
                }

                const deviation = Math.abs(percentage - target);
                if (isItem) {
                    if (deviation >= thresholds.danger) return 'text-red-600 dark:text-red-400 font-bold';
                    if (deviation >= thresholds.warning) return 'text-yellow-600 dark:text-yellow-400 font-bold';
                } else {
                    if (deviation >= thresholds.danger) return 'bg-red-100 text-red-800 dark:bg-red-900/60 dark:text-red-100';
                    if (deviation >= thresholds.warning) return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/60 dark:text-yellow-100';
                }
                return '';
            };

            const getAutoDepositBreakdown = () => {
                const breakdown = [];
                // [추가] 현재 날짜 기준 (미래 대출 제외용)
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth() + 1;

                Object.keys(assets).forEach(sectorKey => {
                    if (Array.isArray(assets[sectorKey])) {
                        assets[sectorKey].forEach(asset => {
                            if (asset.monthlyContrib > 0) {
                                // [수정] 예산 포함 여부 체크 (totalSectorMonthlyContrib와 동일 로직)
                                let isBudget = true;
                                if (sectorKey === 'loan') {
                                    if (asset.repaymentAccount !== 'salary') isBudget = false;
                                    if (asset.loanStartDate) {
                                        const [y, m] = asset.loanStartDate.split('-').map(Number);
                                        if (y > currentYear || (y === currentYear && m > currentMonth)) isBudget = false;
                                    }
                                } else {
                                    const source = asset.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE;
                                    if (source !== window.MONTHLY_INCOME_SOURCE) isBudget = false;
                                }

                                if (isBudget) {
                                    breakdown.push({
                                        sector: sectorKey,
                                        name: asset.name,
                                        amount: asset.monthlyContrib
                                    });
                                }
                            }
                        });
                    }
                });
                return breakdown;
            };

            const autoDepositBreakdown = getAutoDepositBreakdown();

            // ===== 차트 헬퍼 및 설정 =====

            const initChart = (id, ref, config) => {
                if (ref.current) {
                    const ctx = ref.current.getContext('2d');
                    if (ctx) {
                        chartInstancesRef.current[id] = new Chart(ctx, config);
                    }
                }
            };

            const commonChartOptions = useMemo(() => {
                const textColor = darkMode ? '#e5e7eb' : '#111827';
                const gridColor = darkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
                return {
                    maintainAspectRatio: false,
                    responsive: true,
                    animation: { animateScale: true, animateRotate: true, duration: 1000 },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor, padding: 15, font: { family: 'Pretendard' } } },
                        datalabels: {
                            color: darkMode ? '#ffffff' : '#111827',
                            anchor: 'center', // [수정] 중앙 배치
                            align: 'center',  // [수정] 중앙 배치
                            font: { weight: 'bold', size: 11 },
                            formatter: (value, ctx) => {
                                const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0) || 1;
                                const pct = (value / total) * 100;
                                return pct > 4 ? `${pct.toFixed(1)}%` : '';
                            }
                        },
                        tooltip: {
                            backgroundColor: darkMode ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                            titleColor: darkMode ? '#f8fafc' : '#1e293b',
                            bodyColor: darkMode ? '#cbd5e1' : '#475569',
                            borderColor: gridColor,
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 8,
                            callbacks: {
                                label: (ctx) => {
                                    const label = ctx.label || '';
                                    const val = ctx.parsed || 0;
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = ((val / total) * 100).toFixed(1);
                                    return ` ${label}: ${Math.round(val).toLocaleString()}만원 (${pct}%)`;
                                }
                            }
                        }
                    }
                };

            const renderMemoPanel = () => {
                // 하위 호환성: 문자열이면 배열로 변환하여 처리
                const rawMemo = memo;
                const memos = Array.isArray(rawMemo)

                // 인덱스 안전 장치
                const activeIndex = Math.min(currentMemoIndex, memos.length - 1);
                const currentMemo = memos[activeIndex] || { title: '', content: '' };

                const handleUpdateMemo = (field, value) => {
                    const newMemos = [...memos];
                    newMemos[activeIndex] = { ...newMemos[activeIndex], [field]: value };

                            setMemo(newMemos);
                            setCurrentMemoIndex(Math.max(0, activeIndex - 1));

                                </button>

                                )}

                                    <button onClick={handleDeleteMemo} className="p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded" title="현재 메모 삭제">

                                <div onClick={() => { handleAddMemo(); setIsMemoGridView(false); }} className="bg-gray-50 dark:bg-gray-800/50 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-3 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-all flex flex-col items-center justify-center text-gray-400 hover:text-blue-500 hover:border-blue-300 h-32">

                                className={`w-full p-4 focus:outline-none dark:bg-gray-900 dark:text-white ${isExpanded ? 'flex-1 rounded-b-xl' : 'h-40 border-x border-b dark:border-gray-600 rounded-b-lg focus:ring-2 focus:ring-blue-500'} resize-none`} 
                                placeholder="여기에 자유롭게 메모를 남겨보세요."

                if (isMemoExpanded) {
                    return (
                        <>
                            <div className="h-40 bg-gray-50 dark:bg-gray-800/50 rounded-lg flex flex-col items-center justify-center text-gray-400 border-2 border-dashed border-gray-200 dark:border-gray-700">
                                <svg className="w-8 h-8 mb-2 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>

                                        <MemoContent isExpanded={true} />
                                    </div>
                                </div>,
                                document.body
                            )}
                        </>

                return <MemoContent isExpanded={false} />;
