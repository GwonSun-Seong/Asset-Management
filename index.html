                }

                // [мҲҳм •] мӣ”л§җ лҚ°мқҙн„° нҢҗлі„ н•ЁмҲҳ (лӮ м§ң л¬ёмһҗм—ҙ кё°мӨҖ)
                const isMonthEnd = (index) => {
                    if (index >= assetHistory.length) return false; // [Fix] нһҲмҠӨнҶ лҰ¬ лІ”мң„лҘј лІ—м–ҙлӮң кІҪмҡ°(мҳҲмғҒ лҚ°мқҙн„°) мІҳлҰ¬
                    if (index === assetHistory.length - 1) return true; // л§Ҳм§Җл§ү лҚ°мқҙн„°лҠ” н•ӯмғҒ н‘ңмӢң
                    const currDate = assetHistory[index].date;
                    const nextDate = assetHistory[index + 1].date;
                    // лӢӨмқҢ лҚ°мқҙн„°мқҳ мӣ”мқҙ лӢӨлҘҙл©ҙ нҳ„мһ¬ лҚ°мқҙн„°к°Җ н•ҙлӢ№ мӣ”мқҳ л§Ҳм§Җл§ү лҚ°мқҙн„°мһ„
                    return currDate.substring(0, 7) !== nextDate.substring(0, 7);
                };

                // [мҲҳм •] мӨҢ л ҲлІЁ л°Ҹ мӣ”л§җ м—¬л¶Җм—җ л”°лҘё лҸҷм Ғ нҸ¬мқёнҠё м„Өм •
                const getDynamicPointRadius = (context) => {
                    const chart = context.chart;
                    if (!chart.scales.x) return 3; // мҙҲкё° лЎңл”© мӢң кё°ліёк°’
                    
                    // нҳ„мһ¬ л·°нҸ¬нҠём—җ ліҙмқҙлҠ” лҚ°мқҙн„° к°ңмҲҳ кі„мӮ°
                    const min = chart.scales.x.min;
                    const max = chart.scales.x.max;
                    const visibleCount = max - min;
                    
                    // кё°мӨҖ: 25к°ң
                    if (visibleCount > 25) {
                        // 25к°ңліҙлӢӨ л§Һмқҙ ліҙмқј л•ҢлҠ” 'мӣ”л§җ лҚ°мқҙн„°'л§Ң н‘ңмӢң (лӮҳлЁём§ҖлҠ” мҲЁк№Җ)
                        return isMonthEnd(context.dataIndex) ? 4 : 0;
                    } else {
                        // 25к°ң мқҙн•ҳлЎң нҷ•лҢҖлҗҳм—Ҳмқ„ л•ҢлҠ” 'лӘЁл“  мқјмһҗлі„ лҚ°мқҙн„°' н‘ңмӢң
                        return 4;
                    }
                };

                // [м¶”к°Җ] мҲЁкІЁм§„ нҸ¬мқёнҠёлҠ” нҒҙлҰӯ/нҳёлІ„лҸ„ м•Ҳ лҗҳкІҢ мІҳлҰ¬
                const getDynamicInteractionRadius = (context) => {
                    return getDynamicPointRadius(context) > 0 ? 6 : 0;
                };

                const datasets = [
                    {
                        label: historyViewMode === 'gross' ? 'мҙқмһҗмӮ° (л§Ңмӣҗ)' : 'мҲңмһҗмӮ° (л§Ңмӣҗ)',
                        data: finalHistoryData,
                        borderColor: 'rgb(79, 70, 229)',
                        _originalBorder: 'rgb(79, 70, 229)', // [м¶”к°Җ] мӣҗліё мғүмғҒ ліҙмЎҙ
                        backgroundColor: darkMode ? 'rgba(79, 70, 229, 0.5)' : 'rgba(79, 70, 229, 0.3)',
                        backgroundColor: (context) => {
                            const ctx = context.chart.ctx;
                            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
                            gradient.addColorStop(0, 'rgba(79, 70, 229, 0.3)');
                            gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');
                            return gradient;
                        },
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: 'rgb(79, 70, 229)',
                        pointHoverRadius: getDynamicInteractionRadius, // [м Ғмҡ©] лҸҷм Ғ нҳёлІ„ нҒ¬кё°
                        pointHoverBackgroundColor: 'rgb(255, 255, 255)',
                        pointHoverBorderWidth: 2,
                        pointHoverBorderColor: 'rgb(79, 70, 229)', // [мҲҳм •] мҪӨл§Ҳ м¶”к°Җ
                        pointRadius: getDynamicPointRadius // [м Ғмҡ©] лҸҷм Ғ нҸ¬мқёнҠё нҒ¬кё°
                        ,order: 1 // [м¶”к°Җ] мҲңм„ң лӘ…мӢң (л§Ё мң„)
                        ,pointHitRadius: getDynamicInteractionRadius // [м¶”к°Җ] мҲЁкІЁм§„ м җ нҒҙлҰӯ л°©м§Җ
                    }
                ];

                if (showProjectionInHistory) {
                    // [м¶”к°Җ] лӮҷкҙҖм Ғ мӢңлӮҳлҰ¬мҳӨ (лІ”мң„ мғҒлӢЁ)
                    datasets.push({
                        label: 'лӮҷкҙҖм Ғ мҳҲмғҒ (+)',
                        data: optimisticData,
                        borderColor: 'transparent',
                        backgroundColor: darkMode ? 'rgba(34, 197, 94, 0.1)' : 'rgba(34, 197, 94, 0.1)',
                        fill: '+1', // лӢӨмқҢ лҚ°мқҙн„°м…Ӣ(мҳҲмғҒ мһҗмӮ°)к№Ңм§Җ мұ„мӣҖ (мҲңм„ң мӨ‘мҡ”)
                        pointRadius: 0,
                        tension: 0.4,
                        order: 10
                    });

                    datasets.push({
                        label: 'мҳҲмғҒ мһҗмӮ° (л§Ңмӣҗ)',
                        data: projectionData,
                        borderColor: 'rgba(79, 70, 229, 0.5)',
                        borderDash: [5, 5], // м җм„  н‘ңмӢң
                        tension: 0.3,
                        fill: '-1', // мқҙм „ лҚ°мқҙн„°м…Ӣ(лӮҷкҙҖм Ғ)к№Ңм§Җ мұ„мӣҖ -> мӢӨм ңлЎңлҠ” м•„лһҳ л№„кҙҖм Ғкіј мғҢл“ңмң„м№ҳ нҡЁкіјлҘј мң„н•ҙ мЎ°м • н•„мҡ”н•ҳлӮҳ Chart.js fill лЎңм§ҒмғҒ лӢЁмғү мІҳлҰ¬
                        pointRadius: 2,
                        pointBackgroundColor: 'rgba(79, 70, 229, 0.5)',
                        order: 10
                    });

                    // [м¶”к°Җ] л№„кҙҖм Ғ мӢңлӮҳлҰ¬мҳӨ (лІ”мң„ н•ҳлӢЁ)
                    datasets.push({
                        label: 'л№„кҙҖм Ғ мҳҲмғҒ (-)',
                        data: pessimisticData,
                        borderColor: 'transparent',
                        backgroundColor: darkMode ? 'rgba(239, 68, 68, 0.1)' : 'rgba(239, 68, 68, 0.1)',
                        fill: '-1', // л°”лЎң мң„ лҚ°мқҙн„°м…Ӣ(мҳҲмғҒ мһҗмӮ°)к№Ңм§Җ мұ„мӣҖ
                        pointRadius: 0,
                        tension: 0.4,
                        order: 10
                    });
                }

                // [мҲҳм •] кё°мӨҖ мӢңлӮҳлҰ¬мҳӨ мҳӨлІ„л Ҳмқҙ (лӢӨмӨ‘ м§Җмӣҗ)
                referenceScenarios.forEach(refConfig => {
                    const scenario = scenarios.find(s => s.id === refConfig.id);
                    if (!scenario) return;

                    const refData = scenario.data;
                    const refBaseDate = refData.baseDate || (refData.baseMonth ? `${refData.baseMonth}-01` : null);
                    
                    if (refBaseDate) {
                        const { projections: refProjections } = calculateMonthlyProjection(refData, 120);
                        const refDatasetData = finalLabels.map(label => {
                            let targetDate;
                            if (label.includes('л…„')) {
                                const parts = label.match(/(\d+)л…„ (\d+)мӣ”/);
                                if (parts) targetDate = new Date(Number('20' + parts[1]), Number(parts[2]) - 1, 1);
                            } else {
                                const historyItem = assetHistory.find(h => {
                                    const [y, m, d] = h.date.split('-');
                                    return `${Number(m)}/${Number(d)}` === label;
                                });
                                if (historyItem) targetDate = new Date(historyItem.date);
                            }

                            if (!targetDate) return null;

                            const [bY, bM, bD] = refBaseDate.split('-').map(Number);
                            const base = new Date(bY, bM - 1, bD);
                            
                            // мӣ” м°Ёмқҙ кі„мӮ° (мҶҢмҲҳм җ нҸ¬н•Ён•ҳм—¬ ліҙк°„)
                            const diffTime = targetDate - base;
                            const diffMonths = diffTime / (1000 * 60 * 60 * 24 * 30.44); // нҸүк·  мӣ” мқјмҲҳ
                            
                            if (diffMonths >= 0 && diffMonths < refProjections.length - 1) {
                                const idx = Math.floor(diffMonths);
                                const fraction = diffMonths - idx;
                                const val1 = historyViewMode === 'gross' ? (refProjections[idx]?.gross || 0) : (refProjections[idx]?.net || 0);
                                const val2 = historyViewMode === 'gross' ? (refProjections[idx + 1]?.gross || val1) : (refProjections[idx + 1]?.net || val1);
                                return Math.floor(val1 + (val2 - val1) * fraction);
                            }
                            return null;
                        });
                        refDatasetsData.push(refDatasetData);

                        datasets.push({
                            label: `кё°мӨҖ: ${scenario.name}`,
                            data: refDatasetData,
                            borderColor: refConfig.color, // мӮ¬мҡ©мһҗ м§Җм • мғүмғҒ мӮ¬мҡ©
                            _originalBorder: refConfig.color, // [м¶”к°Җ] мӣҗліё мғүмғҒ ліҙмЎҙ
                            borderDash: [2, 2],
                            pointRadius: 0,
                            borderWidth: 2,
                            fill: false,
                            tension: 0.4,
                            order: 5,
                            createdAt: scenario.createdAt // [м¶”к°Җ] м •л ¬мқ„ мң„н•ң л©”нғҖлҚ°мқҙн„°
                        });
                    }
                });

                // [м¶”к°Җ] мӢңлӮҳлҰ¬мҳӨ нҸүк· м„  (2к°ң мқҙмғҒмқј л•Ңл§Ң н‘ңмӢң)
                if (refDatasetsData.length >= 2) {
                    const averageData = finalLabels.map((_, idx) => {
                        let sum = 0;
                        let count = 0;
                        refDatasetsData.forEach(data => {
                            if (data[idx] !== null && data[idx] !== undefined) {
                                sum += data[idx];
                                count++;
                            }
                        });
                        return count > 0 ? Math.floor(sum / count) : null;
                    });

                    datasets.push({
                        label: 'мӢңлӮҳлҰ¬мҳӨ нҸүк· ',
                        data: averageData,
                        borderColor: '#8b5cf6', // Purple (Solid Line)
                        _originalBorder: '#8b5cf6', // [м¶”к°Җ] мӣҗліё мғүмғҒ ліҙмЎҙ
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.4,
                        order: 2 // мҲңмһҗмӮ° лӢӨмқҢмңјлЎң мӨ‘мҡ”
                    });
                }

                if (historyTargetData && historyTargetData > 0) {
                    datasets.push({
                        label: `лӘ©н‘ң мһҗмӮ° (${formatNumber(historyTargetData, displayMode)}л§Ңмӣҗ)`,
                        data: new Array(finalLabels.length).fill(historyTargetData),
                        borderColor: 'rgba(239, 68, 68, 0.8)',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        borderWidth: 2,
                        order: 20
                    });
                }

                const handleChartClick = (evt, elements, chart) => {
                    if (!elements || elements.length === 0) {
                        setHistoryPopover(null);
                        return;
                    }
                    const element = elements[0];
                    const index = element.index;
                    const datasetIndex = element.datasetIndex;

                    // нһҲмҠӨнҶ лҰ¬ лҚ°мқҙн„°м…Ӣ(0лІҲ)мқё кІҪмҡ°м—җл§Ң нҢқмҳӨлІ„ н‘ңмӢң
                    if (datasetIndex === 0) {
                        const point = assetHistory[index];
                        if (point) {
                            const rect = chart.canvas.getBoundingClientRect();
                            // мә”лІ„мҠӨ лӮҙл¶Җ мўҢн‘ң кі„мӮ°
                            const x = evt.native.clientX - rect.left;
                            const y = evt.native.clientY - rect.top;
                            
                            setHistoryPopover({
                                x, y,
                                date: point.date,
                                netWorth: point.netWorth,
                                grossWorth: point.grossWorth,
                                index: index,
                                memo: point.memo
                            });
                        }
                    } else {
                        setHistoryPopover(null);
                    }
                };

                const handleChartHover = (e, elements, chart) => {
                    // [мҲҳм •] л§Ҳмҡ°мҠӨк°Җ м„  мң„м—җ м •нҷ•нһҲ м—Ҷм–ҙлҸ„ к°ҖмһҘ к°Җк№Ңмҡҙ мҡ”мҶҢлҘј м°ҫлҸ„лЎқ к°•м ң (intersect: false)
                    const activeElements = chart.getElementsAtEventForMode(e, 'nearest', { intersect: false }, true);
                    
                    if (activeElements.length > 0) {
                        const activeIdx = activeElements[0].datasetIndex;

                        // [мөңм Ғнҷ”] мқҙлҜё нҷңм„ұнҷ”лҗң мғҒнғңлқјл©ҙ л¶Ҳн•„мҡ”н•ң м—…лҚ°мқҙнҠё л°©м§Җ (к№ңл№Ўмһ„ н•ҙкІ°)
                        if (activeHistoryHoverRef.current === activeIdx) return;
                        activeHistoryHoverRef.current = activeIdx;

                        e.native.target.style.cursor = 'pointer';
                        const datasets = chart.data.datasets;

                        datasets.forEach((ds, i) => {
                            // мӣҗліё мҶҚм„ұ м ҖмһҘ
                            if (ds._originalBorder === undefined) ds._originalBorder = ds.borderColor;
                            if (ds._originalBg === undefined) ds._originalBg = ds.backgroundColor;
                            if (ds._originalFill === undefined) ds._originalFill = ds.fill;
                            if (ds._originalOrder === undefined) ds._originalOrder = ds.order || 0;
                            
                            if (i === activeIdx) {
                                // м„ нғқлҗң мӢңлӮҳлҰ¬мҳӨ к°•мЎ°
                                ds.borderColor = ds._originalBorder;
                                ds.backgroundColor = ds._originalBg;
                                ds.order = 100; // мӢңк°Ғм ҒмңјлЎң л§Ё мң„м—җ к·ёлҰ¬кё° (лҶ’мқҖ мҲ«мһҗк°Җ лӮҳмӨ‘м—җ к·ёл Өм§җ)

                                // Gap мӢңк°Ғнҷ” м Ғмҡ©
                                if (ds.label && ds.label.startsWith('кё°мӨҖ:') && datasets[0]) {
                                    ds.fill = {
                                        target: 0,
                                        above: 'rgba(239, 68, 68, 0.2)',
                                        below: 'rgba(34, 197, 94, 0.2)'
                                    };
                                } else {
                                    ds.fill = ds._originalFill;
                                }
                            } else if (i === 0 || ds.label === 'мӢңлӮҳлҰ¬мҳӨ нҸүк· ') {
                                // нһҲмҠӨнҶ лҰ¬(л№„көҗ лҢҖмғҒ)мҷҖ нҸүк· м„ мқҖ н•ӯмғҒ м„ лӘ…н•ҳкІҢ мң м§Җ
                                ds.borderColor = ds._originalBorder;
                                ds.backgroundColor = ds._originalBg;
                                ds.fill = ds._originalFill;
                                ds.order = (i === 0) ? 0 : 2;
                            } else {
                                // лӮҳлЁём§Җ нқҗлҰ¬кІҢ мІҳлҰ¬
                                ds.borderColor = darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                                ds.backgroundColor = 'transparent';
                                ds.fill = false;
                                ds.order = 10;
                            }
                        });
                        chart.update();
                    } else {
                        // л§Ҳмҡ°мҠӨк°Җ м°ЁнҠё л°–мңјлЎң лӮҳк°”кұ°лӮҳ к°җм§Җлҗң мҡ”мҶҢк°Җ м—Ҷмқ„ л•Ңл§Ң мҙҲкё°нҷ”
                        if (activeHistoryHoverRef.current !== null) {
                            activeHistoryHoverRef.current = null;
                            e.native.target.style.cursor = 'default';
                            
                            const datasets = chart.data.datasets;
                        datasets.forEach(ds => {
                                if (ds._originalBorder !== undefined) ds.borderColor = ds._originalBorder;
                                if (ds._originalBg !== undefined) ds.backgroundColor = ds._originalBg;
                            if (ds._originalFill !== undefined) ds.fill = ds._originalFill;
                            if (ds._originalOrder !== undefined) ds.order = ds._originalOrder;
                        });
                            chart.update();
                        }
                    }
                };

                const crosshairPlugin = {
                    id: 'crosshair',
                    defaults: {
                        width: 1,
                        color: darkMode ? 'rgba(255, 255, 255, 0.3)' : 'rgba(0, 0, 0, 0.3)',
                        dash: [3, 3]
                    },
                    afterInit: (chart) => { chart.crosshair = { x: 0, y: 0 }; },
                    afterEvent: (chart, args) => {
                        const {inChartArea} = args;
                        const {x, y} = args.event;
                        chart.crosshair = {x, y, draw: inChartArea};
                        chart.draw();
                    },
                    afterDraw: (chart, args, options) => {
                        if (chart.tooltip?._active?.length) {
                            const activePoint = chart.tooltip._active[0];
                            const ctx = chart.ctx;
                            const x = activePoint.element.x;
                            const topY = chart.scales.y.top;
                            const bottomY = chart.scales.y.bottom;
                            ctx.save();
                            ctx.beginPath();
                            ctx.moveTo(x, topY);
                            ctx.lineTo(x, bottomY);
                            ctx.lineWidth = options.width;
                            ctx.strokeStyle = options.color;
                            ctx.setLineDash(options.dash);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                };

                const chartConfig = {
                    type: 'line',
                    data: {
                        labels: finalLabels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        onClick: handleChartClick, // [м¶”к°Җ] нҒҙлҰӯ мқҙлІӨнҠё м—°кІ°
                        onHover: handleChartHover, // [мҲҳм •] нҳёлІ„ н•ёл“Өлҹ¬ көҗмІҙ
                        hover: { mode: 'nearest', intersect: false }, // [м¶”к°Җ] к·јм ‘ к°җм§Җ лӘЁл“ң нҷңм„ұнҷ” (н•„мҲҳ)
                        plugins: {
                            legend: { position: 'bottom', labels: { color: textColor } },
                            title: { display: false },
                            // [мҲҳм •] нҲҙнҢҒ л№„нҷңм„ұнҷ” л°Ҹ мҷёл¶Җ мғҒнғң м—…лҚ°мқҙнҠё (мғҒлӢЁ м •ліҙл°” м—°лҸҷ)
                            tooltip: { 
                                enabled: false, // кё°ліё нҲҙнҢҒ лҒ„кё°
                                mode: 'index', 
                                intersect: false,
                                external: (context) => {
                                    const tooltipModel = context.tooltip;
                                    if (tooltipModel.opacity === 0) {
                                        if (lastHistoryInfoRef.current !== null) {
                                            lastHistoryInfoRef.current = null;
                                            setHistoryChartInfo(null);
                                        }
                                        return;
                                    }
                                    
                                    const title = tooltipModel.title[0] || '';
                                    const items = tooltipModel.body.map((item, i) => {
                                        const dataPoint = tooltipModel.dataPoints[i];
                                        const dataset = dataPoint.dataset;
                                        return {
                                            label: dataset.label,
                                            value: formatNumber(dataPoint.raw, displayMode) + 'л§Ңмӣҗ',
                                            rawValue: dataPoint.raw,
                                            // [мҲҳм •] нҳёлІ„ мӢң мғүмғҒ ліҖкІҪ(нҲ¬лӘ…нҷ”)лҗҳм–ҙлҸ„ мӣҗліё мғүмғҒ мң м§Җ
                                            color: dataset._originalBorder || dataset.borderColor,
                                            createdAt: dataset.createdAt,
                                            isNetWorth: dataPoint.datasetIndex === 0,
                                            isAverage: dataset.label === 'мӢңлӮҳлҰ¬мҳӨ нҸүк· '
                                        };
                                    });

                                    // [м¶”к°Җ] нҲҙнҢҒ н•ӯлӘ© м •л ¬ лЎңм§Ғ
                                    items.sort((a, b) => {
                                        if (scenarioSortOrder === 'default') {
                                            // 1. мҲңмһҗмӮ° мөңмғҒлӢЁ
                                            if (a.isNetWorth) return -1;
                                            if (b.isNetWorth) return 1;
                                            // 2. мӢңлӮҳлҰ¬мҳӨ нҸүк·  л‘җ лІҲм§ё
                                            if (a.isAverage) return -1;
                                            if (b.isAverage) return 1;
                                            
                                            // 3. лӮҳлЁём§Җ(мӢңлӮҳлҰ¬мҳӨ л“ұ) мөңмӢ мҲң м •л ¬
                                            if (!a.createdAt) return 1;
                                            if (!b.createdAt) return -1;
                                            return new Date(b.createdAt) - new Date(a.createdAt);
                                        } else if (scenarioSortOrder === 'high') {
                                            return b.rawValue - a.rawValue;
                                        } else if (scenarioSortOrder === 'low') {
                                            return a.rawValue - b.rawValue;
                                        }
                                        return 0;
                                    });

                                    const newInfoStr = JSON.stringify({ title, items });
                                    if (lastHistoryInfoRef.current !== newInfoStr) {
                                        lastHistoryInfoRef.current = newInfoStr;
                                        setHistoryChartInfo({ title, items });
                                    }
                                }
                            },
                            // [м¶”к°Җ] мӨҢ н”Ңлҹ¬к·ёмқё м„Өм •
                            zoom: {
                                zoom: {
                                    wheel: { enabled: true },
                                    pinch: { enabled: true },
                                    mode: 'x',
                                },
                                pan: {
                                    enabled: true,
                                    mode: 'x',
                                }
                            }
                        },
                        scales: { 
                            y: {

            }
            const displayMonths = uniqueMonths.filter((_, index) => index % comparisonInterval === 0);
            if (uniqueMonths.length > 0 && !displayMonths.includes(uniqueMonths[uniqueMonths.length - 1])) {
                displayMonths.push(uniqueMonths[uniqueMonths.length - 1]); // Always include the last month

            const getMonthLabel = (monthIndex, baseMonthStr) => {

                    const [y,m] = (baseMonthStr || new Date().toISOString().slice(0,7)).split('-').map(Number);

                                                        {(() => {
                                                            const finalA = results[0].projections[results[0].projections.length - 1];
                                                            const finalB = results[1].projections[results[1].projections.length - 1];
                                                            const amountA = finalA?.sectorTotals[sectorKey]?.amount || 0;
                                                            const amountB = finalB?.sectorTotals[sectorKey]?.amount || 0;
                                                            const percentA = finalA?.sectorTotals[sectorKey]?.percentage || 0;
                                                            const percentB = finalB?.sectorTotals[sectorKey]?.percentage || 0;
                                                            const diffAmount = amountB - amountA;
                                                            const diffPercent = percentB - percentA;
                                                            const signAmount = diffAmount >= 0 ? '+' : '';
                                                            const signPercent = diffPercent >= 0 ? '+' : '';
                                                            const isGood = sectorKey === 'loan' ? diffAmount <= 0 : diffAmount >= 0;
                                                            const color = isGood ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                            return (
                                                                <div className={color}>
                                                                    <span>{signAmount}{formatNumber(diffAmount)}</span>
                                                                    <span className="text-xs ml-1">({signPercent}{diffPercent.toFixed(1)}%)</span>
                                                                </div>
                                                            );
                                                        })()}
                                                    </td>
                                                )}
                                            </tr>
                                            {(() => {
                                                const allItems = new Map();
                                                results.forEach(r => {
                                                    const finalProjection = r.projections[r.projections.length - 1];
                                                    finalProjection?.itemTotals[sectorKey]?.forEach(item => {
                                                        const key = item.id || item.name;
                                                        if (!allItems.has(key)) {
                                                            allItems.set(key, { name: item.name });
                                                        }
                                                    });
                                                });
                                                return Array.from(allItems.entries());
                                            })().map(([key, { name }]) => (
                                                <tr key={`${sectorKey}-${key}`} className="border-t dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
                                                    <td className="p-3 pl-8 text-sm text-gray-600 dark:text-gray-400">в”” {name}</td>
                                                    {results.map(r => {
                                                        const finalProjection = r.projections[r.projections.length - 1]; 
                                                        const items = finalProjection?.itemTotals[sectorKey] || [];
                                                        const itemData = items.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };
                                                        return (
                                                            <td key={r.id} className="p-3 text-right text-sm whitespace-nowrap">
                                                                <div>{formatNumber(itemData.amount)}</div>
                                                            </td>
                                                        );
                                                    })}
                                                    {results.length === 2 && (
                                                        <td className="p-3 text-right text-sm text-indigo-700 dark:text-indigo-400 whitespace-nowrap">
                                                            {(() => {
                                                                const finalA = results[0].projections[results[0].projections.length - 1]; 
                                                                const finalB = results[1].projections[results[1].projections.length - 1]; 
                                                                const itemsA = finalA?.itemTotals[sectorKey] || [];
                                                                const itemsB = finalB?.itemTotals[sectorKey] || [];
                                                                const itemA = itemsA.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };
                                                                const itemB = itemsB.find(item => (item.id || item.name) === key) || { amount: 0, percentage: 0 };

                                                                const diffAmount = itemB.amount - itemA.amount;
                                                                const signAmount = diffAmount >= 0 ? '+' : '';
                                                                const isGood = sectorKey === 'loan' ? diffAmount <= 0 : diffAmount >= 0;
                                                                const color = isGood ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                                return (
                                                                    <div className={color}>
                                                                        <div>{signAmount}{formatNumber(diffAmount)}</div>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </td>
                                                    )}
                                                </tr>
                                            ))
                                            }
                                        </React.Fragment>
                                    ))}
                                    <tr className="border-t-2 border-gray-400 dark:border-gray-600 bg-gray-100 dark:bg-gray-700">
                                        <td className="p-3 font-bold whitespace-nowrap">мҙқкі„ ({compareMode === 'gross' ? 'мҙқмһҗмӮ°' : 'мҲңмһҗмӮ°'})</td>
                                        {results.map(r => {
                                            const finalProjection = r.projections[r.projections.length - 1];
                                            const val = compareMode === 'gross' ? finalProjection?.gross : finalProjection?.net;
                                            return (
                                                <td key={r.id} className="p-3 text-right font-bold whitespace-nowrap">{formatNumber(val || 0)}</td>
                                            );
                                        })}
                                        {results.length === 2 && (
                                            <td className="p-3 text-right font-bold text-indigo-700 dark:text-indigo-400 whitespace-nowrap">
                                                {(() => { 
                                                    const finalA = results[0].projections[results[0].projections.length - 1];
                                                    const finalB = results[1].projections[results[1].projections.length - 1];
                                                    const valA = compareMode === 'gross' ? finalA?.gross : finalA?.net;
                                                    const valB = compareMode === 'gross' ? finalB?.gross : finalB?.net;
                                                    const diff = (valB || 0) - (valA || 0); 
                                                    const sign = diff >= 0 ? '+' : '';
                                                    const color = diff >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                                                    return (
                                                        <div className={color}>{sign}{formatNumber(diff)}</div>
                                                    );
                                                })()}
                                            </td>
                                        )}
                                    </tr>
                                </tbody>
                            </table>

                            {/* Monthly Comparison Table */}
                            <h4 className="text-lg font-semibold text-gray-700 dark:text-gray-300 mt-8 mb-4">мӣ”лі„ л№„көҗ (мөңлҢҖ 12к°ңмӣ”)</h4>
                            <table className="w-full text-sm dark:text-gray-300">
                                <thead className="bg-gray-100 dark:bg-gray-700">
                                    <tr>
                                        <th className="p-3 text-left whitespace-nowrap">мӣ”м°Ё</th>
                                        {results.map(r => (<th key={r.id} className="p-3 text-right whitespace-nowrap">{r.name} ({compareMode === 'gross' ? 'мҙқмһҗмӮ°' : 'мҲңмһҗмӮ°'})</th>))}
                                        {results.length === 2 && (
                                            <th className="p-3 text-right whitespace-nowrap">м°Ёмқҙ</th>
                                        )}
                                    </tr>
                                </thead>
                                <tbody>
                                    {displayMonths.map(monthIndex => {
                                        const monthLabel = getMonthLabel(monthIndex, results[0]?.data.baseMonth);
                                        return (
                                            <tr key={monthIndex} className="border-t dark:border-gray-700">
                                                <td className="p-3 font-semibold whitespace-nowrap">{monthLabel}</td>
                                                {results.map(r => {
                                                    const projection = r.projections.find(p => p.month === monthIndex);
                                                    return (
                                                        <td key={r.id} className="p-3 text-right whitespace-nowrap">
                                                            {projection ? formatNumber(compareMode === 'gross' ? projection.gross : projection.net) : '-'}
                                                        </td>
                                                    );
                                                })}
                                                {results.length === 2 && (
                                                    <td className="p-3 text-right text-indigo-700 dark:text-indigo-400 whitespace-nowrap">
                                                        {(() => {
                                                            const projA = results[0].projections.find(p => p.month === monthIndex);
                                                            const projB = results[1].projections.find(p => p.month === monthIndex);
                                                            if (projA && projB) {
                                                                const valA = compareMode === 'gross' ? projA.gross : projA.net;
                                                                const valB = compareMode === 'gross' ? projB.gross : projB.net;
                                                                const diff = valB - valA;
                                                                const sign = diff >= 0 ? '+' : '';
                                                                return `${sign}${formatNumber(diff)}`;
                                                            }
                                                            return '-';
                                                        })()}
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="text-sm text-gray-500">л№„көҗн•  мӢңлӮҳлҰ¬мҳӨлҘј мөңлҢҖ 3к°ң м„ нғқн•ҳм„ёмҡ”.</div>
                    )}
                </div>
            );
        };
        
        const AssetRow = React.memo(({ 
            sectorKey, 
            index, 
            asset, 
            updateAsset, 
            removeAsset, 
            accountOptions, 
            sectorInfo,
            sectorTotal,
            rgb,
            itemRec,
            displayMode
        }) => {
            const assetPercentage = (Number(asset.amount || 0) / sectorTotal) * 100;
            const amountBgStyle = { backgroundImage: `linear-gradient(to right, rgba(${rgb}, 0.15) ${assetPercentage}%, transparent ${assetPercentage}%)` };

            return (
                <div className="bg-white dark:bg-gray-900 rounded-lg p-4 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center gap-3" role="group" aria-label={`${asset.name} мһ…л Ҙ н–ү`}>
                    <div className="flex-1">
                    {sectorKey !== 'loan' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-[1.2fr_1.2fr_1.8fr_0.5fr_0.5fr_1.2fr_min-content] gap-3 items-center">
                            <input type="text" placeholder="н•ӯлӘ©лӘ…" aria-label="н•ӯлӘ©лӘ…" className="border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.name} onChange={(e) => updateAsset(sectorKey, index, 'name', e.target.value)} />
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">нҳ„мһ¬кёҲм•Ў</label>
                                <CalculatorInput aria-label="нҳ„мһ¬кёҲм•Ў" style={amountBgStyle} className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.amount} onChange={(e) => updateAsset(sectorKey, index, 'amount', e.target.value)} displayMode={displayMode} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мӣ”лӮ©мһ… / м¶ңмІҳ</label>
                                <div className="flex gap-0 shadow-sm rounded-md">
                                    <div className="relative flex-1">
                                        <CalculatorInput 
                                            aria-label="мӣ”лӮ©мһ…м•Ў" 
                                            className="w-full border rounded-l px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:z-10" 
                                            value={asset.monthlyContrib} 
                                            onChange={(e) => updateAsset(sectorKey, index, 'monthlyContrib', e.target.value)} 
                                            displayMode={displayMode} 
                                        />
                                        {itemRec > 0 && (
                                            <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] text-blue-500 dark:text-blue-400 pointer-events-none font-medium z-20">
                                                к¶ҢмһҘ: {Math.round(itemRec).toLocaleString()}
                                            </span>
                                        )}
                                    </div>
                                    <select 
                                        aria-label="лӮ©мһ… м¶ңмІҳ кі„мўҢ" 
                                        className="w-24 border-y border-r rounded-r border-l-0 px-1 py-1 text-xs bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white truncate focus:z-10" 
                                        value={asset.monthlyContributionFrom || window.MONTHLY_INCOME_SOURCE} 
                                        onChange={(e) => updateAsset(sectorKey, index, 'monthlyContributionFrom', e.target.value)}
                                        title="лӮ©мһ… м¶ңмІҳ"
                                    >
                                        <option value={window.MONTHLY_INCOME_SOURCE}>{window.MONTHLY_INCOME_SOURCE}</option>
                                        {accountOptions.filter(name => name !== asset.name).map((name, i) => (
                                            <option key={i} value={name}>{name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мҲҳмқөлҘ (%)</label>
                                <input type="number" step="0.1" aria-label="мҲҳмқөлҘ " className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.rate} onChange={(e) => updateAsset(sectorKey, index, 'rate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мҲҳмҲҳлЈҢ/м„ёкёҲ(%)</label>
                                <input type="number" step="0.001" aria-label="мҲҳмҲҳлЈҢ л°Ҹ м„ёкёҲ" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.feeRate ?? 0} onChange={(e) => updateAsset(sectorKey, index, 'feeRate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">л©”лӘЁ</label>
                                <input type="text" placeholder="л©”лӘЁ" aria-label="л©”лӘЁ" className="w-full border rounded px-2 py-1 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-xs" value={asset.memo || ''} onChange={(e) => updateAsset(sectorKey, index, 'memo', e.target.value)} />
                            </div>
                            <button onClick={() => removeAsset(sectorKey, index)} aria-label={`${asset.name} мӮӯм ң`} className="text-red-500 hover:text-red-700 whitespace-nowrap">мӮӯм ң</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-[1.2fr_1.2fr_1.8fr_0.5fr_0.5fr_0.7fr_0.8fr_1.2fr_min-content] gap-2 items-center">
                            <input type="text" placeholder="н•ӯлӘ©лӘ…" aria-label="лҢҖм¶ңлӘ…" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.name} onChange={(e) => updateAsset(sectorKey, index, 'name', e.target.value)} />
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">нҳ„мһ¬мһ”м•Ў</label>
                                <CalculatorInput aria-label="лҢҖм¶ң мһ”м•Ў" style={amountBgStyle} className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.amount} onChange={(e) => updateAsset(sectorKey, index, 'amount', e.target.value)} displayMode={displayMode} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мӣ” мғҒнҷҳм•Ў / кі„мўҢ</label>
                                <div className="flex gap-0 shadow-sm rounded-md">
                                    <CalculatorInput aria-label="мӣ” мғҒнҷҳм•Ў" placeholder="0=мһҗлҸҷ" className="flex-1 border rounded-l px-2 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-right focus:z-10" value={asset.monthlyContrib} onChange={(e) => updateAsset(sectorKey, index, 'monthlyContrib', e.target.value)} displayMode={displayMode} />
                                    <select aria-label="мғҒнҷҳ м¶ңкёҲ кі„мўҢ" className="w-24 border-y border-r rounded-r border-l-0 px-1 py-1 text-xs bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white truncate focus:z-10" value={asset.repaymentAccount} onChange={(e) => updateAsset(sectorKey, index, 'repaymentAccount', e.target.value)} title="мғҒнҷҳ кі„мўҢ">
                                        <option value="salary">мӣ”кёү</option>
                                        {accountOptions.filter(name => name !== asset.name).map((name, i) => (
                                            <option key={i} value={name}>{name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мқҙмһҗмңЁ(%)</label>
                                <input type="number" step="0.1" aria-label="лҢҖм¶ң мқҙмһҗмңЁ" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-right" value={asset.rate} onChange={(e) => updateAsset(sectorKey, index, 'rate', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">л§Ңкё°(к°ңмӣ”)</label>
                                <input type="number" aria-label="лҢҖм¶ң л§Ңкё° к°ңмӣ” мҲҳ" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-right" value={asset.maturityMonth ?? 12} onChange={(e) => updateAsset(sectorKey, index, 'maturityMonth', e.target.value)} />
                            </div>
                            <input type="month" aria-label="лҢҖм¶ң мӢңмһ‘мӣ”" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.loanStartDate ? asset.loanStartDate.slice(0, 7) : ''} onChange={(e) => updateAsset(sectorKey, index, 'loanStartDate', e.target.value)} />
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">мғҒнҷҳ л°©мӢқ</label>
                                <select aria-label="мғҒнҷҳ л°©мӢқ" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white p-0" value={asset.repaymentMethod || 'мӣҗлҰ¬кёҲк· л“ұ'} onChange={(e) => updateAsset(sectorKey, index, 'repaymentMethod', e.target.value)}>
                                    <option value="мӣҗлҰ¬кёҲк· л“ұ">мӣҗлҰ¬кёҲк· л“ұ</option>
                                    <option value="мӣҗкёҲк· л“ұ">мӣҗкёҲк· л“ұ</option>
                                    <option value="л§Ңкё°мқјмӢң">л§Ңкё°мқјмӢң</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 dark:text-gray-200 sm:hidden">л©”лӘЁ</label>
                                <input type="text" placeholder="л©”лӘЁ" aria-label="л©”лӘЁ" className="w-full border rounded px-1 py-1 text-xs bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white" value={asset.memo || ''} onChange={(e) => updateAsset(sectorKey, index, 'memo', e.target.value)} />
                            </div>
                            <button onClick={() => removeAsset(sectorKey, index)} aria-label={`${asset.name} мӮӯм ң`} className="text-red-500 hover:text-red-700 whitespace-nowrap">мӮӯм ң</button>
                        </div>
                    )}
                    </div>
                </div>
            );
        });

        const ErrorBoundary = window.ErrorBoundary || React.Fragment;

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <AssetDashboard />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
